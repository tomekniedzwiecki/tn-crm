<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TN CRM - Projekt sklepu</title>
    <link rel="icon" type="image/svg+xml" href="/tn-workflow/favicon.svg">
    <meta name="theme-color" content="#050505">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="../components/shared-sidebar.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'], mono: ['JetBrains Mono','monospace'] } } } }
    </script>
    <style>
        body { background: #000; color: #e5e5e5; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::selection { background: white; color: black; }
        .glass-header { background: rgba(0,0,0,.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,.08); }
        @keyframes fadeIn { from { opacity:0; transform:translateY(5px);} to { opacity:1; transform:translateY(0);} }
        .animate-enter { animation: fadeIn .4s ease-out forwards; }
        /* pigułki etapów */
        .stage-pill { display:flex; align-items:center; gap:8px; border:1px solid #2a2a2a;
            background:#0a0a0a; border-radius:6px; padding:9px 14px; cursor:pointer; transition:all .15s ease; white-space:nowrap; }
        .stage-pill:hover { border-color:#444; }
        .stage-pill.active { border-color:rgba(0,112,243,.6); background:rgba(0,112,243,.1); }
        .stage-pill.completed .stage-num { background:#45a557; color:#fff; }
        .stage-num { width:20px; height:20px; border-radius:5px; background:#27272a; color:#a1a1aa;
            display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; flex-shrink:0; }
        /* status kroku */
        .st-btn { display:inline-flex; align-items:center; gap:6px; border:1px solid; border-radius:6px;
            padding:5px 11px; font-size:11.5px; font-weight:500; cursor:pointer; transition:all .15s ease; }
        .st-pending     { border-color:#333; background:#161616; color:#a1a1aa; }
        .st-in_progress { border-color:rgba(245,166,35,.45);  background:rgba(245,166,35,.1); color:#f5b955; }
        .st-done        { border-color:rgba(69,165,87,.45);  background:rgba(69,165,87,.1); color:#4cb782; }
        .st-skipped     { border-color:#262626; background:transparent; color:#52525b; text-decoration:line-through; }
        .st-blocked     { border-color:rgba(229,72,77,.45);   background:rgba(229,72,77,.1); color:#f26d78; }
        /* komórka macierzy */
        .mx-cell { width:30px; height:30px; border-radius:6px; border:1px solid #2e2e2e;
            display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all .12s ease; margin:0 auto; }
        .mx-cell:hover { transform:scale(1.12); }
        .mx-pending     { background:#161616; color:#71717a; }
        .mx-in_progress { background:rgba(245,166,35,.14); color:#f5b955; border-color:rgba(245,166,35,.45); }
        .mx-done        { background:rgba(69,165,87,.14); color:#4cb782; border-color:rgba(69,165,87,.5); }
        .mx-skipped     { background:transparent; color:#3f3f46; }
        .owner-tag { font-size:10px; padding:2px 7px; border-radius:6px; font-weight:600; letter-spacing:.02em; }
        .owner-admin  { background:rgba(0,112,243,.12); color:#52a8ff; }
        .owner-client { background:rgba(245,166,35,.12); color:#f5b955; }
        .owner-auto   { background:rgba(69,165,87,.12); color:#4cb782; }
        input[type="date"] { color-scheme: dark; }
        .fld { width:100%; background:#0a0a0a; border:1px solid #2e2e2e; border-radius:6px;
            padding:8px 10px; font-size:13px; color:#fff; }
        .fld:focus { outline:none; border-color:rgba(139,92,246,.5); }
    </style>
</head>
<body class="h-screen flex overflow-hidden font-sans text-sm tracking-tight antialiased">

    <aside id="sidebar" class="w-[280px] bg-zinc-950 border-r border-white/5 flex flex-col flex-shrink-0"></aside>

    <main class="flex-1 flex flex-col bg-black relative min-w-0">
        <header class="glass-header flex items-center justify-between px-6 h-14 flex-shrink-0 z-10">
            <div class="flex items-center gap-3 min-w-0">
                <button onclick="Sidebar.toggle()" class="mobile-menu-btn hidden p-2 -ml-2 text-zinc-400 hover:text-white"><i class="ph ph-list text-xl"></i></button>
                <a href="index.html" class="text-zinc-500 hover:text-white transition-colors flex items-center gap-1 text-xs"><i class="ph ph-arrow-left"></i> Sklepy</a>
                <span class="text-zinc-700">/</span>
                <span id="hdr-name" class="text-zinc-300 text-xs font-mono truncate">…</span>
            </div>
            <button onclick="openSettings()" class="p-2 text-zinc-400 hover:text-white" title="Ustawienia projektu"><i class="ph ph-gear text-lg"></i></button>
        </header>

        <div class="flex-1 overflow-y-auto p-6 lg:p-10">
            <div class="max-w-7xl mx-auto animate-enter">

                <!-- Nagłówek projektu -->
                <div class="flex flex-col lg:flex-row lg:items-start justify-between gap-4 mb-7">
                    <div class="min-w-0">
                        <div class="flex items-center gap-3 flex-wrap">
                            <h1 id="p-name" class="text-3xl font-semibold text-white tracking-tight">…</h1>
                            <select id="p-status" onchange="saveStatus()" class="bg-[#0a0a0a] border border-[#333] rounded-md px-2.5 py-1.5 text-xs text-white focus:outline-none"></select>
                        </div>
                        <div id="p-meta" class="text-zinc-500 text-xs mt-2 flex items-center gap-3 flex-wrap"></div>
                    </div>
                    <div class="flex items-center gap-2 flex-shrink-0">
                        <div class="bg-[#0a0a0a] border border-[#1f1f1f] rounded-md px-4 py-2.5 text-center">
                            <div class="text-xl font-semibold text-white" id="stat-progress">–</div>
                            <div class="text-[10px] font-mono uppercase tracking-wider text-zinc-500">postęp</div>
                        </div>
                        <div class="bg-[#0a0a0a] border border-[#1f1f1f] rounded-md px-4 py-2.5 text-center">
                            <div class="text-xl font-semibold text-white" id="stat-products">–</div>
                            <div class="text-[10px] font-mono uppercase tracking-wider text-zinc-500">produkty</div>
                        </div>
                        <div class="bg-[#0a0a0a] border border-[#1f1f1f] rounded-md px-4 py-2.5 text-center" title="Cel: przekazanie sterów">
                            <div class="text-xl font-semibold text-[#4cb782]" id="stat-orders">0</div>
                            <div class="text-[10px] font-mono uppercase tracking-wider text-zinc-500">/ <span id="stat-target">1000</span> zam.</div>
                        </div>
                    </div>
                </div>

                <!-- Pigułki etapów -->
                <div id="stage-pills" class="flex gap-2.5 overflow-x-auto pb-2 mb-7"></div>

                <!-- Kroki projektu (scope=project) -->
                <div id="steps-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 mb-7"></div>

                <!-- Portfel produktów: macierz (etapy z krokami scope=product) -->
                <div id="matrix-box" class="hidden bg-[#0a0a0a] border border-[#1f1f1f] rounded-lg p-5 mb-7">
                    <div class="flex items-center justify-between mb-4 flex-wrap gap-2">
                        <h3 class="text-white font-semibold flex items-center gap-2"><i class="ph ph-stack text-[#3291ff]"></i> Portfel produktów <span id="matrix-count" class="text-zinc-500 font-normal text-xs"></span></h3>
                        <button onclick="openPicker()" class="inline-flex items-center gap-1.5 bg-white text-black hover:bg-zinc-200 rounded-md px-3 py-1.5 text-xs font-semibold transition-colors"><i class="ph ph-plus"></i> Produkt</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead><tr id="matrix-head" class="border-b border-[#1f1f1f] text-[10.5px] font-mono uppercase tracking-wider text-zinc-500"></tr></thead>
                            <tbody id="matrix-body"></tbody>
                        </table>
                    </div>
                    <div id="matrix-empty" class="hidden py-10 text-center text-zinc-500 text-xs">Portfel pusty — dodaj 5–10 produktów do testów.</div>
                </div>

                <!-- Notatki + aktywność -->
                <!-- (Harmonogram płatności usunięty z UI 2026-07-03 na życzenie Tomka;
                     tabela wf2_payments i wpis rezerwacji z webhooka zostają na później) -->
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-10">
                    <div class="bg-[#0a0a0a] border border-[#1f1f1f] rounded-lg p-5">
                        <h3 class="text-white font-semibold mb-3 flex items-center gap-2"><i class="ph ph-note-pencil text-[#3291ff]"></i> Notatki projektu</h3>
                        <textarea id="p-notes" rows="6" class="fld resize-y" placeholder="Ustalenia z rozmowy, plan przedsięwzięcia, decyzje…"></textarea>
                        <button onclick="saveNotes()" class="mt-2 text-xs text-[#52a8ff] hover:text-[#78b6ff]">Zapisz notatki</button>
                    </div>
                    <div class="bg-[#0a0a0a] border border-[#1f1f1f] rounded-lg p-5">
                        <h3 class="text-white font-semibold mb-3 flex items-center gap-2"><i class="ph ph-clock-counter-clockwise text-[#3291ff]"></i> Aktywność</h3>
                        <div id="activity-list" class="space-y-2 max-h-64 overflow-y-auto"></div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Modal: picker produktów z radaru /trendy -->
    <div id="picker-modal" class="hidden fixed inset-0 z-[55] flex items-center justify-center bg-black/70 p-4" onclick="if(event.target===this)closePicker()">
        <div class="bg-[#0a0a0a] border border-[#333] rounded-lg w-full max-w-3xl p-6 max-h-[85vh] flex flex-col">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-white text-lg font-semibold">Produkt z radaru (/trendy)</h3>
                <button onclick="closePicker()" class="p-1.5 text-zinc-500 hover:text-white"><i class="ph ph-x"></i></button>
            </div>
            <input id="pk-search" class="fld mb-4" placeholder="Szukaj po nazwie lub kategorii…" oninput="renderPicker()">
            <div id="pk-grid" class="grid grid-cols-2 md:grid-cols-3 gap-2.5 overflow-y-auto pr-1" style="min-height:200px"></div>
            <div class="flex items-center justify-between mt-4 pt-4 border-t border-[#1f1f1f]">
                <span class="text-zinc-600 text-[11px]">Tylko zatwierdzone na /trendy · sort: potencjał (heat)</span>
                <button onclick="closePicker(); openProductModal()" class="text-xs text-[#52a8ff] hover:text-[#78b6ff]">Dodaj ręcznie (spoza radaru)</button>
            </div>
        </div>
    </div>

    <!-- Modal: produkt -->
    <div id="prod-modal" class="hidden fixed inset-0 z-[60] flex items-center justify-center bg-black/70 p-4 overflow-y-auto" onclick="if(event.target===this)closeProductModal()">
        <div class="bg-[#0a0a0a] border border-[#333] rounded-lg w-full max-w-2xl p-6 my-8">
            <h3 id="pm-title" class="text-white text-lg font-semibold mb-4">Produkt</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div class="md:col-span-2"><label class="text-xs text-zinc-500 block mb-1">Nazwa produktu</label><input id="pm-name" class="fld"></div>
                <div><label class="text-xs text-zinc-500 block mb-1">Status</label><select id="pm-status" class="fld"></select></div>
                <div><label class="text-xs text-zinc-500 block mb-1">Tryb marży</label>
                    <select id="pm-margin-mode" class="fld" onchange="recalcMargin()">
                        <option value="test">TEST — 5–10 zł zysku/szt.</option>
                        <option value="scale">SKALA — marża docelowa</option>
                    </select></div>
                <div class="md:col-span-2"><label class="text-xs text-zinc-500 block mb-1">Link dostawcy</label><input id="pm-supplier" class="fld" placeholder="https://…"></div>
                <!-- Aukcja AliExpress: status/cena/podmiana (tylko produkty z radaru) -->
                <div id="pm-auction" class="md:col-span-2"></div>
                <div class="md:col-span-2"><label class="text-xs text-zinc-500 block mb-1">Zdjęcie (cover URL)</label><input id="pm-cover" class="fld" placeholder="https://…"></div>
                <div><label class="text-xs text-zinc-500 block mb-1">Zakup / szt. (zł)</label><input id="pm-cost" type="number" step="0.01" class="fld" oninput="recalcMargin()"></div>
                <div><label class="text-xs text-zinc-500 block mb-1">Wysyłka / szt. (zł)</label><input id="pm-ship" type="number" step="0.01" class="fld" oninput="recalcMargin()"></div>
                <div><label class="text-xs text-zinc-500 block mb-1">Prowizje (% ceny)</label><input id="pm-fees" type="number" step="0.1" value="2" class="fld" oninput="recalcMargin()"></div>
                <div><label class="text-xs text-zinc-500 block mb-1">Cena sprzedaży (zł)</label><input id="pm-price" type="number" step="0.01" class="fld" oninput="recalcMargin()"></div>
                <!-- kalkulator marży -->
                <div class="md:col-span-2 bg-[#111] border border-[#262626] rounded-md px-4 py-3 flex items-center justify-between flex-wrap gap-2">
                    <div class="text-xs text-zinc-400">Zysk na sztuce: <span id="pm-profit" class="font-mono font-semibold text-white">—</span></div>
                    <div class="flex items-center gap-3 flex-wrap">
                        <div id="pm-hint" class="text-[11px] text-zinc-500"></div>
                        <button onclick="setTargetPrice()" class="text-[11px] text-[#52a8ff] hover:text-[#78b6ff] border border-[#0070f3]/40 rounded-md px-2.5 py-1 transition-colors" title="Ustawia cenę sprzedaży celującą w środek widełek 5–10 zł zysku/szt.">Ustaw cenę docelową</button>
                    </div>
                </div>
                <div><label class="text-xs text-zinc-500 block mb-1">Strona w TakeDrop (URL)</label><input id="pm-tdurl" class="fld" placeholder="https://…"></div>
                <div><label class="text-xs text-zinc-500 block mb-1">Meta campaign ID</label><input id="pm-campaign" class="fld" placeholder="(po utworzeniu kampanii)"></div>
                <div class="md:col-span-2"><label class="text-xs text-zinc-500 block mb-1">Notatki</label><textarea id="pm-notes" rows="2" class="fld resize-y"></textarea></div>
            </div>
            <div class="flex justify-between items-center mt-5">
                <button id="pm-delete" onclick="deleteProduct()" class="hidden px-3 py-2 text-xs text-[#f26d78] hover:text-[#ff8589]">Usuń produkt</button>
                <div class="flex gap-2 ml-auto">
                    <button onclick="closeProductModal()" class="px-4 py-2 text-xs text-zinc-400 hover:text-white">Anuluj</button>
                    <button id="pm-save" onclick="saveProduct()" class="px-4 py-2 text-xs font-semibold bg-white text-black rounded-lg hover:bg-zinc-200">Zapisz</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Warsztat kroku (drawer) — konkretna robota danego kroku -->
    <div id="step-drawer-wrap" class="hidden fixed inset-0 z-50" onclick="if(event.target===this.querySelector('.sd-overlay')||event.target===this)closeStep()">
        <div class="sd-overlay absolute inset-0 bg-black/60"></div>
        <div class="absolute right-0 top-0 bottom-0 w-full max-w-[540px] bg-zinc-950 border-l border-[#333] flex flex-col">
            <div class="flex items-start justify-between px-6 pt-5 pb-4 border-b border-[#1f1f1f]">
                <div class="min-w-0">
                    <div id="sd-product" class="text-[11px] text-[#52a8ff] mb-1 hidden"></div>
                    <h3 id="sd-title" class="text-white text-lg font-semibold flex items-center gap-2"></h3>
                    <div id="sd-sub" class="text-zinc-500 text-xs mt-1.5"></div>
                </div>
                <button onclick="closeStep()" class="p-2 text-zinc-500 hover:text-white flex-shrink-0"><i class="ph ph-x text-lg"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto px-6 py-5 space-y-5" id="sd-body"></div>
            <div class="border-t border-[#1f1f1f] px-6 py-4 flex items-center justify-between gap-2">
                <button id="sd-skip" onclick="sdToggleSkip()" class="px-3 py-2 text-xs text-zinc-500 hover:text-zinc-300 flex-shrink-0">Pomiń krok</button>
                <div class="flex gap-2" id="sd-statusbtns"></div>
            </div>
        </div>
    </div>

    <!-- Modal: ustawienia projektu -->
    <div id="settings-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/70 p-4" onclick="if(event.target===this)closeSettings()">
        <div class="bg-[#0a0a0a] border border-[#333] rounded-lg w-full max-w-lg p-6">
            <h3 class="text-white text-lg font-semibold mb-4">Ustawienia projektu</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div><label class="text-xs text-zinc-500 block mb-1">Klient</label><input id="set-customer" class="fld"></div>
                <div><label class="text-xs text-zinc-500 block mb-1">E-mail</label><input id="set-email" class="fld"></div>
                <div><label class="text-xs text-zinc-500 block mb-1">Telefon</label><input id="set-phone" class="fld"></div>
                <div><label class="text-xs text-zinc-500 block mb-1">Cel zamówień</label><input id="set-target" type="number" class="fld"></div>
                <div><label class="text-xs text-zinc-500 block mb-1">Konto reklamowe (act_…)</label><input id="set-act" class="fld"></div>
                <div><label class="text-xs text-zinc-500 block mb-1">Pixel ID</label><input id="set-pixel" class="fld"></div>
                <div><label class="text-xs text-zinc-500 block mb-1">Sklep TD (URL)</label><input id="set-tdurl" class="fld"></div>
                <div><label class="text-xs text-zinc-500 block mb-1">Domena</label><input id="set-domain" class="fld"></div>
            </div>
            <div class="flex justify-between items-center mt-5">
                <button onclick="deleteProject()" class="px-3 py-2 text-xs text-[#f26d78] hover:text-[#ff8589]">Usuń projekt</button>
                <div class="flex gap-2">
                    <button onclick="closeSettings()" class="px-4 py-2 text-xs text-zinc-400 hover:text-white">Anuluj</button>
                    <button onclick="saveSettings()" class="px-4 py-2 text-xs font-semibold bg-white text-black rounded-lg hover:bg-zinc-200">Zapisz</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yxmavwkwnfuphjqbelws.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_vT94u2GI4gzYl8gCV5sHbQ_Q94YidaI';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        Sidebar.render();
        Sidebar.setupLogout(supabaseClient);

        const projectId = new URLSearchParams(location.search).get('id');
        let project = null;
        let stepDefs = [];
        let steps = [];
        let products = [];
        let sales = [];
        let adStats = [];
        let activeStage = 1;
        let editingProductId = null;
        let drawerCtx = null;    // {key, productId} — otwarty warsztat kroku
        let ttProducts = null;   // cache radaru /trendy (approved)
        let pendingTT = null;    // tt_product_id wybrany w pickerze (dla nowego produktu)
        let genMap = {};         // bud_session_id -> {brand, mockups, chosen_style} (generacje z /sklep)

        const PROJECT_STATUSES = ['start','budowa','sklep','kampanie','testy','stery','monthly','zamkniety'];
        const STATUS_LABELS = { start:'Start', budowa:'Budowa', sklep:'Sklep', kampanie:'Kampanie', testy:'Testy', stery:'Stery', monthly:'Monthly', zamkniety:'Zamknięty' };
        const PRODUCT_STATUSES = ['kandydat','zaakceptowany','w_budowie','gotowy','live','test','winner','kill','skala'];
        const PRODUCT_STATUS_META = {
            kandydat:     { label:'Kandydat',     cls:'bg-zinc-500/15 text-zinc-300' },
            zaakceptowany:{ label:'Zaakceptowany',cls:'bg-[#0070f3]/10 text-[#52a8ff]' },
            w_budowie:    { label:'W budowie',    cls:'bg-[#0070f3]/10 text-[#52a8ff]' },
            gotowy:       { label:'Gotowy',       cls:'bg-[#0070f3]/10 text-[#52a8ff]' },
            live:         { label:'LIVE',         cls:'bg-[#45a557]/10 text-[#62c073]' },
            test:         { label:'W teście',     cls:'bg-[#f5a623]/10 text-[#f5b955]' },
            winner:       { label:'WINNER',       cls:'bg-[#45a557]/20 text-[#62c073] font-semibold' },
            kill:         { label:'KILL',         cls:'bg-[#e5484d]/10 text-[#f26d78]' },
            skala:        { label:'Skala',        cls:'bg-[#0070f3]/10 text-[#52a8ff]' },
        };
        const STEP_CYCLE = { pending:'in_progress', in_progress:'done', done:'pending', skipped:'pending', blocked:'in_progress' };
        const STEP_LABELS = { pending:'Do zrobienia', in_progress:'W trakcie', done:'Ukończone', skipped:'Pominięte', blocked:'Zablokowane' };
        const OWNER_LABEL = { admin:'Tomek', client:'Klient', auto:'Auto' };
        const TEST_PROFIT_MIN = 5, TEST_PROFIT_MAX = 10; // zł zysku/szt. w trybie TEST

        function escapeHtml(str) {
            if (str === null || str === undefined) return '';
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }
        function moneyPL(n) { return (Number(n)||0).toLocaleString('pl-PL',{minimumFractionDigits:2,maximumFractionDigits:2}) + ' zł'; }
        function relTime(iso) {
            if (!iso) return '';
            const d = new Date(iso); const mins = Math.round((Date.now()-d.getTime())/60000);
            if (mins < 60) return mins + ' min temu';
            if (mins < 1440) return Math.round(mins/60) + ' godz. temu';
            return d.toLocaleDateString('pl-PL');
        }
        function showToast(message, type='info') {
            const toast = document.createElement('div');
            const bg = type==='success' ? '#45a557' : type==='error' ? '#ef4444' : '#3b82f6';
            toast.style.cssText = `position:fixed;top:20px;right:20px;z-index:9999;background:${bg};color:#fff;padding:12px 20px;border-radius:6px;font:14px/1 sans-serif;box-shadow:0 4px 12px rgba(0,0,0,.3);transition:opacity .3s`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity='0'; setTimeout(()=>toast.remove(),300); }, 2200);
        }
        async function logActivity(action, description) {
            try { await supabaseClient.from('wf2_activities').insert({ project_id: projectId, actor:'admin', action, description }); } catch(_) {}
        }

        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) { window.location.href = Sidebar.getLoginPath(); return null; }
            Sidebar.setUserEmail(session.user.email.split('@')[0]);
            const { data } = await supabaseClient.from('team_members').select('*');
            const me = (data||[]).find(m => m.user_id === session.user.id);
            if (me) { Sidebar.setUserName(me.name); Sidebar.setUserColor(me.color); Sidebar.setupProfileClick(); }
            Sidebar.showAdminNav(me?.role === 'admin');
            return session;
        }

        // ============ ŁADOWANIE ============
        async function loadAll() {
            // dosiej brakujące instancje kroków (nowe defs / nowe produkty)
            await supabaseClient.rpc('wf2_ensure_steps', { p_project: projectId });
            const [projQ, defsQ, stepsQ, prodQ, actQ, salesQ, adsQ] = await Promise.all([
                supabaseClient.from('wf2_projects').select('*').eq('id', projectId).single(),
                supabaseClient.from('wf2_step_defs').select('*').eq('active', true).order('stage').order('sort'),
                supabaseClient.from('wf2_steps').select('*').eq('project_id', projectId).range(0, 1999),
                supabaseClient.from('wf2_products').select('*').eq('project_id', projectId).order('sort').order('created_at'),
                supabaseClient.from('wf2_activities').select('*').eq('project_id', projectId).order('created_at',{ascending:false}).limit(20),
                supabaseClient.from('wf2_sales').select('product_id, source, orders, revenue').eq('project_id', projectId).range(0, 4999),
                supabaseClient.from('wf2_ad_stats').select('product_id, spend, purchases, purchase_value').eq('project_id', projectId).range(0, 9999),
            ]);
            if (projQ.error || !projQ.data) { showToast('Nie znaleziono projektu','error'); location.href='index.html'; return; }
            project = projQ.data; stepDefs = defsQ.data||[]; steps = stepsQ.data||[]; products = prodQ.data||[]; sales = salesQ.data||[]; adStats = adsQ.data||[];
            // generacje z lejka /sklep (typ A): marka, makiety, strona — pokazywane w warsztatach kroków
            const genIds = [...new Set(products.map(p => p.gen_session_id).filter(Boolean))];
            genMap = {};
            if (genIds.length) {
                const { data: gs } = await supabaseClient.from('bud_sessions')
                    .select('id, brand, mockups, chosen_style, landing_url').in('id', genIds);
                (gs || []).forEach(g => genMap[g.id] = g);
            }
            renderHeader(); renderPills(); renderStage(); renderActivity(actQ.data||[]);
        }

        function stageNums() { return [...new Set(stepDefs.map(d=>d.stage))].sort((a,b)=>a-b); }
        function defsForStage(n) { return stepDefs.filter(d=>d.stage===n); }
        function stepFor(key, productId) {
            return steps.find(s => s.step_key===key && (productId ? s.product_id===productId : !s.product_id));
        }
        function stageProgress(n) {
            const keys = defsForStage(n).map(d=>d.key);
            const inst = steps.filter(s => keys.includes(s.step_key) && s.status!=='skipped');
            const done = inst.filter(s=>s.status==='done').length;
            return { done, total: inst.length, pct: inst.length ? Math.round(done/inst.length*100) : 0 };
        }

        // ============ RENDER ============

        function renderPills() {
            const wrap = document.getElementById('stage-pills');
            wrap.innerHTML = stageNums().map(n => {
                const pr = stageProgress(n);
                const label = defsForStage(n)[0]?.stage_label || ('Etap ' + n);
                const cls = (n===activeStage?'active ':'') + (pr.total>0 && pr.done===pr.total ? 'completed' : '');
                const num = pr.total>0 && pr.done===pr.total ? '<i class="ph ph-check"></i>' : n;
                return `<div class="stage-pill ${cls}" onclick="switchStage(${n})">
                    <span class="stage-num">${num}</span>
                    <span class="text-xs ${n===activeStage?'text-white':'text-zinc-400'}">${escapeHtml(label)}</span>
                    <span class="text-[10px] font-mono text-zinc-500">${pr.done}/${pr.total}</span>
                </div>`;
            }).join('');

        function switchStage(n) { activeStage = n; renderPills(); renderStage(); }

        function renderStage() {
            const defs = defsForStage(activeStage);

        // ============ AKCJE: kroki ============
        async function cycleStep(key, productId) {
            const st = stepFor(key, productId);
            if (!st) { showToast('Brak instancji kroku — odśwież', 'error'); return; }
            const next = STEP_CYCLE[st.status] || 'pending';
            const upd = { status: next, completed_at: next==='done' ? new Date().toISOString() : null, completed_by: next==='done' ? 'admin' : null };
            const { error } = await supabaseClient.from('wf2_steps').update(upd).eq('id', st.id);
            if (error) { showToast('Błąd zapisu: '+error.message,'error'); return; }
            Object.assign(st, upd);
            const d = stepDefs.find(x=>x.key===key);
            const prodName = productId ? (products.find(p=>p.id===productId)?.name || '') : '';
            if (next==='done') logActivity('step_done', `Ukończono: ${d?.label||key}${prodName?' — '+prodName:''}`);
            renderPills(); renderStage(); renderHeader();
        }

        function mdLite(md) {
            let h = escapeHtml(md).replace(/\*\*(.+?)\*\*/g, '<b>$1</b>');
            const lines = h.split(/\r?\n/); let out = '', inUl = false;
            for (const ln of lines) {
                if (/^\s*-\s+/.test(ln)) { if (!inUl) { out += '<ul class="list-disc pl-4 space-y-1">'; inUl = true; } out += '<li>' + ln.replace(/^\s*-\s+/, '') + '</li>'; }
                else { if (inUl) { out += '</ul>'; inUl = false; } if (ln.trim()) out += '<p>' + ln + '</p>'; }
            }
            if (inUl) out += '</ul>';
            return out;
        }
        function drawerStep() { return drawerCtx ? stepFor(drawerCtx.key, drawerCtx.productId) : null; }
        function drawerProduct() { return drawerCtx && drawerCtx.productId ? products.find(p => p.id === drawerCtx.productId) : null; }

        function openStep(key, productId) {
            drawerCtx = { key, productId: productId || null };
            renderDrawer();
            document.getElementById('step-drawer-wrap').classList.remove('hidden');
        }
        function closeStep() { document.getElementById('step-drawer-wrap').classList.add('hidden'); drawerCtx = null; }

        function mergedChecklist(ws, st) {
            const stored = (st.data && Array.isArray(st.data.checklist)) ? st.data.checklist.slice() : [];
            const tpl = (ws && ws.check) || [];
            tpl.forEach(t => { if (!stored.some(x => x.t === t)) stored.push({ t, done: false }); });
            stored.sort((a, b) => { const ia = tpl.indexOf(a.t), ib = tpl.indexOf(b.t); return (ia < 0 ? 999 : ia) - (ib < 0 ? 999 : ib); });
            return stored;
        }
        function productStats(pid) {
            const spend = adStats.filter(a => a.product_id === pid).reduce((a, s) => a + Number(s.spend || 0), 0);
            const sl = sales.filter(s => s.product_id === pid);
            const td = sl.filter(s => s.source === 'takedrop');
            const src = td.length ? td : sl.filter(s => s.source === 'meta');
            const orders = src.reduce((a, s) => a + (s.orders || 0), 0);
            const revenue = src.reduce((a, s) => a + Number(s.revenue || 0), 0);
            const p = products.find(x => x.id === pid);
            const profit = (p && p.unit_profit != null ? Number(p.unit_profit) : 0) * orders - spend;
            return { spend, orders, revenue, profit };
        }

        function fieldGet(f) {
            if (f.col) {
                const dot = f.col.indexOf('.'); const t = f.col.slice(0, dot), c = f.col.slice(dot + 1);
                if (t === 'project') return project[c] || '';
                const p = drawerProduct(); return (p && p[c]) || '';
            }
            const st = drawerStep();
            return (st.data && st.data.fields && st.data.fields[f.k]) || '';
        }
        async function sdSaveField(i, v) {
            const ws = WS[drawerCtx.key] || {}; const f = (ws.fields || [])[i]; if (!f) return;
            v = String(v).trim();
            if (f.col) {
                const dot = f.col.indexOf('.'); const t = f.col.slice(0, dot), c = f.col.slice(dot + 1);
                if (t === 'project') {
                    const { error } = await supabaseClient.from('wf2_projects').update({ [c]: v || null }).eq('id', projectId);
                    if (error) { showToast('Błąd: ' + error.message, 'error'); return; }
                    project[c] = v || null; renderHeader();
                } else {
                    const p = drawerProduct(); if (!p) return;
                    const { error } = await supabaseClient.from('wf2_products').update({ [c]: v || null }).eq('id', p.id);
                    if (error) { showToast('Błąd: ' + error.message, 'error'); return; }
                    p[c] = v || null; renderStage();
                }
            } else {
                const st = drawerStep();
                const data = Object.assign({}, st.data || {});
                data.fields = Object.assign({}, data.fields || {}); data.fields[f.k] = v;
                const { error } = await supabaseClient.from('wf2_steps').update({ data }).eq('id', st.id);
                if (error) { showToast('Błąd: ' + error.message, 'error'); return; }
                st.data = data;
            }
            showToast('Zapisano', 'success');
        }
        async function sdSaveChecklist(list) {
            const st = drawerStep();
            const data = Object.assign({}, st.data || {}, { checklist: list });
            const { error } = await supabaseClient.from('wf2_steps').update({ data }).eq('id', st.id);
            if (error) { showToast('Błąd: ' + error.message, 'error'); return false; }
            st.data = data; return true;
        }
        async function sdToggleCheck(i) {
            const list = mergedChecklist(WS[drawerCtx.key] || {}, drawerStep());

            const inp = document.getElementById('sd-newcheck'); const t = inp.value.trim(); if (!t) return;

        async function sdSetStatus(next, silent) {
            const st = drawerStep();
            const upd = { status: next, completed_at: next === 'done' ? new Date().toISOString() : null, completed_by: next === 'done' ? 'admin' : null };
            const { error } = await supabaseClient.from('wf2_steps').update(upd).eq('id', st.id);
            if (error) { showToast('Błąd: ' + error.message, 'error'); return; }
            Object.assign(st, upd);
            if (next === 'done' && !silent) {
                const d = stepDefs.find(x => x.key === drawerCtx.key); const p = drawerProduct();
                logActivity('step_done', `Ukończono: ${d?.label || ''}${p ? ' — ' + p.name : ''}`);
            }
            renderPills(); renderStage(); renderHeader(); renderDrawer();
        }
        async function sdToggleSkip() {
            const st = drawerStep();
            const next = st.status === 'skipped' ? 'pending' : 'skipped';
            const { error } = await supabaseClient.from('wf2_steps').update({ status: next, completed_at: null, completed_by: null }).eq('id', st.id);
            if (error) { showToast('Błąd: ' + error.message, 'error'); return; }
            st.status = next; renderPills(); renderStage(); renderHeader(); renderDrawer();
        }
        async function sdDecision(dec) {
            const p = drawerProduct(); if (!p) return;
            const upd = { status: dec === 'winner' ? 'winner' : dec === 'kill' ? 'kill' : 'test' };
            if (dec === 'winner') upd.margin_mode = 'scale';
            const { error } = await supabaseClient.from('wf2_products').update(upd).eq('id', p.id);
            if (error) { showToast('Błąd: ' + error.message, 'error'); return; }
            Object.assign(p, upd);
            if (dec !== 'test') await sdSetStatus('done', true);
            if (dec === 'kill') {
                const sk = stepFor('skalowanie', p.id);
                if (sk) {
                    await supabaseClient.from('wf2_steps').update({ status: 'skipped' }).eq('id', sk.id);
                    sk.status = 'skipped';
                }
            }
            logActivity('test_decision', `Wynik testu: ${p.name} = ${dec === 'winner' ? 'WINNER (skalujemy)' : dec === 'kill' ? 'KILL' : 'testujemy dalej'}`);
            renderPills(); renderStage(); renderHeader(); renderDrawer();
            showToast('Decyzja zapisana', 'success');
        }

        // ============ PICKER: produkty z radaru /trendy ============

        async function previewGenLanding(sessId) {

        // ============ AUKCJA ALIEXPRESS w modalu produktu ============
        let modalTT = null;      // wiersz bud_tt_products produktu otwartego w modalu
        let usdRate = null;      // kurs NBP (cache 24h w localStorage), fallback 4.00
        let usdRateReal = false; // czy kurs z NBP (false = fallback)
        async function getUsdRate() {
            if (usdRate) return usdRate;
            try { const c = JSON.parse(localStorage.getItem('nbp_usd') || 'null'); if (c && Date.now() - c.t < 86400000) { usdRate = c.r; usdRateReal = true; return usdRate; } } catch (_) {}
            try {
                const r = await fetch('https://api.nbp.pl/api/exchangerates/rates/a/usd?format=json');
                const j = await r.json(); const mid = j?.rates?.[0]?.mid;
                if (mid) { usdRate = mid; usdRateReal = true; localStorage.setItem('nbp_usd', JSON.stringify({ r: mid, t: Date.now() })); return usdRate; }
            } catch (_) {}
            usdRate = 4.00; usdRateReal = false; return usdRate;
        }
        async function loadModalAuction(ttId) {
            modalTT = null;
            const box = document.getElementById('pm-auction');
            if (!ttId) { box.innerHTML = ''; return; }
            box.innerHTML = '<div class="text-zinc-600 text-[11px]">Sprawdzam aukcję…</div>';
            const [{ data }] = await Promise.all([
                supabaseClient.from('bud_tt_products')
                    .select('id, chosen_link, curated_image, cover, ali_src:ali_snapshot->>source, ali_sale:ali_snapshot->price->>sale, ali_img:ali_snapshot->>main_image, ali_at:ali_snapshot->>fetched_at, ali_title:ali_snapshot->>title')
                    .eq('id', ttId).maybeSingle(),
                getUsdRate(),
            ]);
            modalTT = data || null;
            renderAuctionBox();
        }
        function renderAuctionBox() {
            const box = document.getElementById('pm-auction');
            if (!modalTT) { box.innerHTML = ''; return; }
            const t = modalTT;
            const confirmed = t.ali_src === 'detail';
            const sale = parseFloat(t.ali_sale) || null;
            const pln = sale != null ? Math.round(sale * usdRate * 100) / 100 : null;
            const when = t.ali_at ? new Date(t.ali_at).toLocaleDateString('pl-PL') : '—';
            let h = '';
            if (confirmed) {
                h += `<div class="border border-[#45a557]/30 bg-[#45a557]/[.05] rounded-md p-3.5 space-y-2.5">
                    <div class="flex items-center justify-between flex-wrap gap-2">
                        <span class="text-[11px] text-[#62c073] flex items-center gap-1.5"><i class="ph ph-check-circle"></i> Aukcja potwierdzona (snapshot z ${when})</span>
                        <button onclick="pmRecheck()" class="text-[10.5px] text-zinc-500 hover:text-zinc-300">Sprawdź ponownie</button>
                    </div>
                    ${sale != null ? `<div class="flex items-center justify-between flex-wrap gap-2">
                        <span class="text-[12px] text-zinc-300 font-mono">$${sale} × ${usdRate.toFixed(2)}${usdRateReal ? '' : ' (kurs zapasowy!)'} ≈ <b class="text-white">${pln.toFixed(2)} zł</b></span>
                        <button onclick="pmInsertCost(${pln})" class="text-[11px] text-[#52a8ff] hover:text-[#78b6ff] border border-[#0070f3]/40 rounded-md px-2.5 py-1">Wstaw jako cenę zakupu</button>
                    </div>` : '<div class="text-[11px] text-zinc-500">Aukcja żyje, ale bez ceny w snapshocie — Sprawdź ponownie.</div>'}
                </div>`;
            } else {
                h += `<div class="border border-[#f5a623]/40 bg-[#f5a623]/[.06] rounded-md p-3.5 space-y-2.5">
                    <div class="flex items-center justify-between flex-wrap gap-2">
                        <span class="text-[11px] text-[#f5b955] flex items-center gap-1.5"><i class="ph ph-warning"></i> AUKCJA NIEPOTWIERDZONA — możliwe, że wygasła. Podmień link.</span>
                        <button onclick="pmRecheck()" class="text-[10.5px] text-zinc-500 hover:text-zinc-300">Sprawdź ponownie</button>
                    </div>
                    <div class="flex items-center gap-2 flex-wrap">
                        <button onclick="pmSearchImage('aliprice')" class="text-[11px] text-[#52a8ff] hover:text-[#78b6ff] border border-[#0070f3]/40 rounded-md px-2.5 py-1"><i class="ph ph-image"></i> AliPrice (kopiuje zdjęcie)</button>
                        <button onclick="pmSearchImage('lens')" class="text-[11px] text-[#52a8ff] hover:text-[#78b6ff] border border-[#0070f3]/40 rounded-md px-2.5 py-1"><i class="ph ph-magnifying-glass"></i> Google Lens po zdjęciu</button>
                    </div>
                    <div class="flex gap-2">
                        <input id="pm-newlink" class="fld" style="font-size:12px" placeholder="Nowy link do aukcji AliExpress…">
                        <button onclick="pmSwapLink()" class="text-[11px] font-semibold bg-white text-black rounded-md px-3 flex-shrink-0 hover:bg-zinc-200">Podmień</button>
                    </div>
                </div>`;
            }
            box.innerHTML = h;
        }
        function pmInsertCost(pln) {
            document.getElementById('pm-cost').value = pln.toFixed(2);
            recalcMargin();
            showToast('Cena zakupu z aukcji wstawiona (bez wysyłki — uzupełnij osobno)', 'success');
        }
        async function pmRecheck() {
            if (!modalTT) return;
            showToast('Przebudowuję snapshot aukcji… (~20 s)');
            try { await supabaseClient.functions.invoke('bud-ali-snapshot', { body: { productKey: modalTT.id, force: true } }); } catch (_) {}
            await loadModalAuction(modalTT.id);
            ttProducts = null; // odśwież cache pickera przy następnym otwarciu
        }
        function pmSearchImage(kind) {
            const img = modalTT && (modalTT.curated_image || modalTT.ali_img || modalTT.cover) || document.getElementById('pm-cover').value;
            if (!img) { showToast('Brak zdjęcia produktu', 'error'); return; }
            if (kind === 'lens') { window.open('https://lens.google.com/uploadbyurl?url=' + encodeURIComponent(img), '_blank'); return; }
            // AliPrice nie ma deep-linka po URL — kopiujemy zdjęcie, otwieramy wyszukiwarkę, wklejasz 1×
            navigator.clipboard.writeText(img).catch(() => {});
            window.open('https://www.aliprice.com/', '_blank');
            showToast('URL zdjęcia skopiowany — wklej w wyszukiwarkę obrazem AliPrice', 'success');
        }
        async function pmSwapLink() {
            const v = (document.getElementById('pm-newlink').value || '').trim();
            if (!modalTT || !/^https?:\/\//.test(v)) { showToast('Wklej pełny link do aukcji', 'error'); return; }
            const { error } = await supabaseClient.from('bud_tt_products').update({ chosen_link: v }).eq('id', modalTT.id);
            if (error) { showToast('Błąd: ' + error.message, 'error'); return; }
            document.getElementById('pm-supplier').value = v;
            logActivity('auction_swapped', 'Podmieniony link aukcji AliExpress dla produktu z radaru');
            showToast('Link podmieniony — buduję świeży snapshot… (~20 s)');
            try { await supabaseClient.functions.invoke('bud-ali-snapshot', { body: { productKey: modalTT.id, force: true } }); } catch (_) {}
            await loadModalAuction(modalTT.id);
            ttProducts = null;
        }
        // Cena docelowa: celuje w środek widełek 5–10 zł zysku/szt. (końcówka .99)
        function setTargetPrice() {
            const cost = parseFloat(document.getElementById('pm-cost').value) || 0;
            const ship = parseFloat(document.getElementById('pm-ship').value) || 0;
            const fees = (parseFloat(document.getElementById('pm-fees').value) || 0) / 100;
            if (!cost && !ship) { showToast('Najpierw cena zakupu (np. z aukcji) i wysyłka', 'error'); return; }
            if (fees >= 1) { showToast('Prowizje ≥ 100%?', 'error'); return; }
            const lo = (cost + ship + TEST_PROFIT_MIN) / (1 - fees);
            const hi = (cost + ship + TEST_PROFIT_MAX) / (1 - fees);
            let price = Math.round((lo + hi) / 2) - 0.01;           // końcówka .99 przy środku widełek
            price = Math.min(hi, Math.max(lo, price));
            document.getElementById('pm-price').value = price.toFixed(2);
            recalcMargin();
        }

        // ============ AKCJE: produkty ============
        function openProductModal(id) {
            editingProductId = id || null;
            pendingTT = null;
            const p = id ? products.find(x=>x.id===id) : null;
            document.getElementById('pm-title').textContent = p ? 'Edycja produktu' : 'Nowy produkt';
            document.getElementById('pm-delete').classList.toggle('hidden', !p);
            document.getElementById('pm-status').innerHTML = PRODUCT_STATUSES.map(s=>`<option value="${s}" ${p&&p.status===s?'selected':''}>${PRODUCT_STATUS_META[s].label}</option>`).join('');
            document.getElementById('pm-name').value = p?.name || '';
            document.getElementById('pm-margin-mode').value = p?.margin_mode || 'test';
            document.getElementById('pm-supplier').value = p?.supplier_url || '';
            document.getElementById('pm-cover').value = p?.cover_url || '';
            document.getElementById('pm-cost').value = p?.cost_purchase ?? '';
            document.getElementById('pm-ship').value = p?.cost_shipping ?? '';
            document.getElementById('pm-fees').value = p?.fees_pct ?? 2;
            document.getElementById('pm-price').value = p?.price ?? '';
            document.getElementById('pm-tdurl').value = p?.td_page_url || '';
            document.getElementById('pm-campaign').value = p?.campaign_id || '';
            document.getElementById('pm-notes').value = p?.notes || '';
            recalcMargin();
            document.getElementById('prod-modal').classList.remove('hidden');
            loadModalAuction(p?.tt_product_id || null);
        }
        function closeProductModal() { document.getElementById('prod-modal').classList.add('hidden'); editingProductId = null; }

        // Kalkulator marży: zysk = cena − zakup − wysyłka − cena×prowizje%.
        // W trybie TEST podpowiada cenę dającą 5–10 zł zysku/szt. (decyzja Tomka 2026-07-03).
        function recalcMargin() {
            const cost = parseFloat(document.getElementById('pm-cost').value) || 0;
            const ship = parseFloat(document.getElementById('pm-ship').value) || 0;
            const fees = (parseFloat(document.getElementById('pm-fees').value) || 0) / 100;
            const price = parseFloat(document.getElementById('pm-price').value);
            const mode = document.getElementById('pm-margin-mode').value;
            const profitEl = document.getElementById('pm-profit');
            const hintEl = document.getElementById('pm-hint');
            if (!isNaN(price)) {
                const profit = price - cost - ship - price * fees;
                profitEl.textContent = moneyPL(profit);
                const ok = mode==='test' ? (profit >= TEST_PROFIT_MIN && profit <= TEST_PROFIT_MAX) : profit > 0;
                profitEl.className = 'font-mono font-semibold ' + (ok ? 'text-[#4cb782]' : 'text-[#f5b955]');
            } else { profitEl.textContent = '—'; profitEl.className = 'font-mono font-semibold text-zinc-500'; }
            if (mode === 'test' && fees < 1 && (cost > 0 || ship > 0)) {
                const lo = (cost + ship + TEST_PROFIT_MIN) / (1 - fees);
                const hi = (cost + ship + TEST_PROFIT_MAX) / (1 - fees);
                hintEl.textContent = `Cena dla ${TEST_PROFIT_MIN}–${TEST_PROFIT_MAX} zł zysku: ${moneyPL(lo)} – ${moneyPL(hi)}`;
            } else hintEl.textContent = mode==='scale' ? 'Tryb SKALA — marża docelowa wg decyzji przy winnerze.' : '';
        }

        async function saveProduct() {
            const payload = {
                name: document.getElementById('pm-name').value.trim(),
                status: document.getElementById('pm-status').value,
                margin_mode: document.getElementById('pm-margin-mode').value,
                supplier_url: document.getElementById('pm-supplier').value.trim() || null,
                cover_url: document.getElementById('pm-cover').value.trim() || null,
                cost_purchase: parseFloat(document.getElementById('pm-cost').value) || null,
                cost_shipping: parseFloat(document.getElementById('pm-ship').value) || null,
                fees_pct: parseFloat(document.getElementById('pm-fees').value) || 0,
                price: parseFloat(document.getElementById('pm-price').value) || null,
                td_page_url: document.getElementById('pm-tdurl').value.trim() || null,
                campaign_id: document.getElementById('pm-campaign').value.trim() || null,
                notes: document.getElementById('pm-notes').value.trim() || null,
            };
            if (!payload.name) { showToast('Podaj nazwę produktu','error'); return; }
            try {
                if (editingProductId) {
                    const { error } = await supabaseClient.from('wf2_products').update(payload).eq('id', editingProductId);
                    if (error) throw error;
                    logActivity('product_updated', 'Zaktualizowano produkt: ' + payload.name);
                } else {
                    payload.project_id = projectId;
                    payload.sort = products.length;
                    if (pendingTT) payload.tt_product_id = pendingTT;
                    const { error } = await supabaseClient.from('wf2_products').insert(payload);
                    if (error) throw error;
                    logActivity('product_added', 'Dodano produkt do portfela: ' + payload.name);
                }
                closeProductModal();
                await loadAll();
                showToast('Zapisano','success');
            } catch(e) { showToast('Błąd: '+(e.message||e),'error'); }
        }
        async function deleteProduct() {
            if (!editingProductId) return;
            const p = products.find(x=>x.id===editingProductId);
            if (!confirm(`Usunąć produkt „${p?.name||''}" z portfela? Usunie też jego kroki.`)) return;
            const { error } = await supabaseClient.from('wf2_products').delete().eq('id', editingProductId);
            if (error) { showToast('Błąd: '+error.message,'error'); return; }
            logActivity('product_deleted', 'Usunięto produkt: ' + (p?.name||''));
            closeProductModal(); await loadAll();
        }

        // ============ AKCJE: projekt ============
        async function saveStatus() {
            const status = document.getElementById('p-status').value;
            const { error } = await supabaseClient.from('wf2_projects').update({ status }).eq('id', projectId);
            if (error) { showToast('Błąd: '+error.message,'error'); return; }
            project.status = status; logActivity('status_changed', 'Status projektu: ' + (STATUS_LABELS[status]||status));
            showToast('Status zapisany','success');
        }
        async function saveNotes() {
            const notes = document.getElementById('p-notes').value;
            const { error } = await supabaseClient.from('wf2_projects').update({ notes }).eq('id', projectId);
            if (error) { showToast('Błąd: '+error.message,'error'); return; }
            project.notes = notes; showToast('Notatki zapisane','success');
        }
        function openSettings() {
            document.getElementById('set-customer').value = project.customer_name || '';
            document.getElementById('set-email').value = project.customer_email || '';
            document.getElementById('set-phone').value = project.customer_phone || '';
            document.getElementById('set-target').value = project.target_orders || 1000;
            document.getElementById('set-act').value = project.meta_ad_account_id || '';
            document.getElementById('set-pixel').value = project.pixel_id || '';
            document.getElementById('set-tdurl').value = project.td_shop_url || '';
            document.getElementById('set-domain').value = project.domain || '';
            document.getElementById('settings-modal').classList.remove('hidden');
        }
        function closeSettings() { document.getElementById('settings-modal').classList.add('hidden'); }
        async function saveSettings() {
            const payload = {
                customer_name: document.getElementById('set-customer').value.trim() || null,
                customer_email: document.getElementById('set-email').value.trim() || null,
                customer_phone: document.getElementById('set-phone').value.trim() || null,
                target_orders: parseInt(document.getElementById('set-target').value) || 1000,
                meta_ad_account_id: document.getElementById('set-act').value.trim() || null,
                pixel_id: document.getElementById('set-pixel').value.trim() || null,
                td_shop_url: document.getElementById('set-tdurl').value.trim() || null,
                domain: document.getElementById('set-domain').value.trim() || null,
            };
            const { error } = await supabaseClient.from('wf2_projects').update(payload).eq('id', projectId);
            if (error) { showToast('Błąd: '+error.message,'error'); return; }
            Object.assign(project, payload); closeSettings(); renderHeader(); showToast('Zapisano','success');
        }
        async function deleteProject() {
            if (!confirm(`Usunąć projekt klienta „${project.customer_name||''}"? Skasuje produkty, kroki, płatności i historię.`)) return;
            if (!confirm('Na pewno? Tej operacji nie da się cofnąć.')) return;
            const { error } = await supabaseClient.from('wf2_projects').delete().eq('id', projectId);
            if (error) { showToast('Błąd: '+error.message,'error'); return; }
            location.href = 'index.html';
        }

        (async () => {
            if (!projectId) { location.href = 'index.html'; return; }
            const session = await checkAuth();
            if (!session) return;
            await loadAll();
        })();
    </script>
</body>
</html>
