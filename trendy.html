<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar produktów TikTok → AliExpress</title>
<link rel="icon" type="image/png" href="https://tomekniedzwiecki.pl/img/logo/tn-logo-icon-88.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@500;600&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#000; --surface:#0c0c0e; --surface2:#141417; --surface3:#1b1b20; --line:#222226; --line2:#2e2e34;
    --text:#ededf0; --dim:#9a9aa3; --dim2:#67676f;
    --gold:#f5b53f; --green:#46b46a; --green-d:#2c6e3d; --blue:#3291ff; --red:#e5484d;
    color-scheme:dark;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Geist','Inter',system-ui,sans-serif;letter-spacing:-.011em;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .mono{font-family:'Geist Mono',ui-monospace,monospace}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#2a2a30;border-radius:99px}::-webkit-scrollbar-track{background:transparent}
  a{color:inherit;text-decoration:none}
  svg{width:16px;height:16px;flex:0 0 auto}
  :focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:8px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  summary{list-style:none;cursor:pointer}summary::-webkit-details-marker{display:none}

  /* HEADER */
  .bar{position:sticky;top:0;z-index:30;background:rgba(8,8,10,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .wrap{max-width:1040px;margin:0 auto;padding:0 22px}
  .barTop{display:flex;align-items:center;gap:14px;padding:14px 0 12px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;margin-right:auto;font-weight:600;font-size:16px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold)}
  .kpis{display:flex;gap:8px;flex-wrap:wrap}
  .kpi{display:flex;align-items:baseline;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:6px 11px;font-size:12px;color:var(--dim)}
  .kpi b{font-size:15px;color:var(--text)}
  .kpi.g b{color:var(--green)}
  .controls{display:flex;gap:9px;align-items:center;padding-bottom:13px;flex-wrap:wrap}
  .ipt,.sel{background:var(--surface);border:1px solid var(--line2);border-radius:9px;padding:8px 12px;font-size:13px;color:var(--text);transition:border-color .15s}
  .ipt:focus,.sel:focus{border-color:var(--blue);outline:none}
  .search{position:relative;flex:1;min-width:170px}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim2)}
  .search .ipt{width:100%;padding-left:34px}
  .seg{display:flex;background:var(--surface);border:1px solid var(--line2);border-radius:9px;padding:3px;gap:2px}
  .seg button{border:0;background:transparent;color:var(--dim);font-size:12px;font-weight:500;padding:6px 12px;border-radius:6px;cursor:pointer;transition:.15s;white-space:nowrap}
  .seg button.on{background:var(--surface2);color:var(--text);box-shadow:0 1px 0 rgba(255,255,255,.04) inset}
  .seg button .cnt{display:inline-block;min-width:17px;padding:0 5px;margin-left:5px;border-radius:99px;background:var(--line);color:var(--dim2);font-size:10.5px;font-weight:600;line-height:16px;text-align:center;vertical-align:1px}
  .seg button.on .cnt{background:var(--line2);color:var(--text)}
  .btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line2);background:var(--surface2);color:var(--text);border-radius:9px;padding:8px 13px;font-size:13px;font-weight:500;cursor:pointer;transition:.15s;white-space:nowrap}
  .btn:hover{border-color:#3a3a42;background:#1b1b1f}
  .btn:disabled{opacity:.5;cursor:default}
  .btn-g{background:var(--green-d);border-color:#3d9450;color:#eafff0}
  .btn-g:hover{background:#368049}
  .btn-r:hover{background:#4a1a1d;border-color:var(--red);color:#ffd7d8}
  .btn-dup:hover{background:#1a2433;border-color:var(--blue);color:#cfe3ff}
  .btn-sm{padding:6px 10px;font-size:12px}

  /* LIST */
  main{max-width:1040px;margin:0 auto;padding:18px 22px 90px}
  .cards{display:flex;flex-direction:column;gap:18px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;overflow:hidden;transition:border-color .2s}
  .card:hover{border-color:#34343c}
  .card.approved{border-color:var(--green-d)}
  .card.rejected{opacity:.45}
  .card.duplicate{opacity:.55}
  .card.duplicate .pname{text-decoration:line-through;text-decoration-color:var(--dim2);text-decoration-thickness:1px}

  /* HEAD — wideo GRA W KARCIE (autoodtwarzanie na scroll) + nazwa + heat + status */
  .head{display:grid;grid-template-columns:210px 1fr;gap:18px;padding:16px 18px;align-items:start}
  .vid{position:relative;width:210px;aspect-ratio:9/16;border-radius:12px;overflow:hidden;background:#000;flex:0 0 auto}
  .vid iframe.vidframe{position:absolute;inset:0;width:100%;height:100%;border:0;z-index:6;display:block;background:#000}
  .vid[data-mounted] .play,.vid[data-mounted] .vidph{display:none}
  .vid img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s;position:relative;z-index:1}
  .vid .vidph{position:absolute;inset:0;z-index:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:var(--dim2);background:linear-gradient(135deg,#1b1b20,#0c0c0e)}
  .vid .vidph svg{width:22px;height:22px;opacity:.45}
  .vid .vidph span{font-size:9px;letter-spacing:.05em;text-transform:uppercase}
  .vid.healing .vidph span{color:var(--gold)}
  .vid:hover img{transform:scale(1.04)}
  .vid .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(0,0,0,.02),rgba(0,0,0,.3))}
  .vid .play span{width:40px;height:40px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);border:1.5px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center}
  .vid .play span svg{width:18px;height:18px;color:#fff;margin-left:2px;fill:#fff}
  .vid:hover .play span{background:rgba(0,0,0,.72)}
  .vid .age{position:absolute;top:6px;left:6px;font-size:10px;font-weight:600;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);padding:2px 6px;border-radius:5px;color:#fff}
  .vid .age.hot{background:rgba(245,181,63,.92);color:#1a1205}

  .meta{min-width:0;display:flex;flex-direction:column;gap:9px}
  .metaTop{display:flex;align-items:flex-start;gap:10px}
  .pname{font-size:17px;font-weight:600;line-height:1.25;margin:0;flex:1;min-width:0}
  .heat{flex:0 0 auto;display:flex;align-items:center;gap:5px;background:var(--surface2);border:1px solid var(--line2);border-radius:9px;padding:5px 9px;font-weight:700;font-size:13px}
  .heat svg{width:14px;height:14px;color:var(--gold)}
  .heat.hi{border-color:#7a5a12;background:#231803;color:var(--gold)}
  .metaRow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .catsel{font-size:11.5px;color:var(--text);background:var(--surface2);border:1px solid var(--line2);border-radius:7px;padding:4px 8px}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--dim);background:var(--surface2);border:1px solid var(--line);border-radius:7px;padding:3px 8px}
  .chip svg{width:12px;height:12px}
  .chip.ad{color:var(--gold);border-color:#5a4412;background:#1f1705}
  .chip.a{cursor:pointer}.chip.a:hover{border-color:#3a3a42;color:var(--text)}
  /* Statystyki wideo — schowane w rozwijalne „i" (dane researchu, nie do matchowania) */
  .statfold{margin-top:2px}
  .statfold>summary{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--dim2);border:1px solid var(--line);background:var(--surface2);border-radius:7px;padding:4px 9px;width:fit-content}
  .statfold>summary:hover{color:var(--dim);border-color:var(--line2)}
  .statfold[open]>summary{color:var(--dim);margin-bottom:9px}
  .stats{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}
  @media(max-width:760px){.stats{grid-template-columns:repeat(3,1fr)}}
  .stat{background:var(--surface2);border:1px solid var(--line);border-radius:9px;padding:7px 9px}
  .stat .lab{display:flex;align-items:center;gap:4px;font-size:9.5px;color:var(--dim2);text-transform:uppercase;letter-spacing:.03em;margin-bottom:3px}
  .stat .val{font-size:14px;font-weight:600;line-height:1}
  .stat.gold{border-color:#5a4412}.stat.gold .val{color:var(--gold)}.stat.gold .lab{color:#b88e2e}
  .srcLinks{display:flex;gap:8px;flex-wrap:wrap}
  .srcLinks a{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--dim);border:1px solid var(--line2);border-radius:8px;padding:5px 10px;transition:.15s}
  .srcLinks a:hover{color:var(--text);border-color:#3a3a42;background:var(--surface2)}
  .srcLinks a.shop:hover{color:var(--green)}

  /* SEKCJE */
  .sec{border-top:1px solid var(--line);padding:15px 18px}
  .secLab{font-size:11px;color:var(--dim2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;display:flex;align-items:center;gap:7px}
  .secLab svg{width:13px;height:13px}
  .secLab .hint{text-transform:none;letter-spacing:0;color:var(--dim2);font-weight:400;margin-left:2px}

  /* STREFA DOPASOWANIA — okładka wideo vs kandydaci Ali (porównanie wizualne 1:1) */
  .match{background:rgba(255,255,255,.012)}
  .matchGrid{display:grid;grid-template-columns:120px 1fr;gap:16px;align-items:start}
  @media(max-width:640px){.matchGrid{grid-template-columns:1fr}}
  .refCol{display:flex;flex-direction:column;gap:7px}
  .refCover{width:120px;aspect-ratio:9/16;border-radius:10px;overflow:hidden;background:#000;border:1px solid var(--line2)}
  .refCover img{width:100%;height:100%;object-fit:cover;display:block}
  .refCol .rl{font-size:10px;color:var(--dim2);text-transform:uppercase;letter-spacing:.05em;text-align:center}
  @media(max-width:640px){.refCover{width:96px}.refCol{flex-direction:row;align-items:center}}
  .cands{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:10px}
  .cand{border:1px solid var(--line);border-radius:11px;overflow:hidden;background:var(--surface);display:flex;flex-direction:column;transition:border-color .15s,transform .15s}
  .cand:hover{border-color:#3a3a42;transform:translateY(-2px)}
  .cand.picked{border-color:var(--green);box-shadow:0 0 0 1px var(--green),0 0 18px rgba(70,180,106,.18)}
  .cand .cimg{position:relative;aspect-ratio:1;background:#fff;cursor:zoom-in}
  .cand .cimg img{width:100%;height:100%;object-fit:cover;display:block}
  .cand .pickedTag{position:absolute;top:6px;right:6px;background:var(--green);color:#04130a;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
  .cand .pickedTag svg{width:14px;height:14px;color:#04130a}
  .cand .ci{padding:8px 9px;display:flex;flex-direction:column;gap:5px;flex:1}
  .cand .pr{font-size:13px;font-weight:600;color:var(--green)}
  .cand .ti{font-size:10.5px;color:var(--dim);line-height:1.35;max-height:29px;overflow:hidden}
  .cand .crow{display:flex;gap:6px;padding:0 9px 9px;margin-top:auto}
  .cand .pickbtn{flex:1;border:1px solid var(--line2);background:var(--surface2);color:var(--text);border-radius:7px;padding:6px;font-size:11px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:.15s}
  .cand .pickbtn:hover{background:var(--green-d);border-color:#3d9450}
  .cand.picked .pickbtn{background:var(--green-d);border-color:#3d9450;color:#eafff0}
  .cand .ext{border:1px solid var(--line2);background:var(--surface2);border-radius:7px;width:30px;display:flex;align-items:center;justify-content:center;color:var(--dim)}
  .cand .ext:hover{color:var(--gold);border-color:#7a4a12}
  .nocand{color:var(--dim2);font-size:13px;padding:4px 0 10px}

  /* AKCJE */
  .actions{display:flex;gap:9px;align-items:center;margin-top:14px;flex-wrap:wrap}
  .actions .ipt{flex:1;min-width:220px}
  .stbadge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:99px;border:1px solid var(--line2);color:var(--dim)}
  .stbadge.approved{color:var(--green);border-color:var(--green-d);background:rgba(70,180,106,.08)}
  .stbadge.rejected{color:var(--red);border-color:#5a2326}
  .stbadge.duplicate{color:var(--blue);border-color:#234a6e;background:rgba(50,145,255,.08)}
  .stbadge.pending{color:var(--gold);border-color:#5a4412;background:rgba(245,181,63,.06)}

  /* SNAPSHOT — co realnie pobraliśmy z aukcji (galeria, cena, warianty, OPINIE ze zdjęciami) */
  .snap>summary{display:flex;align-items:center;gap:9px;font-size:11px;color:var(--dim2);text-transform:uppercase;letter-spacing:.07em;padding:2px 0}
  .snap>summary .chev{margin-left:auto;transition:transform .2s;color:var(--dim2)}
  .snap[open]>summary .chev{transform:rotate(180deg)}
  .snap>summary:hover{color:var(--dim)}
  .snap>summary .badge{text-transform:none;letter-spacing:0;font-weight:600;font-size:11px;padding:3px 9px;border-radius:99px;border:1px solid var(--line2);color:var(--dim)}
  .snap>summary .badge.ok{color:var(--green);border-color:var(--green-d);background:rgba(70,180,106,.08)}
  .snap>summary .badge.warn{color:var(--gold);border-color:#7a5a12;background:rgba(245,181,63,.08)}
  .snapBody{padding-top:14px;display:flex;flex-direction:column;gap:16px}
  .snapTop{display:grid;grid-template-columns:1fr 260px;gap:18px}
  @media(max-width:760px){.snapTop{grid-template-columns:1fr}}
  .gal{display:flex;flex-direction:column;gap:9px}
  .galMain{aspect-ratio:1;max-width:300px;border-radius:12px;overflow:hidden;background:#fff;border:1px solid var(--line2)}
  .galMain img{width:100%;height:100%;object-fit:contain;display:block}
  .galThumbs{display:flex;gap:7px;flex-wrap:wrap}
  .galThumbs img{width:46px;height:46px;object-fit:cover;border-radius:7px;border:1px solid var(--line);background:#fff;cursor:pointer;transition:border-color .15s}
  .galThumbs img:hover,.galThumbs img.on{border-color:var(--gold)}
  .facts{display:flex;flex-direction:column;gap:11px}
  .priceRow{display:flex;align-items:baseline;gap:9px}
  .priceRow .now{font-size:22px;font-weight:700;color:var(--green)}
  .priceRow .was{font-size:13px;color:var(--dim2);text-decoration:line-through}
  .kv{display:flex;flex-direction:column;gap:5px}
  .kv .k{font-size:10px;color:var(--dim2);text-transform:uppercase;letter-spacing:.04em}
  .vlist{display:flex;gap:6px;flex-wrap:wrap}
  .vlist span{font-size:11px;color:var(--dim);background:var(--surface2);border:1px solid var(--line);border-radius:6px;padding:3px 8px}
  .specTbl{font-size:11.5px;color:var(--dim);display:grid;grid-template-columns:auto 1fr;gap:3px 12px}
  .specTbl b{color:var(--text);font-weight:500}
  .rstats{display:flex;align-items:center;gap:12px;font-size:13px}
  .rstats .avg{font-size:20px;font-weight:700;color:var(--gold)}
  .reviews{display:flex;gap:11px;overflow-x:auto;padding:2px 2px 8px}
  .rev{flex:0 0 210px;border:1px solid var(--line);border-radius:11px;background:var(--surface2);overflow:hidden;display:flex;flex-direction:column}
  .rev .rimg{display:flex;gap:0}
  .rev .rimg img{width:70px;height:70px;object-fit:cover;background:#fff;flex:0 0 auto}
  .rev .rbody{padding:9px 11px;display:flex;flex-direction:column;gap:5px}
  .rev .rstars{color:var(--gold);font-size:11px;letter-spacing:1px}
  .rev .rtext{font-size:11.5px;color:var(--dim);line-height:1.4;max-height:70px;overflow:hidden}
  .rev .rname{font-size:10px;color:var(--dim2)}
  /* Referencja generatora (curated / snapshot) — co model dostaje jako zdjęcie produktu */
  .refbox{display:flex;gap:12px;align-items:flex-start;background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:12px}
  .refbox .refimg{flex:0 0 60px;width:60px;height:60px;border-radius:9px;overflow:hidden;background:#fff;border:1px solid var(--line2)}
  .refbox .refimg img{width:100%;height:100%;object-fit:cover;display:block}
  .refbox .refimg.none{display:flex;align-items:center;justify-content:center;color:var(--dim2);font-size:9px;text-align:center;padding:3px}
  .refmeta{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px}
  .refbadge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;border:1px solid var(--line2);color:var(--dim);width:fit-content}
  .refbadge.ok{color:var(--green);border-color:var(--green-d);background:rgba(70,180,106,.08)}
  .refbadge.warn{color:var(--gold);border-color:#7a5a12;background:rgba(245,181,63,.08)}
  .refrow{display:flex;gap:8px;flex-wrap:wrap}
  .refrow .ipt{flex:1;min-width:200px}
  .snapEmpty{color:var(--dim2);font-size:12.5px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}

  /* PLAYER / LIGHTBOX MODAL */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(6px);z-index:90;display:none;align-items:center;justify-content:center;padding:24px}
  .modal.show{display:flex}
  .modalC{display:flex;gap:0;background:var(--surface);border:1px solid var(--line2);border-radius:18px;overflow:hidden;max-width:880px;width:100%;max-height:92vh}
  .modalC .pl{flex:0 0 auto;width:340px;max-width:46vw;background:#000;display:flex;align-items:center;justify-content:center}
  .modalC .pl iframe{width:100%;height:min(86vh,600px);border:0;display:block}
  .modalC .info{flex:1;min-width:0;padding:24px;overflow:auto}
  .modalC .info h3{margin:0 0 4px;font-size:20px;font-weight:600;line-height:1.25}
  .mx{position:absolute;top:18px;right:22px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid var(--line2);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2}
  .mx:hover{background:rgba(255,255,255,.16)}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:100;display:none;align-items:center;justify-content:center;padding:30px;cursor:zoom-out}
  .lightbox.show{display:flex}
  .lightbox img{max-width:92vw;max-height:92vh;object-fit:contain;border-radius:12px;background:#fff}
  @media (max-width:720px){ .modalC{flex-direction:column;max-height:94vh;overflow:auto} .modalC .pl{width:100%;max-width:none} .modalC .pl iframe{height:62vh} }

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--line2);padding:11px 19px;border-radius:11px;font-size:13px;z-index:120;opacity:0;transition:opacity .2s;box-shadow:0 10px 30px rgba(0,0,0,.5)}
  .toast.show{opacity:1}
  .loader{display:flex;justify-content:center;padding:80px}.spin{width:36px;height:36px;border:3px solid #222;border-top-color:var(--gold);border-radius:50%;animation:s .7s linear infinite}@keyframes s{to{transform:rotate(360deg)}}
  .empty{text-align:center;color:var(--dim2);padding:70px 20px;font-size:14px}
  .pager{display:flex;align-items:center;justify-content:center;gap:14px;padding:22px 0 8px;flex-wrap:wrap}
  .pager:empty{display:none}
  .pgbtn{background:var(--surface);border:1px solid var(--line2);color:var(--text);border-radius:9px;padding:8px 15px;font-size:13px;font-weight:600;cursor:pointer;transition:border-color .15s,color .15s}
  .pgbtn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
  .pgbtn:disabled{opacity:.4;cursor:default}
  .pginfo{font-size:12.5px;color:var(--dim)}.pginfo b{color:var(--text)}

  @media (max-width:680px){
    .wrap,main{padding-left:13px;padding-right:13px}
    .seg{width:100%;overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
    .head{grid-template-columns:150px 1fr;gap:13px;padding:13px}
    .vid{width:150px}
    .pname{font-size:15px;flex-basis:100%}      /* tytuł pełna szerokość — heat/status zawijają pod spód */
    .metaTop{flex-wrap:wrap}
    .stats{grid-template-columns:repeat(2,1fr)}
    .cands{grid-template-columns:repeat(2,1fr)}
    .actions .ipt{min-width:100%}
    .actions .btn{flex:1}

  star:'<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="m12 2 3 6.9 7.5.6-5.7 5 1.8 7.3L12 24l-6.6-2.2L7.2 14.5 1.5 9.5 9 8.9z"/></svg>',

async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){location.href='/login.html?redirect=/trendy';return;}
  const ALLOW=['93675a5a-ea02-488c-a6c2-4adf687ea435','7cd1830f-fca0-44d4-a419-7a822f77f919'];
  if(!ALLOW.includes(session.user.id)){$('loading').outerHTML='<div class="empty">Brak dostępu — ten widok jest tylko dla Maćka i Tomka.</div>';return;}
  const {data:tm}=await sb.from('team_members').select('name').eq('user_id',session.user.id).maybeSingle();
  ME=tm?.name||session.user.email;
  $('fcat').innerHTML='<option value="">Wszystkie kategorie</option>'+CATS.map(c=>`<option>${c}</option>`).join('');
  $('q').oninput=()=>{PAGE=0;render()}; $('fcat').onchange=()=>{PAGE=0;render()}; $('refresh').onclick=load;
  $('stseg').querySelectorAll('button').forEach(b=>b.onclick=()=>{$('stseg').querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');FSTAT=b.dataset.s;PAGE=0;render();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeM(null,true);$('lightbox').classList.remove('show');}});
  await load();
}
async function load(){
  $('loading').style.display='flex';$('cards').innerHTML='';
  // PostgREST oddaje max 1000 wierszy na zapytanie — pula > 1000, więc paginujemy .range,
  // inaczej najniższy-heat ogon (np. część approved) wypada z widoku i „znika" z liczników.
  let all=[],err=null;
  for(let off=0;;off+=1000){
    const {data,error}=await sb.from('bud_tt_products').select('*').order('heat',{ascending:false}).order('key',{ascending:true}).range(off,off+999);
    if(error){err=error;break;}
    if(!data||!data.length)break;
    all=all.concat(data);
    if(data.length<1000)break;
  }
  $('loading').style.display='none';
  if(err){toast('Błąd: '+err.message);return;}
  ROWS=all;render();
}
function render(){
  const term=$('q').value.toLowerCase().trim(),fc=$('fcat').value;
  let r=ROWS.filter(x=>{
    if(FSTAT&&x.status!==FSTAT)return false;
    if(fc&&x.category!==fc)return false;
    if(term&&!(x.pl_name||'').toLowerCase().includes(term))return false;
    return true;
  });
  const cnt={pending:0,approved:0,rejected:0,duplicate:0};
  ROWS.forEach(x=>{if(cnt[x.status]!=null)cnt[x.status]++;});
  document.querySelectorAll('#stseg .cnt').forEach(el=>{const k=el.dataset.c;el.textContent=k==='all'?ROWS.length:(cnt[k]||0);});
  const matched=ROWS.filter(x=>x.status==='pending'&&(x.ali_candidates||[]).length).length;
  $('kpis').innerHTML=`<div class="kpi"><b>${ROWS.length}</b> produktów</div><div class="kpi"><b>${cnt.pending}</b> do dopasowania</div><div class="kpi g"><b>${cnt.approved}</b> zatwierdzonych</div>`;
  const total=r.length, pages=Math.max(1,Math.ceil(total/PER));
  if(PAGE>=pages)PAGE=pages-1; if(PAGE<0)PAGE=0;
  const slice=r.slice(PAGE*PER,PAGE*PER+PER);
  $('empty').style.display=total?'none':'block';
  $('cards').innerHTML=slice.map(card).join('');
  renderPager(total,pages);
  healVisible(slice);
  setupVids();
}
// ── WIDEO GRA W KARCIE ── odtwarzacz TikTok montuje się dla produktu w polu widzenia
// i sam startuje (autoplay). Gra TYLKO jeden — najlepiej widoczny — żeby 20 filmów nie
// grało naraz; przewinięcie do innego przełącza. Zejście z ekranu = odmontowanie (stop).
let VIDOBS=null; const VIDR=new Map();
function vidSrc(id){return `https://www.tiktok.com/player/v1/${id}?autoplay=1&loop=1&rel=0&music_info=0&description=0&native_context_menu=0&closed_caption=0&timestamp=0&controls=1&progress_bar=1&play_button=1&volume_control=1&fullscreen_button=1`;}
function mountVid(el){
  if(el.dataset.mounted)return; const id=el.dataset.vidid; if(!id)return;
  el.dataset.mounted='1';
  const f=document.createElement('iframe');
  f.className='vidframe'; f.src=vidSrc(id);
  f.allow='autoplay; fullscreen; encrypted-media'; f.setAttribute('allowfullscreen','');
  el.appendChild(f);
}
function unmountVid(el){ if(!el.dataset.mounted)return; delete el.dataset.mounted; const f=el.querySelector('iframe.vidframe'); if(f)f.remove(); }
function refreshVids(){
  let best=null,bestR=0; VIDR.forEach((r,el)=>{if(r>bestR){bestR=r;best=el;}});
  document.querySelectorAll('.vid[data-vidid]').forEach(el=>{ if(el===best&&bestR>=0.35)mountVid(el); else unmountVid(el); });
}
function setupVids(){
  if(VIDOBS)VIDOBS.disconnect(); VIDR.clear();
  VIDOBS=new IntersectionObserver(ents=>{
    ents.forEach(e=>{ if(e.isIntersecting)VIDR.set(e.target,e.intersectionRatio); else VIDR.delete(e.target); });
    refreshVids();
  },{threshold:[0,0.35,0.6,0.85]});
  document.querySelectorAll('.vid[data-vidid]').forEach(el=>VIDOBS.observe(el));
}
// Miniatury z TikTok CDN to podpisane URL-e z krótkim TTL → wygasają w ~dobę i nie wczytują
// się w panelu. bud-tt-rehost pobiera ŚWIEŻY thumbnail przez oEmbed i wgrywa go na trwałe do
// storage. Robimy to „na widoku" — tylko dla aktualnie wyświetlanych kart (≤20), w paczkach.
const HEALED=new Set(); let HEALING=false;
async function healVisible(slice){
  if(HEALING)return;
  const need=(slice||[]).filter(x=>x.tiktok_url&&!(x.cover||'').includes('/storage/v1/')&&!HEALED.has(x.key));
  if(!need.length)return;
  HEALING=true;
  need.forEach(x=>{const el=$('r-'+x.id);if(el){const v=el.querySelector('.vid');if(v)v.classList.add('healing');}});
  try{
    for(let i=0;i<need.length;i+=6){
      const chunk=need.slice(i,i+6), keys=chunk.map(x=>x.key);
      keys.forEach(k=>HEALED.add(k));
      const {error}=await sb.functions.invoke('bud-tt-rehost',{body:{keys,limit:keys.length}});
      if(error)continue;
      const {data:fresh}=await sb.from('bud_tt_products').select('key,cover').in('key',keys);
      (fresh||[]).forEach(f=>{
        if(!f.cover||!f.cover.includes('/storage/v1/'))return;
        const x=ROWS.find(r=>r.key===f.key);if(!x)return;x.cover=f.cover;
        const el=$('r-'+x.id);if(!el)return;
        const v=el.querySelector('.vid');if(v)v.classList.remove('healing');
        let img=el.querySelector('.vid img');
        if(img){img.style.display='';img.src=f.cover;}
        else if(v){img=document.createElement('img');img.loading='lazy';img.src=f.cover;v.insertBefore(img,v.querySelector('.age')||v.querySelector('.play')||null);}
        // odśwież też referencyjną okładkę w strefie dopasowania
        const rc=el.querySelector('.refCover img'); if(rc)rc.src=f.cover; else{const rcbox=el.querySelector('.refCover');if(rcbox){const ri=document.createElement('img');ri.loading='lazy';ri.src=f.cover;rcbox.prepend(ri);}}
      });
    }
  }catch(e){}finally{
    document.querySelectorAll('.vid.healing').forEach(v=>v.classList.remove('healing'));
    HEALING=false;
  }
}
function renderPager(total,pages){
  const pg=$('pager');if(!pg)return;
  if(total<=PER){pg.innerHTML='';return;}
  const from=PAGE*PER+1,to=Math.min(total,PAGE*PER+PER);
  pg.innerHTML=`<button class="pgbtn" ${PAGE<=0?'disabled':''} onclick="gotoPage(${PAGE-1})">‹ Poprzednia</button>`
    +`<span class="pginfo">Strona <b>${PAGE+1}</b> z ${pages} · ${from}–${to} z ${total}</span>`
    +`<button class="pgbtn" ${PAGE>=pages-1?'disabled':''} onclick="gotoPage(${PAGE+1})">Następna ›</button>`;
}
function gotoPage(p){PAGE=p;render();window.scrollTo({top:0,behavior:'smooth'});}
function statTile(icon,val,lab,gold){return `<div class="stat${gold?' gold':''}"><div class="lab">${I[icon]}${lab}</div><div class="val mono">${val}</div></div>`;}

// ── KARTA PRODUKTU ────────────────────────────────────────────────────────
function card(x){
  const vid=(x.tiktok_url||'').match(/\/video\/(\d+)/)?.[1]||'';
  const days=x.newest_days, hot=days!=null&&days<=14;
  const eng=((x.eng_rate||0)*100).toFixed(1)+'%';
  const heatHi=(x.heat||0)>=48;
  return `<div class="card ${x.status}" id="r-${x.id}">
    <div class="head">
      <div class="vid" ${vid?`data-vidid="${vid}"`:''}>
        <div class="vidph">${I.tiktok}<span>miniatura</span></div>
        ${x.cover?`<img loading=lazy src="${esc(x.cover)}" onerror="this.style.display='none'">`:''}
        ${days!=null?`<div class="age${hot?' hot':''}">${hot?'🔥 ':''}${days}d</div>`:''}
        ${vid?`<div class="play"><span>${I.play}</span></div>`:''}
      </div>
      <div class="meta">
        <div class="metaTop">
          <h3 class="pname">${esc(x.pl_name)}</h3>
          <div class="heat ${heatHi?'hi':''}" title="Heat — siła trendu">${I.flame}${Math.round(x.heat||0)}</div>
          <span class="stbadge ${x.status}">${x.status==='approved'?'Zatwierdzone':x.status==='rejected'?'Odrzucone':x.status==='duplicate'?'Duplikat':'Do dopasowania'}</span>
        </div>
        <div class="metaRow">
          <select class="catsel" onchange="setCat('${x.id}',this.value)">${CATS.map(c=>`<option ${c===x.category?'selected':''}>${c}</option>`).join('')}</select>
          ${days!=null?`<span class="chip">${I.cal} ${hot?'🔥 ':''}${days} dni temu</span>`:''}
          ${x.is_ad?`<span class="chip ad">${I.mega} reklamowany</span>`:''}
          ${x.author?`<span class="chip">${I.user} @${esc(x.author)}${x.author_followers?' · '+fmt(x.author_followers):''}</span>`:''}
        </div>
        <div class="srcLinks">
          ${x.tiktok_url?`<a href="${esc(x.tiktok_url)}" target="_blank" rel="noopener">${I.tiktok} TikTok</a>`:''}
          ${x.shop_url?`<a class="shop" href="${esc(x.shop_url)}" target="_blank" rel="noopener">${I.store} TikTok Shop</a>`:''}
        </div>
        <details class="statfold">
          <summary>${I.info} statystyki wideo</summary>
          <div class="stats">
            ${statTile('bookmark',fmt(x.saves),'Zapisy',true)}
            ${statTile('heart',eng,'Engag.')}
            ${statTile('eye',fmt(x.max_plays),'Odtworz.')}
            ${statTile('msg',fmt(x.comments),'Komentarze')}
            ${statTile('share',fmt(x.shares),'Udost.')}
            ${statTile('flame',x.videos,'Filmów')}
          </div>
        </details>
      </div>
    </div>
    ${x.status!=='rejected'&&x.status!=='duplicate'?matchHtml(x,vid):''}
    ${x.status==='rejected'||x.status==='duplicate'?`<div class="sec"><div class="actions"><button class="btn btn-sm" onclick="reopen('${x.id}')">↩ Przywróć do dopasowania</button></div></div>`:''}
    ${snapHtml(x)}
  </div>`;
}

// ── STREFA DOPASOWANIA: okładka wideo obok kandydatów Ali (porównanie 1:1) ──
function candHtml(x,c){return `<div class="cand${x.chosen_link===c.link?' picked':''}">
  <div class="cimg" onclick="lightbox('${esc(c.img)}')">${c.img?`<img loading=lazy src="${esc(c.img)}">`:''}${x.chosen_link===c.link?`<div class="pickedTag">${I.check}</div>`:''}</div>
  <div class="ci"><div class="pr mono">${esc(c.price||priceOf(c)||'—')}</div><div class="ti">${esc((c.title||'').slice(0,60))}</div></div>
  <div class="crow"><button class="pickbtn" onclick="pick('${x.id}','${esc(c.link)}')">${I.check} Wybierz</button><a class="ext" href="${esc(c.link)}" target="_blank" rel="noopener" title="Otwórz w AliExpress">${I.ext}</a></div>
</div>`;}
function priceOf(c){const k=c&&(c.koszt||c.price);return k&&typeof k==='number'?k+' zł':(k||'');}
function matchHtml(x,vid){
  const cands=x.ali_candidates||[];
  const chosenOutside=x.status==='approved'&&x.chosen_link&&!cands.some(c=>c.link===x.chosen_link);
  return `<div class="sec match">
    <div class="secLab">${I.store} Dopasuj produkt z AliExpress <span class="hint">— porównaj kadry z okładką wideo</span></div>
    <div class="matchGrid">
      <div class="refCol">
        <div class="refCover">${x.cover?`<img loading=lazy src="${esc(x.cover)}">`:''}</div>
        <div class="rl">okładka wideo (do porównania)</div>
      </div>
      <div>
        <div class="cands">${cands.length?cands.map(c=>candHtml(x,c)).join(''):`<div class="nocand">Brak kandydatów z reverse-image (w toku albo kadr-haczyk). Wklej link ręcznie niżej.</div>`}</div>
        <div class="actions">
          <input class="ipt" id="cl-${x.id}" placeholder="…lub wklej własny link do produktu AliExpress" value="${esc(chosenOutside?(x.chosen_link||''):'')}">
          <button class="btn btn-g" onclick="customApprove('${x.id}')">${I.check} Zatwierdź własny</button>
          <button class="btn btn-r" onclick="reject('${x.id}')">${I.x} Odrzuć</button>
          <button class="btn btn-dup" onclick="markDup('${x.id}')" title="Ten produkt już był w radarze">${I.copy} Duplikat</button>
          ${x.reviewed_by?`<span class="chip">${esc(x.reviewed_by)}${x.reviewed_at?' · '+fmtDate(x.reviewed_at):''}</span>`:''}
        </div>
      </div>
    </div>
  </div>`;
}

// ── SNAPSHOT: co realnie pobraliśmy z aukcji (galeria, cena, warianty, OPINIE ze zdjęciami) ──
function snapHtml(x){
  const snap=x.ali_snapshot||null;
  const hasChosen=!!(x.chosen_link||(x.ali_candidates||[]).length);
  if(!snap){
    if(x.status==='rejected'||x.status==='duplicate')return '';
    return `<div class="sec"><details class="snap"><summary>${I.img} Dane produktu z AliExpress <span class="badge">brak snapshotu</span><span class="chev">${I.chev}</span></summary>
      <div class="snapBody"><div class="snapEmpty">Snapshot (galeria, cena, warianty, opinie) zbuduje się przy zatwierdzeniu.${hasChosen?` <button class="btn btn-sm" onclick="rebuildSnap('${x.id}')">↻ Pobierz teraz</button>`:''}</div></div>
    </details></div>`;
  }
  const src=String(snap.source||'');
  let badge='tylko okładka',bcls='';
  if(src==='detail'){badge='pełen detal aukcji';bcls='ok';}
  else if(src==='search'){badge='⚠ z wyszukiwarki — sprawdź czy to TEN produkt';bcls='warn';}
  const imgs=Array.isArray(snap.images)?snap.images.filter(Boolean):[];
  const main=snap.main_image||imgs[0]||'';
  const price=snap.price||null;
  const cur=price&&price.currency?(' '+price.currency):(price?' USD':'');
  const variants=Array.isArray(snap.variants)?snap.variants:[];
  const specs=Array.isArray(snap.specs)?snap.specs:[];
  const reviews=Array.isArray(snap.reviews)?snap.reviews:[];
  const rs=snap.review_stats||null;
  const openAttr=x.status==='approved'?' open':'';
  return `<div class="sec"><details class="snap"${openAttr}>
    <summary>${I.img} Dane produktu z AliExpress <span class="badge ${bcls}">${badge}</span>${snap.fetched_at?`<span class="chip">pobrano ${fmtDate(snap.fetched_at)}</span>`:''}<span class="chev">${I.chev}</span></summary>
    <div class="snapBody">
      <div class="snapTop">
        <div class="gal">
          <div class="galMain" id="gm-${x.id}">${main?`<img src="${esc(main)}" onclick="lightbox(this.src)" style="cursor:zoom-in">`:''}</div>
          ${imgs.length>1?`<div class="galThumbs">${imgs.slice(0,8).map((u,i)=>`<img loading=lazy src="${esc(u)}" class="${i===0?'on':''}" onclick="galSel('${x.id}','${esc(u)}',this)">`).join('')}</div>`:''}
        </div>
        <div class="facts">
          ${price?`<div class="priceRow"><span class="now mono">${esc(String(price.sale))}${cur}</span>${price.original&&price.original>price.sale?`<span class="was mono">${esc(String(price.original))}${cur}</span>`:''}</div>`:''}
          ${snap.title?`<div class="kv"><span class="k">Tytuł aukcji</span><div style="font-size:12px;color:var(--dim);line-height:1.4">${esc(String(snap.title).slice(0,140))}</div></div>`:''}
          ${variants.length?`<div class="kv"><span class="k">Warianty (${variants.length})</span><div class="vlist">${variants.slice(0,12).map(v=>`<span>${esc(String(v).slice(0,26))}</span>`).join('')}</div></div>`:''}
          ${specs.length?`<div class="kv"><span class="k">Specyfikacja</span><div class="specTbl">${specs.slice(0,6).map(s=>`<b>${esc(s.name)}</b><span>${esc(s.value)}</span>`).join('')}</div></div>`:''}
        </div>
      </div>
      ${reviews.length?`<div>
        <div class="secLab">${I.star} Opinie klientów <span class="hint">${rs?`— ${rs.avg?(''+rs.avg+'★'):''}${rs.numRatings?` · ${fmt(rs.numRatings)} ocen`:''}`:''}</span></div>
        <div class="reviews">${reviews.slice(0,16).map(r=>revHtml(r)).join('')}</div>
      </div>`:''}
      ${refHtml(x,snap)}
    </div>
  </details></div>`;
}
function revHtml(r){
  const stars='★'.repeat(Math.max(0,Math.min(5,r.stars||5)));
  const imgs=Array.isArray(r.images)?r.images.filter(Boolean):[];
  const txt=r.text_pl||r.text||'';
  return `<div class="rev">
    ${imgs.length?`<div class="rimg">${imgs.slice(0,3).map(u=>`<img loading=lazy src="${esc(u)}" onclick="lightbox('${esc(u)}')" style="cursor:zoom-in">`).join('')}</div>`:''}
    <div class="rbody"><div class="rstars">${stars}</div>${txt?`<div class="rtext">${esc(txt.slice(0,220))}</div>`:''}<div class="rname">${esc(r.name||'')}${r.date?' · '+esc(String(r.date).slice(0,10)):''}</div></div>
  </div>`;
}
function galSel(id,url,el){const gm=$('gm-'+id);if(gm){let img=gm.querySelector('img');if(!img){img=document.createElement('img');img.onclick=()=>lightbox(img.src);img.style.cursor='zoom-in';gm.appendChild(img);}img.src=url;}el.parentNode.querySelectorAll('img').forEach(t=>t.classList.remove('on'));el.classList.add('on');}

// ── REFERENCJA GENERATORA (curated / snapshot) — co model dostaje jako zdjęcie produktu ──
function refHtml(x,snap){
  const imgsN=snap&&Array.isArray(snap.images)?snap.images.length:0;
  const src=snap?String(snap.source||''):'';
  let badge,cls;
  if(x.curated_image){badge=`${I.check} ręczne zdjęcie admina — pierwsza referencja generatora`;cls='ok';}
  else if(src==='detail'){badge=`${I.check} galeria z wybranego linku (${imgsN} kadrów)`;cls='ok';}
  else if(src==='search'){badge=`⚠ galeria z wyszukiwarki (${imgsN}) — może być INNY produkt`;cls='warn';}
  else{badge='tylko okładka wideo — warto dodać zdjęcie';cls='warn';}
  const thumb=x.curated_image||(snap&&(snap.main_image||((snap.images||[])[0])))||'';
  return `<div class="refbox">
    <div class="refimg${thumb?'':' none'}">${thumb?`<img loading=lazy src="${esc(thumb)}" onclick="lightbox(this.src)" style="cursor:zoom-in" onerror="this.parentNode.classList.add('none');this.remove()">`:'brak'}</div>
    <div class="refmeta">
      <span class="refbadge ${cls}">${badge}</span>
      <div style="font-size:10.5px;color:var(--dim2);line-height:1.4">Tak generator „widzi" produkt na makietach i reklamach. Gdy dopasowanie z wyszukiwarki trafiło w INNY produkt — wklej realne zdjęcie, żeby to naprawić.</div>
      <div class="refrow">
        <input class="ipt" id="ci-${x.id}" placeholder="URL realnego zdjęcia produktu (kopiuj adres obrazka z AliExpress)">
        <button class="btn btn-g btn-sm" onclick="setCurated('${x.id}')">${I.check} Ustaw główne</button>
        ${x.curated_image?`<button class="btn btn-r btn-sm" onclick="clearCurated('${x.id}')">${I.x} Usuń ręczne</button>`:''}
        <button class="btn btn-sm" onclick="rebuildSnap('${x.id}')" title="Świeży snapshot z wybranego linku">↻ Przebuduj</button>
      </div>
    </div>
  </div>`;
}
async function setCurated(id){
  const x=ROWS.find(r=>r.id===id);if(!x)return;
  const v=($('ci-'+id)?.value||'').trim();if(!v){toast('Wklej URL zdjęcia');return;}
  toast('Pobieram i zapisuję zdjęcie…');
  const {data,error}=await sb.functions.invoke('bud-ali-snapshot',{body:{productKey:x.key,curatedUrl:v}});
  if(error||!data||!data.curated_image){toast('Nie udało się pobrać zdjęcia — sprawdź URL');return;}
  x.curated_image=data.curated_image;toast('Zdjęcie główne ustawione ✓');render();
}
async function clearCurated(id){
  const x=ROWS.find(r=>r.id===id);if(!x)return;
  const {error}=await sb.functions.invoke('bud-ali-snapshot',{body:{productKey:x.key,curatedClear:true}});
  if(error){toast('Błąd: '+error.message);return;}
  x.curated_image=null;toast('Usunięto ręczne zdjęcie');render();
}
async function rebuildSnap(id){
  const x=ROWS.find(r=>r.id===id);if(!x)return;
  toast('Przebudowuję snapshot… (do ~30 s)');
  const {data,error}=await sb.functions.invoke('bud-ali-snapshot',{body:{productKey:x.key,force:true}});
  if(error){toast('Błąd przebudowy: '+error.message);return;}
  if(data&&data.snapshot)x.ali_snapshot=data.snapshot;
  else{const {data:fresh}=await sb.from('bud_tt_products').select('ali_snapshot').eq('id',id).maybeSingle();if(fresh)x.ali_snapshot=fresh.ali_snapshot;}
  toast('Snapshot przebudowany ✓');render();
}

// ── PLAYER MODAL (video + dane obok) ──
function openM(id){
  const x=ROWS.find(r=>r.id===id);if(!x)return;
  const vid=(x.tiktok_url||'').match(/\/video\/(\d+)/)?.[1]||'';
  const src=`https://www.tiktok.com/player/v1/${vid}?music_info=0&description=0&rel=0&native_context_menu=0&closed_caption=0&timestamp=0&controls=1&progress_bar=1&play_button=1&volume_control=1&fullscreen_button=1`;
  const eng=((x.eng_rate||0)*100).toFixed(1)+'%';
  $('modalC').innerHTML=`
    <div class="pl"><iframe src="${src}" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe></div>
    <div class="info">
      <h3>${esc(x.pl_name)}</h3>
      <div style="color:var(--dim);font-size:13px;margin-bottom:16px">${esc(x.category||'')} · ${x.newest_days!=null?x.newest_days+' dni temu':''} ${x.is_ad?'· <span style="color:var(--gold)">reklamowany</span>':''}</div>
      <div class="stats" style="grid-template-columns:repeat(2,1fr)">
        ${statTile('bookmark',fmt(x.saves),'Zapisy',true)}
        ${statTile('heart',eng,'Engagement')}
        ${statTile('eye',fmt(x.max_plays),'Odtworzenia')}
        ${statTile('msg',fmt(x.comments),'Komentarze')}
        ${statTile('flame',Math.round(x.heat||0),'Heat')}
        ${statTile('user',fmt(x.author_followers),'Obserwujący')}
      </div>
      ${x.author?`<div style="margin-top:14px;color:var(--dim);font-size:13px;display:flex;align-items:center;gap:7px">${I.user} @${esc(x.author)}</div>`:''}
      <div class="srcLinks" style="margin-top:16px">
        ${x.tiktok_url?`<a href="${esc(x.tiktok_url)}" target="_blank" rel="noopener">${I.tiktok} TikTok</a>`:''}
        ${x.shop_url?`<a class="shop" href="${esc(x.shop_url)}" target="_blank" rel="noopener">${I.store} TikTok Shop</a>`:''}
        ${x.chosen_link?`<a class="shop" href="${esc(x.chosen_link)}" target="_blank" rel="noopener">${I.store} Wybrany produkt</a>`:''}
      </div>
    </div>`;
  $('modal').classList.add('show');
}
function closeM(e,force){if(force||(e&&e.target&&e.target.id==='modal')){$('modal').classList.remove('show');$('modalC').innerHTML='';}}

async function upd(id,patch,msg){
  patch.reviewed_by=ME;patch.reviewed_at=new Date().toISOString();
  const {error}=await sb.from('bud_tt_products').update(patch).eq('id',id);
  if(error){toast('Błąd: '+error.message);return;}
  const x=ROWS.find(r=>r.id===id);if(x)Object.assign(x,patch);
  toast(msg);render();
  // Po zatwierdzeniu: przenieś cover na TRWAŁY URL storage (cover z TikTok CDN to podpisany
  // URL z krótkim TTL → w /sklep gnije w ~dobę). Fire-and-forget, świeży thumb przez oEmbed.
  if(patch.status==='approved'&&x&&x.key){
    try{sb.functions.invoke('bud-tt-rehost',{body:{keys:[x.key]}}).catch(()=>{});}catch(e){}
    // ORAZ: zbuduj snapshot AliExpress i REHOSTUJ GALERIĘ + OPINIE do naszego Storage od razu
    // (req Tomka: zdjęcia zawsze u nas — ae-pic wygasa). force=true = świeży snapshot wybranego.
    if(patch.chosen_link||x.chosen_link){
      toast('Zatwierdzone — pobieram snapshot i opinie…');
      try{
        const {data}=await sb.functions.invoke('bud-ali-snapshot',{body:{productKey:x.key,force:true}});
        if(data&&data.snapshot){x.ali_snapshot=data.snapshot;render();toast('Snapshot i opinie gotowe ✓');}
      }catch(e){}
    }
  }
}
function pick(id,link){upd(id,{chosen_link:link,status:'approved'},'Zatwierdzone');}
function customApprove(id){const v=$('cl-'+id).value.trim();if(!v){toast('Wklej link');return;}upd(id,{chosen_link:v,status:'approved'},'Zatwierdzono własny link');}
function reject(id){upd(id,{status:'rejected'},'Odrzucone');}
function markDup(id){upd(id,{status:'duplicate'},'Oznaczone jako duplikat — już był');}
function reopen(id){upd(id,{status:'pending'},'Przywrócone do dopasowania');}
async function setCat(id,cat){const{error}=await sb.from('bud_tt_products').update({category:cat}).eq('id',id);if(error){toast('Błąd: '+error.message);return;}const x=ROWS.find(r=>r.id===id);if(x)x.category=cat;toast('Kategoria: '+cat);}
init();
</script>
</body>
