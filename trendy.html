<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar produktów TikTok → AliExpress</title>
<link rel="icon" type="image/png" href="https://tomekniedzwiecki.pl/img/logo/tn-logo-icon-88.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@500;600&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#000; --surface:#0c0c0e; --surface2:#141417; --surface3:#1b1b20; --line:#222226; --line2:#2e2e34;
    --text:#ededf0; --dim:#9a9aa3; --dim2:#67676f;
    --gold:#f5b53f; --green:#46b46a; --green-d:#2c6e3d; --blue:#3291ff; --red:#e5484d;
    color-scheme:dark;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Geist','Inter',system-ui,sans-serif;letter-spacing:-.011em;-webkit-font-smoothing:antialiased;height:100vh;overflow:hidden;display:flex;flex-direction:column}
  .mono{font-family:'Geist Mono',ui-monospace,monospace}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#2a2a30;border-radius:99px}::-webkit-scrollbar-track{background:transparent}
  a{color:inherit;text-decoration:none}
  svg{width:16px;height:16px;flex:0 0 auto}
  :focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:8px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  summary{list-style:none;cursor:pointer}summary::-webkit-details-marker{display:none}
  kbd{font-family:'Geist Mono',monospace;font-size:11px;background:var(--surface3);border:1px solid var(--line2);border-radius:5px;padding:1px 6px;color:var(--text)}

  /* HEADER */
  .bar{flex:0 0 auto;background:rgba(8,8,10,.86);border-bottom:1px solid var(--line)}
  .barTop{display:flex;align-items:center;gap:14px;padding:11px 20px 9px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;font-weight:600;font-size:15px}
  .brand .sub{color:var(--dim);font-weight:400}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold)}
  /* LEJEK */
  .funnel{display:flex;gap:6px;align-items:stretch;flex-wrap:wrap}
  .fseg{display:flex;flex-direction:column;align-items:flex-start;gap:0;border:1px solid var(--line);background:var(--surface);color:var(--dim);border-radius:10px;padding:5px 12px;cursor:pointer;transition:.15s;min-width:72px}
  .fseg .fn{font-size:16px;font-weight:700;color:var(--text);line-height:1.15}
  .fseg .fl{font-size:10px;color:var(--dim2);white-space:nowrap}
  .fseg .fl em{font-style:normal;color:var(--gold)}
  .fseg:hover{border-color:var(--line2)}
  .fseg.on{border-color:var(--blue);background:rgba(50,145,255,.08)}
  .fseg.on .fn{color:var(--blue)}
  .fseg.g.on{border-color:var(--green-d);background:rgba(70,180,106,.08)}.fseg.g.on .fn{color:var(--green)}
  .fseg.mm .fn{color:var(--text)}
  .fseg.mm.on{border-color:#5a2326;background:rgba(229,72,77,.1)}.fseg.mm.on .fn{color:var(--red)}
  .fmore{position:relative}
  .fmore>summary{display:flex;align-items:center}
  .fmore>summary .fseg{min-width:0}
  .fmoreMenu{position:absolute;top:100%;right:0;margin-top:6px;background:var(--surface2);border:1px solid var(--line2);border-radius:10px;padding:6px;display:flex;flex-direction:column;gap:2px;z-index:40;min-width:180px;box-shadow:0 12px 30px rgba(0,0,0,.5)}
  .fmoreMenu button{text-align:left;border:0;background:transparent;color:var(--dim);padding:7px 10px;border-radius:7px;font-size:12.5px;cursor:pointer}
  .fmoreMenu button:hover{background:var(--surface3);color:var(--text)}
  .fmoreMenu button.on{color:var(--blue)}
  .refreshBtn{margin-left:auto}
  .controls{display:flex;gap:9px;align-items:center;padding:0 20px 11px;flex-wrap:wrap}
  .ipt,.sel{background:var(--surface);border:1px solid var(--line2);border-radius:9px;padding:8px 12px;font-size:13px;color:var(--text);transition:border-color .15s}
  .ipt:focus,.sel:focus{border-color:var(--blue);outline:none}
  .search{position:relative;flex:1;min-width:170px}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim2)}
  .search .ipt{width:100%;padding-left:34px}
  .seg{display:flex;background:var(--surface);border:1px solid var(--line2);border-radius:9px;padding:3px;gap:2px}
  .seg button{border:0;background:transparent;color:var(--dim);font-size:12px;font-weight:500;padding:6px 12px;border-radius:6px;cursor:pointer;transition:.15s;white-space:nowrap}
  .seg button.on{background:var(--surface2);color:var(--text);box-shadow:0 1px 0 rgba(255,255,255,.04) inset}
  .btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line2);background:var(--surface2);color:var(--text);border-radius:9px;padding:8px 13px;font-size:13px;font-weight:500;cursor:pointer;transition:.15s;white-space:nowrap}
  .btn:hover{border-color:#3a3a42;background:#1b1b1f}
  .btn:disabled{opacity:.5;cursor:default}
  .btn-g{background:var(--green-d);border-color:#3d9450;color:#eafff0}
  .btn-g:hover{background:#368049}
  .btn-r:hover{background:#4a1a1d;border-color:var(--red);color:#ffd7d8}
  .btn-sm{padding:6px 10px;font-size:12px}
  .btn.on{border-color:var(--gold);color:var(--gold)}
  /* CHIPY */
  .filterChips{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:0 20px 11px}
  .filterChips:empty{display:none}
  .chipsep{width:1px;height:20px;background:var(--line)}
  .fchip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:500;padding:6px 12px;border-radius:99px;border:1px solid var(--line2);background:var(--surface);color:var(--dim);cursor:pointer;transition:.15s}
  .fchip:hover{border-color:#3a3a42;color:var(--text)}
  .fchip.on{border-color:var(--green-d);background:rgba(70,180,106,.1);color:var(--green)}
  .fchip.sq.on{border-color:var(--blue);background:rgba(50,145,255,.1);color:var(--blue)}
  .fchip.soff.on{border-color:#5a2326;background:rgba(229,72,77,.1);color:var(--red)}
  .fchip.ssoon.on{border-color:#5a4412;background:rgba(245,181,63,.1);color:var(--gold)}
  .fchip svg{width:13px;height:13px}
  .libBtn.done{background:var(--green-d);border-color:#3d9450;color:#eafff0}

  /* SHELL */
  main{flex:1;min-height:0;overflow:hidden;position:relative}
  .split{display:grid;grid-template-columns:420px 1fr;height:100%}
  .listPane{display:flex;flex-direction:column;min-height:0;border-right:1px solid var(--line)}
  .listHead{padding:8px 14px;font-size:11px;color:var(--dim2);border-bottom:1px solid var(--line);flex:0 0 auto}
  .listBody{overflow-y:auto;flex:1;min-height:0}
  .listMore{padding:12px;text-align:center;flex:0 0 auto}.listMore:empty{display:none}
  .moreBtn{background:var(--surface);border:1px solid var(--line2);color:var(--text);border-radius:9px;padding:8px 16px;font-size:12.5px;cursor:pointer}
  .moreBtn:hover{border-color:var(--gold);color:var(--gold)}

  /* WIERSZ LISTY */
  .row{display:grid;grid-template-columns:48px 1fr;gap:11px;padding:9px 14px;border-bottom:1px solid var(--line);cursor:pointer;border-left:3px solid transparent;transition:background .1s}
  .row:hover{background:var(--surface)}
  .row.sel{background:var(--surface2);border-left-color:var(--gold)}
  .rthumb{width:48px;height:48px;border-radius:8px;overflow:hidden;background:var(--surface3);display:flex;align-items:center;justify-content:center;color:var(--dim2)}
  .rthumb img{width:100%;height:100%;object-fit:cover;display:block}
  .rmain{min-width:0;display:flex;flex-direction:column;gap:5px;justify-content:center}
  .rname{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rmeta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:11.5px;color:var(--dim)}
  .rmeta .sold{font-weight:700;font-size:11px;padding:1px 7px;border-radius:99px;border:1px solid var(--line2);background:var(--surface2)}
  .rmeta .sold.na{color:var(--dim2)}
  .rmeta .sold.g1{color:var(--green);border-color:var(--green-d)}
  .rmeta .sold.g2{color:#7fe0a0;border-color:#3d9450;background:rgba(70,180,106,.14)}
  .rmeta .sold.g3{color:var(--gold);border-color:#7a5a12;background:rgba(245,181,63,.12)}
  .rmeta .rp{color:var(--dim);font-weight:600}
  .rmeta .rsc{color:var(--gold);font-weight:600}
  .rmeta .ic{font-size:11px}
  .rmeta .ic.soff{filter:none}

  /* DETAL */
  .detail{overflow-y:auto;min-height:0}
  .detEmpty{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--dim2)}
  .detEmpty svg{width:34px;height:34px;opacity:.4}
  .detEmpty p{margin:0;font-size:14px}
  .detBar{position:sticky;top:0;z-index:20;background:rgba(8,8,10,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:11px 20px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .detBarBtns{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
  .abtn{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line2);background:var(--surface2);color:var(--text);border-radius:9px;padding:9px 15px;font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s}
  .abtn b{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:5px;background:var(--surface3);font-size:11px;font-weight:700;color:var(--dim)}
  .abtn:hover{border-color:#3a3a42}
  .abtn.ap{background:var(--green-d);border-color:#3d9450;color:#eafff0}.abtn.ap b{background:rgba(0,0,0,.25);color:#eafff0}.abtn.ap:hover{background:#368049}
  .abtn.rj:hover{background:#4a1a1d;border-color:var(--red);color:#ffd7d8}
  .abtn.dp:hover{background:#1a2433;border-color:var(--blue);color:#cfe3ff}
  .rWrap{position:relative}
  .reasonMenu{position:absolute;top:100%;left:0;margin-top:6px;background:var(--surface2);border:1px solid var(--line2);border-radius:10px;padding:6px;display:none;flex-direction:column;gap:2px;z-index:30;min-width:200px;box-shadow:0 12px 30px rgba(0,0,0,.5)}
  .reasonMenu.open{display:flex}
  .reasonMenu button{display:flex;align-items:center;gap:9px;text-align:left;border:0;background:transparent;color:var(--dim);padding:7px 10px;border-radius:7px;font-size:12.5px;cursor:pointer}
  .reasonMenu button:hover{background:var(--surface3);color:var(--text)}
  .reasonMenu b{width:18px;height:18px;display:inline-flex;align-items:center;justify-content:center;border-radius:5px;background:var(--surface3);font-size:11px;flex:0 0 auto}
  .detBack{display:none;align-items:center;gap:5px;border:1px solid var(--line2);background:var(--surface2);color:var(--text);border-radius:8px;padding:8px 12px;font-size:13px;cursor:pointer}
  .detHead{padding:13px 20px 2px}
  .detHeadTop{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:9px}
  .detTitle{margin:0;font-size:17px;font-weight:600;line-height:1.22;flex:1 1 auto;min-width:220px}
  .detHeadRow{display:flex;align-items:center;gap:9px;flex-wrap:wrap}
  .catsel{font-size:11.5px;color:var(--text);background:var(--surface2);border:1px solid var(--line2);border-radius:7px;padding:4px 8px}
  .detMetrics{display:flex;gap:6px;flex-wrap:wrap;padding:0 20px 2px;align-items:center}
  .mtr{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--dim);background:var(--surface);border:1px solid var(--line);border-radius:7px;padding:4px 8px}
  .mtr svg{width:12px;height:12px;color:var(--dim2)}
  .mtr b{color:var(--text);font-weight:700;font-size:12.5px}
  .mtr.sold b{color:var(--green)}
  .mtr.sc b{color:var(--gold)}
  .mtr b.up{color:var(--green)}
  .detMedia{display:grid;grid-template-columns:270px 1fr;gap:18px;padding:14px 20px 8px;align-items:start}
  .detVidCol{display:flex;flex-direction:column;gap:11px;min-width:0}
  /* player sterowany wysokością → pasek „Wideo" i duże zdjęcia mieszczą się nad zgięciem */
  .detVid{position:relative;height:46vh;max-height:460px;aspect-ratio:9/16;border-radius:12px;overflow:hidden;background:#000}
  .detVid .vidframe{position:absolute;inset:0;width:100%;height:100%;border:0;z-index:6;display:block;background:#000}
  .detVid .vposter{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:1;display:block}
  .detVid .vidph{position:absolute;inset:0;z-index:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:var(--dim2);background:linear-gradient(135deg,#1b1b20,#0c0c0e)}
  .detVid .vidph svg{width:26px;height:26px;opacity:.45}
  .detVid .vidph span{font-size:9px;letter-spacing:.05em;text-transform:uppercase}
  .vidBar{display:flex;flex-direction:column;gap:7px}
  .vbTitle{font-size:10.5px;color:var(--dim2);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;gap:6px}
  .vbTitle svg{width:12px;height:12px}
  .vbTiles{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px}
  .vtile{flex:0 0 66px;width:66px;border:1px solid var(--line2);background:var(--surface);border-radius:9px;overflow:hidden;cursor:pointer;padding:0;display:flex;flex-direction:column;transition:border-color .15s,transform .15s}
  .vtile:hover{border-color:#3a3a42;transform:translateY(-2px)}
  .vtile.on{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
  .vtile .vth{position:relative;width:100%;aspect-ratio:9/16;background:#000}
  .vtile .vth img{width:100%;height:100%;object-fit:cover;display:block}
  .vtile .vthph{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--dim2)}
  .vtile .vthph svg{width:15px;height:15px}
  .vtile .vcap{font-size:8.5px;color:var(--dim);padding:3px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center}
  .detImgCol{display:flex;flex-direction:column;gap:10px;min-width:0}
  .detGal{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;align-content:start}
  .gcard{margin:0;position:relative;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:#fff;cursor:zoom-in;display:block}
  .gcard img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
  .gcard figcaption{position:absolute;left:0;right:0;bottom:0;font-size:8.5px;color:#fff;background:linear-gradient(0deg,rgba(0,0,0,.78),transparent);padding:9px 6px 4px;text-transform:uppercase;letter-spacing:.04em}
  .galNone{color:var(--dim2);display:flex;align-items:center;gap:7px;font-size:12px;padding:10px 0;line-height:1.4}
  .detTraction{margin-top:8px;padding:11px 20px;font-size:12px;color:var(--dim);border-top:1px solid var(--line);display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .detTraction svg{width:13px;height:13px;color:var(--dim2)}
  .detLinks{display:flex;gap:8px;flex-wrap:wrap;padding:12px 20px 40px}
  .detLinks a{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--dim);border:1px solid var(--line2);border-radius:8px;padding:6px 11px}
  .detLinks a:hover{color:var(--text);border-color:#3a3a42;background:var(--surface2)}
  .detLinks a.shop:hover{color:var(--green)}
  .chosenLink{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--dim);margin-bottom:12px;flex-wrap:wrap}
  .chosenLink>svg{width:13px;height:13px;color:var(--green)}
  .chosenLink a{display:inline-flex;align-items:center;gap:5px;color:var(--gold)}
  .chosenLink a svg{width:12px;height:12px;color:var(--gold)}
  .shopDetails{border-top:1px solid var(--line)}
  .shopDetails>summary{list-style:none;cursor:pointer;padding:14px 20px;font-size:12px;color:var(--dim);display:flex;align-items:center;gap:8px;font-weight:600}
  .shopDetails>summary::-webkit-details-marker{display:none}
  .shopDetails>summary>svg{width:14px;height:14px;color:var(--dim2)}
  .shopDetails>summary::after{content:'▾';margin-left:auto;color:var(--dim2);font-size:11px}
  .shopDetails[open]>summary::after{content:'▴'}
  .shopDetails>summary:hover{color:var(--text)}
  .sdBadge{font-size:10px;color:var(--gold);background:rgba(245,181,63,.1);border:1px solid #5a4412;border-radius:99px;padding:1px 8px;margin-left:2px}
  .shopDetailsBody{padding:0 20px 18px}

  /* BADGE'e (współdzielone) */
  .stbadge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:99px;border:1px solid var(--line2);color:var(--dim)}
  .stbadge.approved{color:var(--green);border-color:var(--green-d);background:rgba(70,180,106,.08)}
  .stbadge.rejected{color:var(--red);border-color:#5a2326}
  .stbadge.duplicate{color:var(--blue);border-color:#234a6e;background:rgba(50,145,255,.08)}
  .stbadge.pending{color:var(--gold);border-color:#5a4412;background:rgba(245,181,63,.06)}
  .mmBadge{display:inline-flex;align-items:center;gap:4px;font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:99px;border:1px solid #5a2326;background:rgba(229,72,77,.1);color:var(--red)}
  .originBadge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:7px;border:1px solid #234a6e;background:rgba(50,145,255,.08);color:var(--blue)}
  .originBadge svg{width:11px;height:11px}
  .seasonBadge{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:4px 11px;border-radius:99px;border:1px solid var(--line2);background:var(--surface2);color:var(--dim)}
  .seasonBadge.ay{font-weight:600}
  .seasonBadge.in{border-color:#234a6e;background:rgba(50,145,255,.1);color:var(--blue)}
  .seasonBadge.soon{border-color:#5a4412;background:rgba(245,181,63,.1);color:var(--gold)}
  .seasonBadge.off{border-color:#5a2326;background:rgba(229,72,77,.1);color:var(--red)}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--dim);background:var(--surface2);border:1px solid var(--line);border-radius:7px;padding:3px 8px}
  .chip svg{width:12px;height:12px}
  .chip.a{cursor:pointer}.chip.a:hover{border-color:#3a3a42;color:var(--text)}
  .srcLinks{display:flex;gap:8px;flex-wrap:wrap}
  .srcLinks a{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;color:var(--dim);border:1px solid var(--line2);border-radius:8px;padding:5px 10px;transition:.15s}
  .srcLinks a:hover{color:var(--text);border-color:#3a3a42;background:var(--surface2)}
  .srcLinks a.shop:hover{color:var(--green)}

  /* SEKCJE detalu */
  .sec{border-top:1px solid var(--line);padding:15px 20px}
  .secLab{font-size:11px;color:var(--dim2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;display:flex;align-items:center;gap:7px}
  .secLab svg{width:13px;height:13px}
  .secLab .hint{text-transform:none;letter-spacing:0;color:var(--dim2);font-weight:400;margin-left:2px}
  .match{background:rgba(255,255,255,.012)}
  .cands{display:grid;grid-template-columns:repeat(auto-fill,minmax(132px,1fr));gap:10px}
  .cand{border:1px solid var(--line);border-radius:11px;overflow:hidden;background:var(--surface);display:flex;flex-direction:column;transition:border-color .15s,transform .15s}
  .cand:hover{border-color:#3a3a42;transform:translateY(-2px)}
  .cand.picked{border-color:var(--green);box-shadow:0 0 0 1px var(--green),0 0 18px rgba(70,180,106,.18)}
  .cand .cimg{position:relative;aspect-ratio:1;background:#fff;cursor:zoom-in}
  .cand .cimg img{width:100%;height:100%;object-fit:cover;display:block}
  .cand .pickedTag{position:absolute;top:6px;right:6px;background:var(--green);color:#04130a;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
  .cand .pickedTag svg{width:14px;height:14px;color:#04130a}
  .cand .ci{padding:8px 9px;display:flex;flex-direction:column;gap:5px;flex:1}
  .cand .pr{font-size:13px;font-weight:600;color:var(--green)}
  .cand .ti{font-size:10.5px;color:var(--dim);line-height:1.35;max-height:29px;overflow:hidden}
  .cand .crow{display:flex;gap:6px;padding:0 9px 9px;margin-top:auto}

const _mmddPL=s=>{const m=/^(\d{2})-(\d{2})$/.exec(s||'');return m?`${m[2]}.${m[1]}`:'';};

async function load(){
  $('loading').style.display='flex';
  // PostgREST oddaje max 1000 wierszy — paginujemy .range, inaczej ogon puli wypada z widoku.
  let all=[],err=null;
  for(let off=0;;off+=1000){

// workflow_products.bud_key już w bibliotece CRM (RLS: authenticated SELECT; paginacja jak wyżej).
async function fetchLibrary(){
  try{
    INLIB.clear();
    for(let off=0;;off+=1000){
      const {data,error}=await sb.from('workflow_products').select('bud_key').not('bud_key','is',null).range(off,off+999);
      if(error||!data||!data.length)break;
      data.forEach(r=>{if(r.bud_key)INLIB.add(r.bud_key);});
      if(data.length<1000)break;
    }
  }catch(e){}
}

// ── SYGNAŁY PRODUKTU ──
function _sold0(x){return (x.tt_shop&&x.tt_shop.sold_count!=null)?+x.tt_shop.sold_count:null;}
function _ttU(x){return (x.tt_shop&&x.tt_shop.price_real!=null)?+x.tt_shop.price_real:null;}
function _newness(x){
  const t=Date.parse(x.created_at||x.inserted_at||x.first_seen||'');
  if(!isNaN(t))return t;
  return x.newest_days!=null? -x.newest_days*86400000 : -Infinity;
}
function _packshots(x){
  const s=x.tt_shop||{};
  const h=Array.isArray(s.images_hosted)?s.images_hosted.filter(Boolean):[];
  if(h.length)return h;
  const i=Array.isArray(s.images)?s.images.filter(Boolean):[];
  return i;
}
function _thumb(x){const p=_packshots(x);return p.length?p[0]:(x.cover||'');}
function _qReady(x){const s=x.tt_shop||{};const price=s.price_real!=null||s.price_display;return s.sold_count!=null&&!!price&&_packshots(x).length>0;}
function _qDogrywka(x){return !x.shop_url&&!x.tt_shop;}
function _qNopack(x){return (!!x.tt_shop||!!x.shop_url)&&_packshots(x).length===0;}
function soldClass(n){if(n==null)return 'na';if(n<10000)return 'g1';if(n<=50000)return 'g2';return 'g3';}

// ── FILTRY / SORT ──
function rowInFunnel(x){
  if(FSTAT==='pending')return x.status==='pending';
  if(FSTAT==='approved')return x.status==='approved';
  if(FSTAT==='inlib')return x.status==='approved'&&!!x.key&&INLIB.has(x.key);
  if(FSTAT==='mismatch')return x.ali_mismatch===true;
  if(FSTAT==='rejected')return x.status==='rejected';
  if(FSTAT==='duplicate')return x.status==='duplicate';
  return true;
}
function rowMatches(x){
  if(!x)return false;
  if(!rowInFunnel(x))return false;
  const fc=$('fcat').value; if(fc&&x.category!==fc)return false;
  const term=$('q').value.toLowerCase().trim(); if(term&&!(x.pl_name||'').toLowerCase().includes(term))return false;
  if(FSTAT==='pending'&&SUBQ){
    if(SUBQ==='ready'&&!_qReady(x))return false;
    if(SUBQ==='dogrywka'&&!_qDogrywka(x))return false;
    if(SUBQ==='nopack'&&!_qNopack(x))return false;
  }
  if(FPROOF&&!(x.tt_shop&&+x.tt_shop.sold_count>0))return false;
  if(FSEASONOFF&&!_seasonOff(x))return false;
  if(FSEASONSOON&&!_seasonSoon(x))return false;
  return true;
}
function sortRows(r){
  if(SORT==='score'){r.sort((a,b)=>((b.product_score==null?-1:b.product_score)-(a.product_score==null?-1:a.product_score)));return;}
  if(SORT==='price'){r.sort((a,b)=>{const pa=_ttU(a),pb=_ttU(b);return (pa==null?Infinity:pa)-(pb==null?Infinity:pb);});return;}
  if(SORT==='new'){r.sort((a,b)=>_newness(b)-_newness(a));return;}
  // 'sales' domyślne: sold desc NULLS LAST → potem score desc
  r.sort((a,b)=>{
    const sa=_sold0(a),sb2=_sold0(b);
    if(sa==null&&sb2==null)return (b.product_score==null?-1:b.product_score)-(a.product_score==null?-1:a.product_score);
    if(sa==null)return 1; if(sb2==null)return -1;
    return (sb2-sa)||((b.product_score==null?-1:b.product_score)-(a.product_score==null?-1:a.product_score));
  });
}
function applyFilters(){LISTROWS=ROWS.filter(rowMatches);sortRows(LISTROWS);}

function updateToolbar(){

function counts(){
  let pending=0,approved=0,inlib=0,exportable=0,mismatch=0,rejected=0,duplicate=0;
  ROWS.forEach(x=>{
    if(x.status==='pending')pending++;
    else if(x.status==='approved'){approved++;const has=x.key&&INLIB.has(x.key);if(has)inlib++;else if(x.tt_shop&&+x.tt_shop.sold_count>0)exportable++;}
    else if(x.status==='rejected')rejected++;
    else if(x.status==='duplicate')duplicate++;
    if(x.ali_mismatch===true)mismatch++;
  });
  return {pending,approved,inlib,exportable,mismatch,rejected,duplicate};
}
function renderFunnel(){
  const c=counts();

    <button class="${FSTAT==='duplicate'?'on':''}" onclick="setFunnel('duplicate')">Duplikaty · ${c.duplicate}</button>
    <button class="${FSTAT===''?'on':''}" onclick="setFunnel('')">Wszystkie · ${ROWS.length}</button>
  </div></details>`;
  $('funnel').innerHTML=h;
}

  }

// Zbiorowe odrzucenie „po sezonie" — pending seasonal poza oknem → rejected (auto-season).
async function rejectSeasonOff(){
  const targets=ROWS.filter(x=>x.status==='pending'&&_seasonOff(x)&&x.id);
  if(!targets.length){toast('Brak produktów po sezonie do odrzucenia');return;}
  if(!confirm(`Odrzucić ${targets.length} produktów po sezonie? Znikną z listy „do decyzji".`))return;
  toast('Odrzucam '+targets.length+' po sezonie…');
  const ids=targets.map(x=>x.id), now=new Date().toISOString();
  // Bez reject_reason: to auto-akcja (reviewed_by='auto-season' ją znaczy) — nie zaśmiecamy kubełków strojenia auto-filtra.
  const{error}=await sb.from('bud_tt_products').update({status:'rejected',reviewed_by:'auto-season',reviewed_at:now}).in('id',ids);
  if(error){toast('Błąd: '+error.message);return;}
  targets.forEach(x=>{x.status='rejected';x.reviewed_by='auto-season';x.reviewed_at=now;});
  toast(`Odrzucono ${targets.length} po sezonie ✓`);
  SELID=null;render();
}

function _detailVideos(x,mainVid){
  const out=[], seen=new Set();

// ── DECYZJE (approve/reject/dup/reopen) — wspólny przepływ: aktualizacja + usunięcie wiersza + następny ──
async function decideRun(id,patch,msg){
  const wasSel=SELID===id, nextId=wasSel?neighborId(id):SELID;

  if(ok===false)return;
  postMutate(id,wasSel,nextId);
}
function postMutate(id,wasSel,nextId){
  const x=ROWS.find(r=>r.id===id);
  if(!rowMatches(x)){dropListRow(id);if(wasSel)SELID=nextId;}
  renderFunnel(); renderChips();
  if(SELID){if(!$('row-'+SELID))renderList();markSelected();renderDetail(SELID);scrollSelIntoView();}

// Rdzeń zapisu — reviewed_by/at, szybki UPDATE + potriggery (rehost/snapshot/shop) w tle. Zwraca bool.
async function upd(id,patch,msg){
  patch.reviewed_by=ME; patch.reviewed_at=new Date().toISOString();
  const {error}=await sb.from('bud_tt_products').update(patch).eq('id',id);
  if(error){toast('Błąd: '+error.message);return false;}
  const x=ROWS.find(r=>r.id===id); if(x)Object.assign(x,patch);
  toast(msg);
  if(patch.status==='approved'&&x&&x.key)postApprove(x,patch);
  return true;
}
// Potriggery zatwierdzenia (fire-and-forget, nie blokują przejścia do następnego): cover→storage,
// snapshot Ali + opinie (gdy jest link), TikTok Shop + WYNIK. Detal odświeżamy tylko jeśli wciąż wybrany.
async function postApprove(x,patch){
  const id=x.id;
  try{sb.functions.invoke('bud-tt-rehost',{body:{keys:[x.key]}}).catch(()=>{});}catch(e){}
  if(patch.chosen_link||x.chosen_link){
    try{
      const {data}=await sb.functions.invoke('bud-ali-snapshot',{body:{productKey:x.key,force:true}});
      if(data&&data.snapshot){
        x.ali_snapshot=data.snapshot;if(SELID===id)renderDetail(id);
        // GATE 17.07 (incydent Latarka): snapshot NIE-detail = dane/galeria mogą być z INNEJ
        // aukcji — alarmuj od razu przy zatwierdzeniu, nie po cichu (fabryka i tak zablokuje).
        if(data.snapshot.source!=='detail')
          toast('⚠️ Snapshot NIE pochodzi z aukcji (source='+(data.snapshot.source||'?')+') — podmień link na żywą aukcję, inaczej fabryka zablokuje produkt',6000);
      } else {
        toast('⚠️ Nie udało się pobrać snapshotu z aukcji — sprawdź link',6000);
      }
    }catch(e){toast('⚠️ Snapshot Ali nie powstał ('+(e&&e.message||'błąd')+') — sprawdź link',6000);}
  }
  try{
    await sb.functions.invoke('bud-tt-shop',{body:{key:x.key}});
    const {data:fr}=await sb.from('bud_tt_products').select('tt_shop,product_score,score_meta').eq('id',id).maybeSingle();
    if(fr){x.tt_shop=fr.tt_shop;x.product_score=fr.product_score;x.score_meta=fr.score_meta;renderFunnel();
      const t=$('thumb-'+id);if(t)t.src=safeUrl(_thumb(x));
      if(SELID===id)renderDetail(id);
      if(fr.tt_shop&&fr.tt_shop.sold_count!=null)toast('Wynik: '+fr.product_score+' · '+fmt(fr.tt_shop.sold_count)+' sprzedanych ✓');}
  }catch(e){}
}

// ── LECZENIE COVERÓW ── podpisane URL-e TikTok CDN wygasają ~dobę; bud-tt-rehost wgrywa świeży
// thumbnail (oEmbed) do storage. Robimy „na widoku" — tylko dla widocznej strony listy, w paczkach po 6.
async function healVisible(slice){
  if(HEALING)return;
  const need=(slice||[]).filter(x=>x.tiktok_url&&!(x.cover||'').includes('/storage/v1/')&&!HEALED.has(x.key));
  if(!need.length)return;
  HEALING=true;
  try{
    for(let i=0;i<need.length;i+=6){
      const chunk=need.slice(i,i+6), keys=chunk.map(x=>x.key);
      keys.forEach(k=>HEALED.add(k));
      const {error}=await sb.functions.invoke('bud-tt-rehost',{body:{keys,limit:keys.length}});
      if(error)continue;
      const {data:fresh}=await sb.from('bud_tt_products').select('key,cover').in('key',keys);
      (fresh||[]).forEach(f=>{
        if(!f.cover||!f.cover.includes('/storage/v1/'))return;
        const x=ROWS.find(r=>r.key===f.key);if(!x)return;x.cover=f.cover;
        const t=$('thumb-'+x.id);if(t)t.src=safeUrl(_thumb(x));
        if(SELID===x.id){const dv=$('detVid');const im=dv&&dv.querySelector('.vposter');if(im)im.src=safeUrl(f.cover);}
      });
    }
  }catch(e){}finally{HEALING=false;}
}
// ── TEMPO SPRZEDAŻY ── delta/tydzień z bud_tt_shop_history (≥2 snapshoty). Dociągane dla widocznej strony.
async function loadHistory(slice){
  const keys=(slice||[]).filter(x=>x.tt_shop&&x.key&&!HISTFETCHED.has(x.key)).map(x=>x.key);
  if(!keys.length)return;
  keys.forEach(k=>HISTFETCHED.add(k));
  try{
    const {data,error}=await sb.from('bud_tt_shop_history').select('key,sold_count,captured_at').in('key',keys);
    if(error||!data)return;
    const byKey={};
    data.forEach(h=>{(byKey[h.key]=byKey[h.key]||[]).push(h);});
    let changed=false;
    Object.keys(byKey).forEach(k=>{
      const rows=byKey[k]; if(rows.length<2)return;
      rows.sort((a,b)=>(Date.parse(a.captured_at)||0)-(Date.parse(b.captured_at)||0));
      const first=rows[0], last=rows[rows.length-1];
      if(first.sold_count==null||last.sold_count==null)return;
      const days=(Date.parse(last.captured_at)-Date.parse(first.captured_at))/86400000;
      if(!(days>0))return;
      const perWeek=Math.round((+last.sold_count - +first.sold_count)/days*7);
      HIST.set(k,perWeek); changed=true;
    });
    if(changed&&SELID){
      const sx=ROWS.find(r=>r.id===SELID);
      if(sx&&sx.key){const dw=HIST.get(sx.key);const d=$('detDelta'),w=$('detDeltaWrap');if(d&&w&&dw!=null&&dw>0){d.textContent='+'+fmt(dw);w.style.display='';}}
    }
  }catch(e){}
}

  else if(src==='search'){badge='⚠ z wyszukiwarki — sprawdź czy to TEN produkt';bcls='warn';}
  const imgs=Array.isArray(snap.images)?snap.images.filter(Boolean):[];
  const main=snap.main_image||imgs[0]||'';
  const price=snap.price||null;
  const cur=price&&price.currency?(' '+price.currency):(price?' USD':'');
  const variants=Array.isArray(snap.variants)?snap.variants:[];
  const specs=Array.isArray(snap.specs)?snap.specs:[];
  const reviews=Array.isArray(snap.reviews)?snap.reviews:[];
  const rs=snap.review_stats||null;
  return `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap"><span class="refbadge ${bcls}">${badge}</span>${snap.fetched_at?`<span class="chip">${I.cal} pobrano ${fmtDate(snap.fetched_at)}</span>`:''}${x.chosen_link&&safeUrl(x.chosen_link)?`<a class="chip a" href="${esc(safeUrl(x.chosen_link))}" target="_blank" rel="noopener">${I.ext} otwórz aukcję</a>`:''}</div>
    <div class="snapTop">
      <div class="gal">
        <div class="galMain" id="gm-${x.id}">${safeUrl(main)?`<img src="${esc(safeUrl(main))}" onclick="lightbox(this.src)" style="cursor:zoom-in">`:''}</div>
        ${imgs.length>1?`<div class="galThumbs">${imgs.slice(0,8).map((u,i)=>safeUrl(u)?`<img loading="lazy" src="${esc(safeUrl(u))}" class="${i===0?'on':''}" onclick="galSel('${x.id}','${esc(safeUrl(u))}',this)">`:'').join('')}</div>`:''}
      </div>
      <div class="facts">
        ${price?`<div class="priceRow"><span class="now mono">${esc(String(price.sale))}${cur}</span>${price.original&&price.original>price.sale?`<span class="was mono">${esc(String(price.original))}${cur}</span>`:''}</div>`:''}
        ${snap.title?`<div class="kv"><span class="k">Tytuł aukcji</span><div style="font-size:12px;color:var(--dim);line-height:1.4">${esc(String(snap.title).slice(0,140))}</div></div>`:''}
        ${variants.length?`<div class="kv"><span class="k">Warianty (${variants.length})</span><div class="vlist">${variants.slice(0,12).map(v=>`<span>${esc(String(v).slice(0,26))}</span>`).join('')}</div></div>`:''}
        ${specs.length?`<div class="kv"><span class="k">Specyfikacja</span><div class="specTbl">${specs.slice(0,6).map(s=>`<b>${esc(s.name)}</b><span>${esc(s.value)}</span>`).join('')}</div></div>`:''}
      </div>
    </div>
    ${reviews.length?`<div style="margin-top:16px">
      <div class="secLab">${I.star} Opinie AliExpress <span class="hint">${rs?`— ${rs.avg?(''+rs.avg+'★'):''}${rs.numRatings?` · ${fmt(rs.numRatings)} ocen`:''}`:''}</span></div>
      <div class="reviews">${reviews.slice(0,16).map(r=>revHtml(r)).join('')}</div>
    </div>`:''}
    ${refHtml(x,snap)}
  `;
}
function shopPanelHtml(x,shop){
  if(!shop){
    return `<div class="shopEmpty">${x.shop_url
      ? `Nie pobrano jeszcze danych z TikTok Shop. <button class="btn btn-sm" onclick="pullShop('${x.id}')">↻ Pobierz teraz</button>`
      : `Ten produkt nie ma linku do TikTok Shop — film go nie podlinkował, więc realnej sprzedaży nie znamy.`}</div>`;
  }
  const m=x.score_meta||{};
  const imgs=Array.isArray(shop.images)?shop.images.filter(Boolean):[];
  return `
    <div class="shopStats">
      ${statTile('cart',shop.sold_count!=null?fmt(shop.sold_count):'—','Sprzedane',true)}
      ${statTile('tag',shop.price_display||(shop.price_real!=null?((shop.currency_symbol||'')+shop.price_real):'—'),'Cena rynkowa')}
      ${statTile('trend',m.markup_x?('×'+m.markup_x):'—','Narzut vs Ali')}
      ${statTile('star',shop.rating?(shop.rating+'★'):'—','Ocena')}
      ${statTile('msg',shop.review_count!=null?fmt(shop.review_count):'—','Opinie')}
      ${statTile('box',shop.stock!=null?fmt(shop.stock):'—','Stan mag.')}
    </div>
    ${imgs.length?`<div class="galThumbs" style="margin-top:13px">${imgs.slice(0,8).map(u=>safeUrl(u)?`<img loading="lazy" src="${esc(safeUrl(u))}" onclick="lightbox('${esc(safeUrl(u))}')" style="width:56px;height:56px;cursor:zoom-in">`:'').join('')}</div>`:''}
    <div class="srcLinks" style="margin-top:14px">
      ${x.shop_url&&safeUrl(x.shop_url)?`<a href="${esc(safeUrl(x.shop_url))}" target="_blank" rel="noopener">${I.tiktok} Otwórz w TikTok Shop</a>`:''}
      ${shop.fetched_at?`<span class="chip">${I.cal} pobrano ${fmtDate(shop.fetched_at)}</span>`:''}
      <button class="btn btn-sm" onclick="pullShop('${x.id}')">↻ Odśwież</button>
    </div>
  `;
}
async function pullShop(id){
  const x=ROWS.find(r=>r.id===id);if(!x)return;
  if(!x.shop_url){toast('Ten produkt nie ma linku TikTok Shop');return;}
  toast('Pobieram dane TikTok Shop…');
  try{
    await sb.functions.invoke('bud-tt-shop',{body:{key:x.key}});
    const {data:fr}=await sb.from('bud_tt_products').select('tt_shop,product_score,score_meta').eq('id',id).maybeSingle();
    if(fr){x.tt_shop=fr.tt_shop;x.product_score=fr.product_score;x.score_meta=fr.score_meta;renderFunnel();const t=$('thumb-'+id);if(t)t.src=safeUrl(_thumb(x));if(SELID===id)renderDetail(id);toast('Dane TikTok Shop zaktualizowane ✓');}
    else toast('Brak zmian');
  }catch(e){toast('Błąd pobierania Shop');}
}
function revHtml(r){
  const stars='★'.repeat(Math.max(0,Math.min(5,r.stars||5)));
  const imgs=Array.isArray(r.images)?r.images.filter(Boolean):[];
  const txt=r.text_pl||r.text||'';
  return `<div class="rev">
    ${imgs.length?`<div class="rimg">${imgs.slice(0,3).map(u=>safeUrl(u)?`<img loading="lazy" src="${esc(safeUrl(u))}" onclick="lightbox('${esc(safeUrl(u))}')" style="cursor:zoom-in">`:'').join('')}</div>`:''}
    <div class="rbody"><div class="rstars">${stars}</div>${txt?`<div class="rtext">${esc(txt.slice(0,220))}</div>`:''}<div class="rname">${esc(r.name||'')}${r.date?' · '+esc(String(r.date).slice(0,10)):''}</div></div>
  </div>`;
}
function galSel(id,url,el){const gm=$('gm-'+id);if(gm){let img=gm.querySelector('img');if(!img){img=document.createElement('img');img.onclick=()=>lightbox(img.src);img.style.cursor='zoom-in';gm.appendChild(img);}img.src=safeUrl(url);}el.parentNode.querySelectorAll('img').forEach(t=>t.classList.remove('on'));el.classList.add('on');}
// Referencja generatora (curated / snapshot) — co model dostaje jako zdjęcie produktu.
function refHtml(x,snap){
  const imgsN=snap&&Array.isArray(snap.images)?snap.images.length:0;
  const src=snap?String(snap.source||''):'';
  let badge,cls;
  if(x.curated_image){badge=`${I.check} ręczne zdjęcie admina — pierwsza referencja generatora`;cls='ok';}
  else if(src==='detail'){badge=`${I.check} galeria z wybranego linku (${imgsN} kadrów)`;cls='ok';}
  else if(src==='search'){badge=`⚠ galeria z wyszukiwarki (${imgsN}) — może być INNY produkt`;cls='warn';}
  else{badge='tylko okładka wideo — warto dodać zdjęcie';cls='warn';}
  const thumb=x.curated_image||(snap&&(snap.main_image||((snap.images||[])[0])))||'';
  return `<div class="refbox">
    <div class="refimg${safeUrl(thumb)?'':' none'}">${safeUrl(thumb)?`<img loading="lazy" src="${esc(safeUrl(thumb))}" onclick="lightbox(this.src)" style="cursor:zoom-in" onerror="this.parentNode.classList.add('none');this.remove()">`:'brak'}</div>
    <div class="refmeta">
      <span class="refbadge ${cls}">${badge}</span>
      <div style="font-size:10.5px;color:var(--dim2);line-height:1.4">Tak generator „widzi" produkt na makietach i reklamach. Gdy dopasowanie z wyszukiwarki trafiło w INNY produkt — wklej realne zdjęcie, żeby to naprawić.</div>
      <div class="refrow">
        <input class="ipt" id="ci-${x.id}" placeholder="URL realnego zdjęcia produktu (kopiuj adres obrazka z AliExpress)">
        <button class="btn btn-g btn-sm" onclick="setCurated('${x.id}')">${I.check} Ustaw główne</button>
        ${x.curated_image?`<button class="btn btn-r btn-sm" onclick="clearCurated('${x.id}')">${I.x} Usuń ręczne</button>`:''}
        <button class="btn btn-sm" onclick="rebuildSnap('${x.id}')" title="Świeży snapshot z wybranego linku">↻ Przebuduj</button>
      </div>
    </div>
  </div>`;
}
async function setCurated(id){
  const x=ROWS.find(r=>r.id===id);if(!x)return;
  const v=($('ci-'+id)?.value||'').trim();if(!v){toast('Wklej URL zdjęcia');return;}
  toast('Pobieram i zapisuję zdjęcie…');
  const {data,error}=await sb.functions.invoke('bud-ali-snapshot',{body:{productKey:x.key,curatedUrl:v}});
  if(error||!data||!data.curated_image){toast('Nie udało się pobrać zdjęcia — sprawdź URL');return;}
  x.curated_image=data.curated_image;toast('Zdjęcie główne ustawione ✓');if(SELID===id)renderDetail(id);
}
async function clearCurated(id){
  const x=ROWS.find(r=>r.id===id);if(!x)return;
  const {error}=await sb.functions.invoke('bud-ali-snapshot',{body:{productKey:x.key,curatedClear:true}});
  if(error){toast('Błąd: '+error.message);return;}
  x.curated_image=null;toast('Usunięto ręczne zdjęcie');if(SELID===id)renderDetail(id);
}
async function rebuildSnap(id){
  const x=ROWS.find(r=>r.id===id);if(!x)return;
  toast('Przebudowuję snapshot… (do ~30 s)');
  const {data,error}=await sb.functions.invoke('bud-ali-snapshot',{body:{productKey:x.key,force:true}});
  if(error){toast('Błąd przebudowy: '+error.message);return;}
  if(data&&data.snapshot)x.ali_snapshot=data.snapshot;
  else{const {data:fresh}=await sb.from('bud_tt_products').select('ali_snapshot').eq('id',id).maybeSingle();if(fresh)x.ali_snapshot=fresh.ali_snapshot;}
  toast('Snapshot przebudowany ✓');if(SELID===id)renderDetail(id);
}

// ── WIDOK TABELA (zatwierdzone: koszt Ali / cena TikTok Shop / zysk / marża) ──
const _aliU=x=>(x.score_meta&&x.score_meta.ali_usd!=null)?+x.score_meta.ali_usd:null;
const _aliPln=x=>{const u=_aliU(x);return u!=null?Math.round(u*4):null;};
const _ttPln=x=>{const u=_ttU(x);return u!=null?Math.round(u*4):null;};
const _zysk=x=>{const a=_aliU(x),t=_ttU(x);return (a!=null&&t!=null)?Math.round((t-a)*4):null;};
const _marza=x=>{const a=_aliU(x),t=_ttU(x);return (a!=null&&t!=null&&t>0)?Math.round((t-a)/t*100):null;};
const _mk=x=>(x.score_meta&&x.score_meta.markup_x!=null)?+x.score_meta.markup_x:null;
const _sold=x=>(x.tt_shop&&x.tt_shop.sold_count!=null)?+x.tt_shop.sold_count:null;
const _shortR=s=>String(s||'').replace(/\.\d+/g,'').replace(/\s*-\s*/,'–');
const TCOLS=[
  {k:'name',lab:'Produkt',txt:x=>(x.pl_name||'').toLowerCase()},
  {k:'cat',lab:'Kategoria',txt:x=>x.category||''},
  {k:'ali',lab:'Koszt Ali',num:_aliPln},
  {k:'tt',lab:'Cena TikTok Shop',num:_ttPln},
  {k:'zysk',lab:'Zysk/szt',num:_zysk},
  {k:'marza',lab:'Marża %',num:_marza},
  {k:'narzut',lab:'Narzut',num:_mk},
  {k:'sold',lab:'Sprzedane',num:_sold},
  {k:'score',lab:'Wynik',num:x=>x.product_score},
];
function sortTable(k){
  if(TSORT.col===k)TSORT.dir*=-1;
  else{TSORT.col=k;TSORT.dir=(k==='name'||k==='cat')?1:-1;}
  renderTable();
}
function renderTable(){
  const term=$('q').value.toLowerCase().trim(),fc=$('fcat').value;
  let r=ROWS.filter(x=>x.status==='approved'&&(!fc||x.category===fc)&&(!term||(x.pl_name||'').toLowerCase().includes(term)));
  const col=TCOLS.find(c=>c.k===TSORT.col)||TCOLS[8];
  if(col.num){const g=col.num;r.sort((a,b)=>{const va=g(a),vb=g(b);const na=va==null?-Infinity:va,nb=vb==null?-Infinity:vb;return (na-nb)*TSORT.dir;});}
  else{const g=col.txt;r.sort((a,b)=>(''+g(a)).localeCompare(''+g(b),'pl')*TSORT.dir);}
  const arrow=k=>TSORT.col===k?(TSORT.dir<0?' ↓':' ↑'):'';
  const head=TCOLS.map(c=>`<th class="${c.num?'r':''} ${TSORT.col===c.k?'on':''}" onclick="sortTable('${c.k}')">${c.lab}${arrow(c.k)}</th>`).join('');
  const body=r.map(x=>{
    const z=_zysk(x),m=_marza(x),tt=_ttPln(x),sc=x.product_score;
    const scCls=sc>=70?'hi':sc>=40?'mid':'';
    const aliUnc=x.ali_snapshot&&x.ali_snapshot.source==='search';
    const aliLink=x.chosen_link&&safeUrl(x.chosen_link)?` <a class="tlink" href="${esc(safeUrl(x.chosen_link))}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Sprawdź cenę na AliExpress">↗</a>`:'';
    const ttLink=x.shop_url&&safeUrl(x.shop_url)?` <a class="tlink" href="${esc(safeUrl(x.shop_url))}" target="_blank" rel="noopener" onclick="event.stopPropagation()" title="Otwórz w TikTok Shop">↗</a>`:'';
    const seasonB=seasonBadgeHtml(x);
    return `<tr onclick="openCard('${x.id}')">
      <td class="name">${esc(x.pl_name)}${seasonB?`<div style="margin-top:5px">${seasonB}</div>`:''}</td>
      <td>${esc(x.category||'')}</td>
      <td class="r mono">${_aliPln(x)!=null?_aliPln(x)+' zł':'—'}${aliUnc?` <span class="warn" title="Cena z wyszukiwarki — dopasowanie może być innym produktem/wariantem. Sprawdź ↗">⚠</span>`:''}${aliLink}</td>
      <td class="r mono">${tt!=null?tt+' zł':'—'}${x.tt_shop&&x.tt_shop.price_display?`<span class="usd">${esc(_shortR(x.tt_shop.price_display))}</span>`:''}${ttLink}</td>
      <td class="r mono ${z==null?'':z>=0?'pos':'neg'}">${z!=null?(z>=0?'+':'')+z+' zł':'—'}</td>
      <td class="r mono ${m==null?'':m>=0?'pos':'neg'}">${m!=null?m+'%':'—'}</td>
      <td class="r mono">${_mk(x)!=null?'×'+_mk(x):'—'}</td>
      <td class="r mono">${_sold(x)!=null?fmt(_sold(x)):'—'}</td>
      <td class="r"><span class="scorePill ${scCls}">${sc!=null?sc:'—'}</span></td>
    </tr>`;
  }).join('');
  const withShop=r.filter(x=>x.tt_shop).length;
  $('tableWrap').innerHTML=r.length
    ? `<div class="tblCount"><b>${r.length}</b> zatwierdzonych · <b>${withShop}</b> z danymi TikTok Shop · klik w wiersz → pełny detal</div><table class="ptbl"><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table><div class="tblLegend"><span>↗ = otwórz źródło i sprawdź realną cenę</span><span class="warn">⚠ = cena z wyszukiwarki (dopasowanie niepewne)</span><span>Koszt Ali = cena z API (jeden wariant) × 4 — orientacyjnie</span></div>`
    : `<div class="tblEmpty">Brak zatwierdzonych produktów dla tego filtra.</div>`;
}
function toggleTable(){VIEW=VIEW==='table'?'list':'table';render();}
// Tabela → detal listy po ID (nie po nazwie): przełącz na listę, ustaw lejek approved, zaznacz produkt.
function openCard(id){
  const x=ROWS.find(r=>r.id===id);if(!x)return;
  VIEW='list';FSTAT='approved';SUBQ=null;FPROOF=false;FSEASONOFF=false;FSEASONSOON=false;
  $('q').value='';LISTN=100;SELID=id;LASTDET=undefined;
  render(); // render sam wybiera SELID i montuje detal — selectRow byłby drugim montażem playera
  const el=document.getElementById('row-'+id); if(el)el.scrollIntoView({block:'center'});
}

// ── KLAWIATURA (globalna; wyłączona gdy focus w input/select/textarea) ──
function onKey(e){
  const el=e.target, tag=(el&&el.tagName||'').toLowerCase();
  if(tag==='input'||tag==='select'||tag==='textarea'||(el&&el.isContentEditable)){
    if(e.key==='Escape'&&el.blur)el.blur();
    return;
  }
  if(e.key==='Escape'){closeReasonMenu();$('cheat').classList.remove('show');$('lightbox').classList.remove('show');if(isMobile())closeDetail();return;}
  // pod otwartym lightboxem/ściągą połykamy skróty decyzji i nawigacji (footgun:
  // recenzent ogląda zdjęcie i 'a' zatwierdziłby produkt w tle)
  if($('lightbox').classList.contains('show')||$('cheat').classList.contains('show'))return;
  if(REASONOPEN){
    if(/^[1-8]$/.test(e.key)){e.preventDefault();chooseReason(+e.key-1);}
    return;
  }
  if(e.key==='?'||(e.shiftKey&&e.key==='/')){$('cheat').classList.toggle('show');return;}
  if(VIEW==='table')return;
  const x=SELID?ROWS.find(r=>r.id===SELID):null;
  switch(e.key){
    case 'j':case 'ArrowDown':e.preventDefault();moveSel(1);break;
    case 'k':case 'ArrowUp':e.preventDefault();moveSel(-1);break;
    case 'a':if(x&&x.status==='pending')approveCurrent(x.id);break;
    case 'r':if(x&&x.status==='pending')openReasonMenu();break;
    case 'd':if(x&&x.status==='pending')markDup(x.id);break;
  }
}

init();
</script>
