<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar trendów TikTok → AliExpress</title>
<link rel="icon" type="image/png" href="https://tomekniedzwiecki.pl/img/logo/tn-logo-icon-88.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@500;600&display=swap">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#000; --surface:#0c0c0e; --surface2:#141417; --line:#222226; --line2:#2e2e34;
    --text:#ededf0; --dim:#9a9aa3; --dim2:#67676f;
    --gold:#f5b53f; --green:#46b46a; --green-d:#2c6e3d; --blue:#3291ff; --red:#e5484d;
    color-scheme:dark;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Geist','Inter',system-ui,sans-serif;letter-spacing:-.011em;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  .mono{font-family:'Geist Mono',ui-monospace,monospace}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:#2a2a30;border-radius:99px}::-webkit-scrollbar-track{background:transparent}
  a{color:inherit;text-decoration:none}
  svg{width:16px;height:16px;flex:0 0 auto}
  :focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:8px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}

  /* HEADER */
  .bar{position:sticky;top:0;z-index:30;background:rgba(8,8,10,.86);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .wrap{max-width:980px;margin:0 auto;padding:0 22px}
  .barTop{display:flex;align-items:center;gap:14px;padding:14px 0 12px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:10px;margin-right:auto;font-weight:600;font-size:16px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--gold);box-shadow:0 0 12px var(--gold)}
  .kpis{display:flex;gap:8px;flex-wrap:wrap}
  .kpi{display:flex;align-items:baseline;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:6px 11px;font-size:12px;color:var(--dim)}
  .kpi b{font-size:15px;color:var(--text)}
  .kpi.g b{color:var(--green)}
  .controls{display:flex;gap:9px;align-items:center;padding-bottom:13px;flex-wrap:wrap}
  .ipt,.sel{background:var(--surface);border:1px solid var(--line2);border-radius:9px;padding:8px 12px;font-size:13px;color:var(--text);transition:border-color .15s}
  .ipt:focus,.sel:focus{border-color:var(--blue);outline:none}
  .search{position:relative;flex:1;min-width:170px}
  .search svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim2)}
  .search .ipt{width:100%;padding-left:34px}
  .seg{display:flex;background:var(--surface);border:1px solid var(--line2);border-radius:9px;padding:3px;gap:2px}
  .seg button{border:0;background:transparent;color:var(--dim);font-size:12px;font-weight:500;padding:6px 12px;border-radius:6px;cursor:pointer;transition:.15s;white-space:nowrap}
  .seg button.on{background:var(--surface2);color:var(--text);box-shadow:0 1px 0 rgba(255,255,255,.04) inset}
  .seg button .cnt{display:inline-block;min-width:17px;padding:0 5px;margin-left:5px;border-radius:99px;background:var(--line);color:var(--dim2);font-size:10.5px;font-weight:600;line-height:16px;text-align:center;vertical-align:1px}
  .seg button.on .cnt{background:var(--line2);color:var(--text)}
  .btn{display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line2);background:var(--surface2);color:var(--text);border-radius:9px;padding:8px 13px;font-size:13px;font-weight:500;cursor:pointer;transition:.15s}
  .btn:hover{border-color:#3a3a42;background:#1b1b1f}
  .btn-g{background:var(--green-d);border-color:#3d9450;color:#eafff0}
  .btn-g:hover{background:#368049}
  .btn-r:hover{background:#4a1a1d;border-color:var(--red);color:#ffd7d8}
  .btn-dup:hover{background:#1a2433;border-color:var(--blue);color:#cfe3ff}
  .btn-ali{background:#2a1500;border-color:#7a4a12;color:var(--gold);font-weight:600}
  .btn-ali:hover{background:#3a1d00;border-color:#c47e12}

  /* GRID of cards */
  main{max-width:980px;margin:0 auto;padding:18px 22px 90px}
  .cards{display:flex;flex-direction:column;gap:16px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px;overflow:hidden;transition:border-color .2s}
  .card:hover{border-color:#34343c}
  .card.approved{border-color:var(--green-d);background:linear-gradient(180deg,rgba(70,180,106,.05),transparent 120px)}
  .card.rejected{opacity:.5}
  .card.duplicate{opacity:.6}
  .card.duplicate .pname{text-decoration:line-through;text-decoration-color:var(--dim2);text-decoration-thickness:1px}
  .head{display:grid;grid-template-columns:150px 1fr;gap:18px;padding:18px;align-items:center}

  /* VIDEO */
  .vid{position:relative;width:150px;aspect-ratio:9/16;border-radius:12px;overflow:hidden;background:#000;cursor:pointer}
  .vid img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
  .vid:hover img{transform:scale(1.04)}
  .vid .play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(0,0,0,.05),rgba(0,0,0,.35))}
  .vid .play span{width:52px;height:52px;border-radius:50%;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);border:1.5px solid rgba(255,255,255,.55);display:flex;align-items:center;justify-content:center}
  .vid .play span svg{width:22px;height:22px;color:#fff;margin-left:3px;fill:#fff}
  .vid:hover .play span{background:rgba(0,0,0,.7);transform:scale(1.06)}
  .vid .age{position:absolute;top:8px;left:8px;font-size:10.5px;font-weight:600;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);padding:3px 7px;border-radius:6px;color:#fff}
  .vid .age.hot{background:rgba(245,181,63,.92);color:#1a1205}

  /* META */
  .meta{min-width:0;display:flex;flex-direction:column}
  .metaTop{display:flex;align-items:flex-start;gap:12px}
  .pname{font-size:18px;font-weight:600;line-height:1.25;margin:0;flex:1;min-width:0}
  .heat{flex:0 0 auto;display:flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--line2);border-radius:10px;padding:6px 11px;font-weight:700;font-size:15px}
  .heat svg{color:var(--gold)}
  .heat.hi{border-color:#7a5a12;background:#231803;color:var(--gold)}
  .chips{display:flex;gap:7px;flex-wrap:wrap;margin:9px 0 14px}
  .chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;color:var(--dim);background:var(--surface2);border:1px solid var(--line);border-radius:7px;padding:3px 9px}
  .chip.ad{color:var(--gold);border-color:#5a4412;background:#1f1705}
  .chip svg{width:13px;height:13px}
  .catsel{font-size:11.5px;color:var(--text);background:var(--surface2);border:1px solid var(--line2);border-radius:7px;padding:3px 7px}

  /* STAT TILES */
  .stats{display:grid;grid-template-columns:repeat(5,1fr);gap:9px}
  @media(max-width:620px){.stats{grid-template-columns:repeat(3,1fr)}}
  .stat{background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:9px 11px}
  .stat .lab{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--dim2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:3px}
  .stat .val{font-size:17px;font-weight:600;line-height:1}
  .stat.gold{border-color:#5a4412;background:linear-gradient(180deg,#1d1503,#121012)}
  .stat.gold .val{color:var(--gold)}
  .stat.gold .lab{color:#b88e2e}
  .srcLinks{display:flex;gap:9px;margin-top:13px;flex-wrap:wrap}
  .srcLinks a{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--dim);border:1px solid var(--line2);border-radius:8px;padding:6px 11px;transition:.15s}
  .srcLinks a:hover{color:var(--text);border-color:#3a3a42;background:var(--surface2)}
  .srcLinks a.shop:hover{color:var(--green)}

  /* CANDIDATES + ACTIONS */
  .body{border-top:1px solid var(--line);padding:16px 18px;background:rgba(255,255,255,.012)}
  .secLab{font-size:11px;color:var(--dim2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:11px;display:flex;align-items:center;gap:7px}
  .cands{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:11px}
  .cand{border:1px solid var(--line);border-radius:11px;overflow:hidden;background:var(--surface);display:flex;flex-direction:column;transition:border-color .15s,transform .15s}
  .cand:hover{border-color:#3a3a42;transform:translateY(-2px)}
  .cand.picked{border-color:var(--green);box-shadow:0 0 0 1px var(--green),0 0 18px rgba(70,180,106,.18)}
  .cand .cimg{position:relative;aspect-ratio:1;background:#fff}
  .cand .cimg img{width:100%;height:100%;object-fit:cover;display:block}
  .cand .pickedTag{position:absolute;top:6px;right:6px;background:var(--green);color:#04130a;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
  .cand .pickedTag svg{width:14px;height:14px;color:#04130a}
  .cand .ci{padding:9px 10px;display:flex;flex-direction:column;gap:6px;flex:1}
  .cand .pr{font-size:14px;font-weight:600;color:var(--green)}
  .cand .ti{font-size:11px;color:var(--dim);line-height:1.35;max-height:30px;overflow:hidden}
  .cand .crow{display:flex;gap:6px;padding:0 10px 10px;margin-top:auto}
  .cand .pickbtn{flex:1;border:1px solid var(--line2);background:var(--surface2);color:var(--text);border-radius:7px;padding:6px;font-size:11.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;transition:.15s}
  .cand .pickbtn:hover{background:var(--green-d);border-color:#3d9450}
  .cand.picked .pickbtn{background:var(--green-d);border-color:#3d9450;color:#eafff0}
  .cand .ext{border:1px solid var(--line2);background:var(--surface2);border-radius:7px;width:32px;display:flex;align-items:center;justify-content:center;color:var(--dim)}
  .cand .ext:hover{color:var(--gold);border-color:#7a4a12}
  .nocand{color:var(--dim2);font-size:13px;padding:6px 0}
  .actions{display:flex;gap:10px;align-items:center;margin-top:15px;flex-wrap:wrap}
  .actions .ipt{flex:1;min-width:200px}
  .stbadge{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:99px;border:1px solid var(--line2);color:var(--dim);margin-left:auto}
  .stbadge.approved{color:var(--green);border-color:var(--green-d);background:rgba(70,180,106,.08)}
  .stbadge.rejected{color:var(--red);border-color:#5a2326}
  .stbadge.duplicate{color:var(--blue);border-color:#234a6e;background:rgba(50,145,255,.08)}

  /* PLAYER MODAL */
  .modal{position:fixed;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(6px);z-index:90;display:none;align-items:center;justify-content:center;padding:24px}
  .modal.show{display:flex}
  .modalC{display:flex;gap:0;background:var(--surface);border:1px solid var(--line2);border-radius:18px;overflow:hidden;max-width:880px;width:100%;max-height:92vh}
  .modalC .pl{flex:0 0 auto;width:340px;max-width:46vw;background:#000;display:flex;align-items:center;justify-content:center}
  .modalC .pl iframe{width:100%;height:min(86vh,600px);border:0;display:block}
  .modalC .info{flex:1;min-width:0;padding:24px;overflow:auto}
  .modalC .info h3{margin:0 0 4px;font-size:20px;font-weight:600;line-height:1.25}
  .mx{position:absolute;top:18px;right:22px;width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid var(--line2);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:2}
  .mx:hover{background:rgba(255,255,255,.16)}
  @media (max-width:720px){ .modalC{flex-direction:column;max-height:94vh;overflow:auto} .modalC .pl{width:100%;max-width:none} .modalC .pl iframe{height:62vh} }

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--line2);padding:11px 19px;border-radius:11px;font-size:13px;z-index:120;opacity:0;transition:opacity .2s;box-shadow:0 10px 30px rgba(0,0,0,.5)}
  .toast.show{opacity:1}
  .loader{display:flex;justify-content:center;padding:80px}.spin{width:36px;height:36px;border:3px solid #222;border-top-color:var(--gold);border-radius:50%;animation:s .7s linear infinite}@keyframes s{to{transform:rotate(360deg)}}
  .empty{text-align:center;color:var(--dim2);padding:70px 20px;font-size:14px}
  .pager{display:flex;align-items:center;justify-content:center;gap:14px;padding:22px 0 8px;flex-wrap:wrap}
  .pager:empty{display:none}
  .pgbtn{background:var(--surface);border:1px solid var(--line2);color:var(--text);border-radius:9px;padding:8px 15px;font-size:13px;font-weight:600;cursor:pointer;transition:border-color .15s,color .15s}
  .pgbtn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
  .pgbtn:disabled{opacity:.4;cursor:default}
  .pginfo{font-size:12.5px;color:var(--dim)}.pginfo b{color:var(--text)}

  /* MOBILE */
  @media (max-width:680px){
    .wrap,main{padding-left:13px;padding-right:13px}
    .head{grid-template-columns:120px 1fr;gap:14px;padding:14px}
    .vid{width:120px}
    .pname{font-size:16px}
    .stats{grid-template-columns:repeat(2,1fr)}
    .cands{grid-template-columns:repeat(2,1fr)}
    .actions .ipt{min-width:100%}
    .actions .btn{flex:1}
    .stbadge{margin-left:0;order:-1;width:100%;justify-content:center}
  }
</style>
</head>
<body>
<header class="bar">
  <div class="wrap">
    <div class="barTop">
      <div class="brand"><span class="dot"></span>Radar trendów <span style="color:var(--dim);font-weight:400">TikTok → AliExpress</span></div>
      <div class="kpis" id="kpis"></div>
    </div>
    <div class="controls">
      <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input id="q" class="ipt" placeholder="Szukaj produktu…"></div>

<main>

<script>

const I={

};

async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){location.href='/login.html?redirect=/trendy';return;}
  const ALLOW=['93675a5a-ea02-488c-a6c2-4adf687ea435','7cd1830f-fca0-44d4-a419-7a822f77f919'];
  if(!ALLOW.includes(session.user.id)){$('loading').outerHTML='<div class="empty">Brak dostępu — ten widok jest tylko dla Maćka i Tomka.</div>';return;}
  const {data:tm}=await sb.from('team_members').select('name').eq('user_id',session.user.id).maybeSingle();

  $('fcat').innerHTML='<option value="">Wszystkie kategorie</option>'+CATS.map(c=>`<option>${c}</option>`).join('');
  $('q').oninput=()=>{PAGE=0;render()}; $('fcat').onchange=()=>{PAGE=0;render()}; $('refresh').onclick=load;
  $('stseg').querySelectorAll('button').forEach(b=>b.onclick=()=>{$('stseg').querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');FSTAT=b.dataset.s;PAGE=0;render();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM(null,true)});
  await load();
}
async function load(){
  $('loading').style.display='flex';$('cards').innerHTML='';
  const {data,error}=await sb.from('bud_tt_products').select('*').order('heat',{ascending:false});
  $('loading').style.display='none';
  if(error){toast('Błąd: '+error.message);return;}
  ROWS=data||[];render();
}
function render(){
  const term=$('q').value.toLowerCase().trim(),fc=$('fcat').value;
  let r=ROWS.filter(x=>{
    if(FSTAT&&x.status!==FSTAT)return false;
    if(fc&&x.category!==fc)return false;
    if(term&&!(x.pl_name||'').toLowerCase().includes(term))return false;
    return true;
  });
  const cnt={pending:0,approved:0,rejected:0,duplicate:0};
  ROWS.forEach(x=>{if(cnt[x.status]!=null)cnt[x.status]++;});
  document.querySelectorAll('#stseg .cnt').forEach(el=>{const k=el.dataset.c;el.textContent=k==='all'?ROWS.length:(cnt[k]||0);});
  $('kpis').innerHTML=`<div class="kpi"><b>${ROWS.length}</b> trendów</div><div class="kpi"><b>${cnt.pending}</b> do weryf.</div><div class="kpi g"><b>${cnt.approved}</b> zatwierdzonych</div>`;
  // paginacja 20/stronę
  const total=r.length, pages=Math.max(1,Math.ceil(total/PER));
  if(PAGE>=pages)PAGE=pages-1; if(PAGE<0)PAGE=0;
  const slice=r.slice(PAGE*PER,PAGE*PER+PER);
  $('empty').style.display=total?'none':'block';
  $('cards').innerHTML=slice.map(card).join('');
  renderPager(total,pages);
}
function renderPager(total,pages){
  const pg=$('pager');if(!pg)return;
  if(total<=PER){pg.innerHTML='';return;}
  const from=PAGE*PER+1,to=Math.min(total,PAGE*PER+PER);
  pg.innerHTML=`<button class="pgbtn" ${PAGE<=0?'disabled':''} onclick="gotoPage(${PAGE-1})">‹ Poprzednia</button>`
    +`<span class="pginfo">Strona <b>${PAGE+1}</b> z ${pages} · ${from}–${to} z ${total}</span>`
    +`<button class="pgbtn" ${PAGE>=pages-1?'disabled':''} onclick="gotoPage(${PAGE+1})">Następna ›</button>`;
}
function gotoPage(p){PAGE=p;render();window.scrollTo({top:0,behavior:'smooth'});}
function statTile(icon,val,lab,gold){return `<div class="stat${gold?' gold':''}"><div class="lab">${I[icon]}${lab}</div><div class="val mono">${val}</div></div>`;}
function candHtml(x,c){return `<div class="cand${x.chosen_link===c.link?' picked':''}">
  <div class="cimg">${c.img?`<img loading=lazy src="${esc(c.img)}">`:''}${x.chosen_link===c.link?`<div class="pickedTag">${I.check}</div>`:''}</div>
  <div class="ci"><div class="pr mono">${esc(c.price||'—')}</div><div class="ti">${esc((c.title||'').slice(0,52))}</div></div>
  <div class="crow"><button class="pickbtn" onclick="pick('${x.id}','${esc(c.link)}')">${I.check} Wybierz</button><a class="ext" href="${esc(c.link)}" target="_blank" rel="noopener" title="Otwórz w AliExpress">${I.ext}</a></div>
</div>`;}
function card(x){
  const vid=(x.tiktok_url||'').match(/\/video\/(\d+)/)?.[1]||'';
  const days=x.newest_days, hot=days!=null&&days<=14;
  const eng=((x.eng_rate||0)*100).toFixed(1)+'%';
  const cands=x.ali_candidates||[];
  const heatHi=(x.heat||0)>=48;
  return `<div class="card ${x.status}" id="r-${x.id}">
    <div class="head">
      <div class="vid" ${vid?`onclick="openM('${x.id}')"`:''}>
        ${x.cover?`<img loading=lazy src="${esc(x.cover)}">`:''}
        ${days!=null?`<div class="age${hot?' hot':''}">${hot?'🔥 ':''}${days} dni</div>`:''}
        ${vid?`<div class="play"><span>${I.play}</span></div>`:''}
      </div>
      <div class="meta">
        <div class="metaTop">
          <h3 class="pname">${esc(x.pl_name)}</h3>
          <div class="heat ${heatHi?'hi':''}">${I.flame}${Math.round(x.heat||0)}</div>
        </div>
        <div class="chips">
          <select class="catsel" onchange="setCat('${x.id}',this.value)">${CATS.map(c=>`<option ${c===x.category?'selected':''}>${c}</option>`).join('')}</select>
          ${x.is_ad?`<span class="chip ad">${I.mega} reklamowany</span>`:''}
          ${x.author?`<span class="chip">${I.user} @${esc(x.author)}${x.author_followers?' · '+fmt(x.author_followers):''}</span>`:''}
        </div>
        <div class="stats">
          ${statTile('bookmark',fmt(x.saves),'Zapisy',true)}
          ${statTile('heart',eng,'Engagement')}
          ${statTile('eye',fmt(x.max_plays),'Odtworzenia')}
          ${statTile('msg',fmt(x.comments),'Komentarze')}
          ${statTile('flame',x.videos,'Filmów')}
        </div>
        <div class="srcLinks">
          ${x.tiktok_url?`<a href="${esc(x.tiktok_url)}" target="_blank" rel="noopener">${I.tiktok} Otwórz na TikTok</a>`:''}
          ${x.shop_url?`<a class="shop" href="${esc(x.shop_url)}" target="_blank" rel="noopener">${I.store} TikTok Shop</a>`:''}
        </div>
      </div>
    </div>
    <div class="body">
      <div class="secLab">${I.store} AliExpress — dopasowane po obrazie (${cands.length})</div>
      <div class="cands">${cands.length?cands.map(c=>candHtml(x,c)).join(''):'<div class="nocand">Brak kandydatów (kadr-haczyk lub w toku). Wklej własny link niżej.</div>'}</div>
      <div class="actions">
        <input class="ipt" id="cl-${x.id}" placeholder="…lub wklej własny link do produktu" value="${esc(x.status==='approved'&&!cands.some(c=>c.link===x.chosen_link)?(x.chosen_link||''):'')}">
        <button class="btn btn-g" onclick="customApprove('${x.id}')">${I.check} Zatwierdź własny</button>
        <button class="btn btn-r" onclick="reject('${x.id}')">${I.x} Odrzuć</button>
        <button class="btn btn-dup" onclick="markDup('${x.id}')" title="Ten produkt już był w radarze">${I.copy} Duplikat</button>
        <span class="stbadge ${x.status}">${x.status==='approved'?'Zatwierdzone':x.status==='rejected'?'Odrzucone':x.status==='duplicate'?'Duplikat — już był':'Do weryfikacji'}${x.reviewed_by?' · '+esc(x.reviewed_by):''}</span>
      </div>
    </div>
  </div>`;
}

// ── PLAYER MODAL (video + dane obok) ──
function openM(id){
  const x=ROWS.find(r=>r.id===id);if(!x)return;
  const vid=(x.tiktok_url||'').match(/\/video\/(\d+)/)?.[1]||'';
  const src=`https://www.tiktok.com/player/v1/${vid}?music_info=0&description=0&rel=0&native_context_menu=0&closed_caption=0&timestamp=0&controls=1&progress_bar=1&play_button=1&volume_control=1&fullscreen_button=1`;
  const eng=((x.eng_rate||0)*100).toFixed(1)+'%';
  $('modalC').innerHTML=`
    <div class="pl"><iframe src="${src}" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe></div>
    <div class="info">
      <h3>${esc(x.pl_name)}</h3>
      <div style="color:var(--dim);font-size:13px;margin-bottom:16px">${esc(x.category||'')} · ${x.newest_days!=null?x.newest_days+' dni temu':''} ${x.is_ad?'· <span style="color:var(--gold)">reklamowany</span>':''}</div>
      <div class="stats" style="grid-template-columns:repeat(2,1fr)">
        ${statTile('bookmark',fmt(x.saves),'Zapisy',true)}
        ${statTile('heart',eng,'Engagement')}
        ${statTile('eye',fmt(x.max_plays),'Odtworzenia')}
        ${statTile('msg',fmt(x.comments),'Komentarze')}
        ${statTile('flame',Math.round(x.heat||0),'Heat')}
        ${statTile('user',fmt(x.author_followers),'Obserwujący')}
      </div>
      ${x.author?`<div style="margin-top:14px;color:var(--dim);font-size:13px;display:flex;align-items:center;gap:7px">${I.user} @${esc(x.author)}</div>`:''}
      <div class="srcLinks" style="margin-top:16px">
        ${x.tiktok_url?`<a href="${esc(x.tiktok_url)}" target="_blank" rel="noopener">${I.tiktok} TikTok</a>`:''}
        ${x.shop_url?`<a class="shop" href="${esc(x.shop_url)}" target="_blank" rel="noopener">${I.store} TikTok Shop</a>`:''}
        ${x.chosen_link?`<a class="shop" href="${esc(x.chosen_link)}" target="_blank" rel="noopener">${I.store} Wybrany produkt</a>`:''}
      </div>
    </div>`;
  $('modal').classList.add('show');
}
function closeM(e,force){if(force||(e&&e.target&&e.target.id==='modal')){$('modal').classList.remove('show');$('modalC').innerHTML='';}}

async function upd(id,patch,msg){
  patch.reviewed_by=ME;patch.reviewed_at=new Date().toISOString();
  const {error}=await sb.from('bud_tt_products').update(patch).eq('id',id);
  if(error){toast('Błąd: '+error.message);return;}
  const x=ROWS.find(r=>r.id===id);if(x)Object.assign(x,patch);
  toast(msg);render();
  // Po zatwierdzeniu: przenieś cover na TRWAŁY URL storage (cover z TikTok CDN to podpisany
  // URL z krótkim TTL → w /sklep gnije w ~dobę). Fire-and-forget, świeży thumb przez oEmbed.
  if(patch.status==='approved'&&x&&x.key){
    try{sb.functions.invoke('bud-tt-rehost',{body:{keys:[x.key]}}).catch(()=>{});}catch(e){}
  }
}
function pick(id,link){upd(id,{chosen_link:link,status:'approved'},'Zatwierdzone');}
function customApprove(id){const v=$('cl-'+id).value.trim();if(!v){toast('Wklej link');return;}upd(id,{chosen_link:v,status:'approved'},'Zatwierdzono własny link');}
function reject(id){upd(id,{status:'rejected'},'Odrzucone');}
function markDup(id){upd(id,{status:'duplicate'},'Oznaczone jako duplikat — już był');}
async function setCat(id,cat){const{error}=await sb.from('bud_tt_products').update({category:cat}).eq('id',id);if(error){toast('Błąd: '+error.message);return;}const x=ROWS.find(r=>r.id===id);if(x)x.category=cat;toast('Kategoria: '+cat);}
init();
</script>
