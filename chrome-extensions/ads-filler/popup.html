<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>TN Ads Filler</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <div class="brand">
      <div class="brand-icon">TN</div>
      <div>
        <h1>Ads Filler</h1>
        <p class="subtitle">Wypełnij reklamy z CRM</p>
      </div>
    </div>
    <button id="btn-options" class="icon-btn" title="Opcje">⚙</button>
  </header>

  <main>
    <!-- State: not configured -->
    <div id="state-setup" class="hidden">
      <div class="empty">
        <p>Brak konfiguracji Supabase.</p>
        <button id="btn-setup" class="btn-primary">Otwórz opcje</button>
      </div>
    </div>

    <!-- State: loading -->
    <div id="state-loading" class="hidden">
      <div class="skeleton"></div>
      <div class="skeleton"></div>
      <div class="skeleton"></div>
    </div>

    <!-- State: error -->
    <div id="state-error" class="hidden">
      <div class="empty error">
        <p id="error-msg">Błąd</p>
        <button id="btn-retry" class="btn-secondary">Spróbuj ponownie</button>
      </div>
    </div>

    <!-- State: ready -->
    <div id="state-ready" class="hidden">
      <div class="search-row">
        <input id="search" type="search" placeholder="Szukaj workflow..." autocomplete="off">
      </div>

      <div id="workflow-list" class="workflow-list"></div>

      <div id="workflow-detail" class="hidden">
        <div class="detail-header">
          <button id="btn-back" class="icon-btn" title="Wstecz">←</button>
          <div class="detail-title">
            <strong id="detail-name"></strong>
            <span id="detail-brand" class="muted"></span>
          </div>
        </div>

        <div class="scan-info">
          <span id="scan-status">Skanuję stronę...</span>
        </div>

        <div class="actions">
          <button id="btn-fill-all" class="btn-primary">Wypełnij wszystkie warianty</button>
          <button id="btn-diagnose" class="btn-secondary" style="width:100%; margin-top:6px;">📋 Kopiuj diagnozę (dla Claude)</button>
        </div>

        <div class="variants" id="variants-list"></div>
      </div>
    </div>
  </main>

  <footer>
    <span class="muted">Alt+Shift+F → wypełnij ostatnio wybrany workflow</span>
  </footer>

<script src="popup.js"></script>
</body>
</html>
