<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TN CRM - Produkty</title>
    <link rel="icon" type="image/svg+xml" href="/tn-workflow/favicon.svg">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="../components/shared-sidebar.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #000; color: #e5e5e5; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        ::selection { background: white; color: black; }

        .glass-header {
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-enter { animation: fadeIn 0.4s ease-out forwards; }

        .product-card:hover {
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="h-screen flex overflow-hidden font-sans text-sm tracking-tight antialiased">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-[280px] bg-zinc-950 border-r border-white/5 flex flex-col flex-shrink-0"></aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col bg-black relative min-w-0">
        <!-- Header -->
        <header class="glass-header flex items-center justify-between px-6 h-14 flex-shrink-0 z-10">
            <div class="flex items-center gap-3">
                <button onclick="Sidebar.toggle()" class="mobile-menu-btn hidden p-2 -ml-2 text-zinc-400 hover:text-white">
                    <i class="ph ph-list text-xl"></i>
                </button>
                <span class="text-zinc-500 text-xs font-mono">tn-crm / <span class="text-zinc-300">produkty</span></span>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="openAddProductModal()" class="bg-white text-black hover:bg-zinc-200 px-3 py-1.5 rounded-lg text-xs font-medium transition-colors flex items-center gap-1.5">
                    <i class="ph ph-plus"></i>
                    Dodaj produkt
                </button>
            </div>
        </header>

        <!-- Content -->
        <div class="flex-1 overflow-y-auto p-6 lg:p-10">
            <div class="max-w-7xl mx-auto animate-enter">
                <!-- Title & Stats -->
                <div class="flex items-start justify-between mb-6">
                    <div>
                        <h1 class="text-3xl font-semibold text-white tracking-tight mb-1">Produkty</h1>
                        <p class="text-zinc-500">Globalna baza produktów. Klienci wybierają z tej listy.</p>
                    </div>
                    <div class="text-right">
                        <div class="text-3xl font-semibold text-white" id="total-products">-</div>
                        <div class="text-xs text-zinc-500">produktów</div>
                    </div>
                </div>

                <!-- Active/Inactive Tabs -->
                <div class="flex items-center gap-1 mb-6 border-b border-white/5">
                    <button onclick="setActiveTab('active')" id="tab-active" class="active-tab px-4 py-2.5 text-sm font-medium transition-colors border-b-2 border-emerald-500 text-white">
                        <i class="ph ph-check-circle mr-1.5"></i>Aktywne <span id="count-active" class="text-zinc-500 ml-1">0</span>
                    </button>
                    <button onclick="setActiveTab('inactive')" id="tab-inactive" class="inactive-tab px-4 py-2.5 text-sm font-medium transition-colors border-b-2 border-transparent text-zinc-500 hover:text-zinc-300">
                        <i class="ph ph-eye-slash mr-1.5"></i>Wyłączone <span id="count-inactive" class="text-zinc-600 ml-1">0</span>
                    </button>
                </div>

                <!-- Filters -->
                <div class="flex items-center gap-3 mb-6">
                    <div class="relative flex-1 max-w-md">
                        <i class="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500"></i>
                        <input id="search-input" type="text" placeholder="Szukaj produktów..." class="w-full bg-zinc-900 border border-zinc-800 rounded-lg pl-10 pr-3 py-2.5 text-sm text-white outline-none focus:border-zinc-600 placeholder-zinc-600" oninput="applyFilters()">
                    </div>
                    <select id="status-filter" class="bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2.5 text-sm text-white outline-none focus:border-zinc-600" onchange="applyFilters()">
                        <option value="">Wszystkie statusy</option>
                        <option value="proposal">Propozycje</option>
                        <option value="approved">Zatwierdzone</option>
                        <option value="pending">Oczekujące</option>
                        <option value="in_production">W produkcji</option>
                        <option value="shipped">Wysłane</option>
                        <option value="delivered">Dostarczone</option>
                    </select>
                </div>

                <!-- Products Grid -->
                <div id="products-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-4">
                </div>

                <div id="empty-state" class="hidden py-16 text-center">
                    <i class="ph ph-package text-4xl text-zinc-700 mb-3"></i>
                    <p class="text-zinc-400 text-sm mb-1">Brak produktów</p>
                    <p class="text-zinc-600 text-xs font-mono">Dodaj produkty przyciskiem powyżej</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Product Modal -->
    <div id="product-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-50">
        <div class="bg-zinc-950 border border-white/10 rounded-lg w-full max-w-xl shadow-2xl max-h-[90vh] flex flex-col">
            <div class="flex items-center justify-between px-5 py-4 border-b border-white/5 flex-shrink-0">
                <h2 id="product-modal-title" class="text-sm font-medium text-white flex items-center gap-2">
                    <i class="ph ph-package text-orange-400"></i>
                    Dodaj produkt
                </h2>
                <button onclick="closeProductModal()" class="text-zinc-500 hover:text-white transition-colors">
                    <i class="ph ph-x text-lg"></i>
                </button>
            </div>

            <div class="p-5 space-y-4 overflow-y-auto flex-1">
                <input type="hidden" id="product-edit-id">

                <!-- Sezonowość — TYLKO do wglądu (dane z radaru /trendy, nieedytowalne tutaj) -->
                <div id="product-season-display" class="hidden"></div>

                <div>
                    <label class="block text-zinc-500 text-[10px] font-mono uppercase tracking-wider mb-1.5">Nazwa produktu</label>
                    <input type="text" id="product-name" class="w-full text-sm text-white px-3 py-3 rounded-lg bg-zinc-900 border border-zinc-800 outline-none focus:border-zinc-600" placeholder="Nazwa produktu...">
                </div>
                <div>
                    <label class="block text-zinc-500 text-[10px] font-mono uppercase tracking-wider mb-1.5">Link źródłowy</label>
                    <input type="url" id="product-source-url" class="w-full text-sm text-white px-3 py-3 rounded-lg bg-zinc-900 border border-zinc-800 outline-none focus:border-zinc-600" placeholder="https://aliexpress.com/...">
                </div>
                <div>
                    <label class="block text-zinc-500 text-[10px] font-mono uppercase tracking-wider mb-1.5">Link do zdjęcia głównego</label>
                    <input type="url" id="product-image-url" class="w-full text-sm text-white px-3 py-3 rounded-lg bg-zinc-900 border border-zinc-800 outline-none focus:border-zinc-600" placeholder="https://...">
                    <div id="product-image-preview" class="mt-2 hidden">
                        <img id="product-image-preview-img" class="w-24 h-24 object-cover rounded-lg border border-zinc-800" src="">
                    </div>
                </div>
                <div>
                    <label class="block text-zinc-500 text-[10px] font-mono uppercase tracking-wider mb-1.5">Link TikTok</label>
                    <input type="url" id="product-tiktok-url" class="w-full text-sm text-white px-3 py-3 rounded-lg bg-zinc-900 border border-zinc-800 outline-none focus:border-zinc-600" placeholder="https://www.tiktok.com/@user/video/...">
                </div>

                <div>
                    <label class="block text-zinc-500 text-[10px] font-mono uppercase tracking-wider mb-1.5">Screenshot do raportów (PDF)</label>
                    <div id="report-screenshot-upload" class="relative">
                        <input type="file" id="report-screenshot-file" accept=".pdf" class="hidden" onchange="handleReportScreenshotUpload(event)">
                        <div id="report-screenshot-empty" class="border-2 border-dashed border-zinc-800 rounded-lg p-4 text-center cursor-pointer hover:border-zinc-600 transition-colors"
                            onclick="document.getElementById('report-screenshot-file').click()"
                            ondragover="event.preventDefault(); this.classList.add('border-orange-500', 'bg-orange-500/5')"
                            ondragleave="this.classList.remove('border-orange-500', 'bg-orange-500/5')"
                            ondrop="event.preventDefault(); this.classList.remove('border-orange-500', 'bg-orange-500/5'); handleReportScreenshotDrop(event)">
                            <i class="ph ph-file-pdf text-2xl text-zinc-600 mb-2"></i>
                            <p class="text-zinc-500 text-xs">Przeciągnij PDF lub kliknij</p>
                        </div>
                        <div id="report-screenshot-preview" class="hidden border border-zinc-800 rounded-lg p-3 bg-zinc-900">
                            <div class="flex items-center gap-3">
                                <div class="w-10 h-10 rounded-lg bg-red-500/10 border border-red-500/20 flex items-center justify-center">
                                    <i class="ph ph-file-pdf text-red-400 text-lg"></i>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <p id="report-screenshot-filename" class="text-white text-sm truncate">plik.pdf</p>
                                    <p class="text-zinc-500 text-xs">PDF</p>
                                </div>
                                <button onclick="removeReportScreenshot()" class="text-zinc-500 hover:text-red-400 transition-colors p-1">
                                    <i class="ph ph-trash text-lg"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    <input type="hidden" id="product-report-screenshot-url">
                </div>
            </div>

            <div class="flex gap-3 px-5 py-4 border-t border-white/5 bg-zinc-900/50 flex-shrink-0">
                <div class="flex-1"></div>
                <button onclick="closeProductModal()" class="text-zinc-400 hover:text-white border border-zinc-700 hover:border-zinc-600 px-4 py-2 rounded-lg text-sm transition-colors">
                    Anuluj
                </button>
                <button onclick="saveProduct()" class="bg-white text-black hover:bg-zinc-200 px-4 py-2 rounded-lg text-sm font-medium transition-colors">
                    Zapisz
                </button>
            </div>
        </div>
    </div>

    <!-- TikTok Video Modal -->
    <div id="tiktok-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 z-[60]" onclick="if(event.target===this)closeTiktokModal()">
        <button onclick="closeTiktokModal()" class="absolute top-4 right-4 text-zinc-400 hover:text-white transition-colors z-10" title="Zamknij">
            <i class="ph ph-x text-2xl"></i>
        </button>
        <div id="tiktok-modal-frame" class="relative bg-black rounded-xl overflow-hidden" style="aspect-ratio:9/16;max-height:80vh;width:min(90vw,45vh);"></div>
    </div>

    <!-- Ali Auction Preview Modal (podgląd na żywo z bud-tt-featured?id=<bud_key>) -->
    <div id="ali-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center p-4 z-[60]" onclick="if(event.target===this)closeAliModal()">
        <div class="bg-zinc-950 border border-white/10 rounded-lg w-full max-w-lg shadow-2xl max-h-[90vh] flex flex-col">
            <div class="flex items-center justify-between px-5 py-4 border-b border-white/5 flex-shrink-0">
                <h2 class="text-sm font-medium text-white flex items-center gap-2">
                    <i class="ph ph-storefront text-orange-400"></i>
                    Podgląd aukcji AliExpress
                </h2>
                <button onclick="closeAliModal()" class="text-zinc-500 hover:text-white transition-colors">
                    <i class="ph ph-x text-lg"></i>
                </button>
            </div>
            <div id="ali-modal-body" class="p-5 overflow-y-auto flex-1"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yxmavwkwnfuphjqbelws.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_vT94u2GI4gzYl8gCV5sHbQ_Q94YidaI';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        Sidebar.render();
        Sidebar.setupLogout(supabaseClient);

        let products = [];
        let filteredProducts = [];
        let currentMember = null;
        let isAdmin = false;
        let activeTab = 'active'; // 'active' or 'inactive'

        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = Sidebar.getLoginPath();
                return null;
            }
            Sidebar.setUserEmail(session.user.email.split('@')[0]);
            await loadTeamMember(session.user.id);
            return session;
        }

        async function loadTeamMember(userId) {
            const { data } = await supabaseClient.from('team_members').select('*');
            const members = data || [];
            currentMember = members.find(m => m.user_id === userId);
            isAdmin = currentMember?.role === 'admin';
            if (currentMember) {
                Sidebar.setUserName(currentMember.name);
                Sidebar.setUserColor(currentMember.color);
                Sidebar.setupProfileClick();
            }
            Sidebar.showAdminNav(isAdmin);
        }

        async function loadProducts() {
            const { data, error } = await supabaseClient.from('workflow_products').select('*').is('workflow_id', null).order('created_at', { ascending: false });

            if (error) {
                console.error('Error loading products:', error);
                return;
            }

            products = data || [];

            applyFilters();
            renderProducts();
        }

        function applyFilters() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const statusFilter = document.getElementById('status-filter').value;

            // Count active/inactive for tabs
            const activeCount = products.filter(p => p.is_active !== false).length;
            const inactiveCount = products.filter(p => p.is_active === false).length;
            document.getElementById('count-active').textContent = activeCount;
            document.getElementById('count-inactive').textContent = inactiveCount;

            filteredProducts = products.filter(p => {
                // Filter by active tab
                const isActive = p.is_active !== false;
                if (activeTab === 'active' && !isActive) return false;
                if (activeTab === 'inactive' && isActive) return false;

                if (search) {
                    const searchText = [p.name, p.description].filter(Boolean).join(' ').toLowerCase();
                    if (!searchText.includes(search)) return false;
                }
                if (statusFilter && p.status !== statusFilter) return false;
                return true;
            });

            document.getElementById('total-products').textContent = filteredProducts.length;
        }

        function setActiveTab(tab) {
            activeTab = tab;

            // Update tab styles
            const tabActive = document.getElementById('tab-active');
            const tabInactive = document.getElementById('tab-inactive');

            if (tab === 'active') {
                tabActive.classList.add('border-emerald-500', 'text-white');
                tabActive.classList.remove('border-transparent', 'text-zinc-500');
                tabInactive.classList.remove('border-amber-500', 'text-white');
                tabInactive.classList.add('border-transparent', 'text-zinc-500');
            } else {
                tabInactive.classList.add('border-amber-500', 'text-white');
                tabInactive.classList.remove('border-transparent', 'text-zinc-500');
                tabActive.classList.remove('border-emerald-500', 'text-white');
                tabActive.classList.add('border-transparent', 'text-zinc-500');
            }

            applyFilters();
            renderProducts();
        }

        async function toggleProductActive(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;

            const newActiveState = product.is_active === false ? true : false;

            const { error } = await supabaseClient
                .from('workflow_products')
                .update({ is_active: newActiveState })
                .eq('id', id);

            if (error) {
                console.error('Error toggling product:', error);
                showToast('Błąd: ' + error.message, 'error');
                return;
            }

            product.is_active = newActiveState;
            applyFilters();
            renderProducts();
            showToast(newActiveState ? 'Produkt włączony' : 'Produkt wyłączony', 'success');
        }

        const statusLabels = {
            'proposal': { text: 'Propozycja', class: 'bg-cyan-500/20 text-cyan-400' },
            'approved': { text: 'Zatwierdzony', class: 'bg-emerald-500/20 text-emerald-400' },
            'pending': { text: 'Oczekuje', class: 'bg-amber-500/20 text-amber-400' },
            'in_production': { text: 'W produkcji', class: 'bg-blue-500/20 text-blue-400' },
            'shipped': { text: 'Wysłany', class: 'bg-violet-500/20 text-violet-400' },
            'delivered': { text: 'Dostarczony', class: 'bg-emerald-500/20 text-emerald-400' }
        };

        // ── TikTok video: wyciągnij VIDEO_ID (same cyfry) i zbuduj URL playera samodzielnie ──
        function tiktokVideoId(url) {
            const m = String(url || '').match(/\/video\/(\d+)/);
            return m ? m[1] : '';
        }
        function tiktokPlayerSrc(id) {
            return `https://www.tiktok.com/player/v1/${id}?rel=0&autoplay=1&music_info=0&description=0`;
        }
        function openTiktokModal(id) {
            if (!id || !/^\d+$/.test(id)) return;
            const frame = document.getElementById('tiktok-modal-frame');
            frame.innerHTML = `<iframe src="${tiktokPlayerSrc(id)}" class="w-full h-full" style="border:0" allow="autoplay; fullscreen; encrypted-media" allowfullscreen></iframe>`;
            document.getElementById('tiktok-modal').classList.remove('hidden');
        }
        function closeTiktokModal() {
            document.getElementById('tiktok-modal').classList.add('hidden');
            document.getElementById('tiktok-modal-frame').innerHTML = ''; // usuń iframe = zatrzymaj dźwięk
        }
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !document.getElementById('tiktok-modal').classList.contains('hidden')) {
                closeTiktokModal();
            }
        });

        // ── Escape uniwersalny (tekst + atrybuty): koduje & < > " ' ──
        function esc(s) {
            return String(s == null ? '' : s)
                .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        // URL do atrybutu src/href: przepuszcza tylko http(s) (i względne ścieżki) — blokuje javascript:/data:
        function safeUrl(u) {
            const s = String(u == null ? '' : u).trim();
            return /^(https?:\/\/|\/)/i.test(s) ? s : '';
        }

        // 14900 → "14,9k", 194359 → "194,4k", 1000 → "1k", 850 → "850"
        function fmtSold(n) {
            n = Number(n) || 0;
            if (n >= 1000) {
                const s = (Math.round((n / 1000) * 10) / 10).toString().replace('.', ',');
                return s + 'k';
            }
            return String(n);
        }

        function starRow(n) {
            n = Math.max(0, Math.min(5, Math.round(Number(n) || 0)));
            let out = '';
            for (let i = 0; i < 5; i++) out += `<i class="ph-fill ph-star ${i < n ? 'text-amber-400' : 'text-zinc-700'}"></i>`;
            return out;
        }

        // ── SEZONOWOŚĆ (kompakt) ── dane płyną z radaru: season_type/season_label/sell_from/sell_to ('MM-DD').
        // season_type ('all_year'|'seasonal') = źródło prawdy; label tylko do wyświetlenia.
        function _mmddPL(s) { const m = /^(\d{2})-(\d{2})$/.exec(s || ''); return m ? `${m[2]}.${m[1]}` : ''; } // "07-16" → "16.07"
        function inWindow(from, to) {                                  // czy dziś mieści się w oknie [from,to] (wrap-around)
            if (!from || !to) return true;
            const pf = /^(\d{2})-(\d{2})$/.exec(from), pt = /^(\d{2})-(\d{2})$/.exec(to);
            if (!pf || !pt) return true;
            const now = new Date(), nowN = (now.getMonth() + 1) * 100 + now.getDate();
            const fromN = +pf[1] * 100 + +pf[2], toN = +pt[1] * 100 + +pt[2];
            return fromN <= toN ? (nowN >= fromN && nowN <= toN) : (nowN >= fromN || nowN <= toN);
        }
        function _daysUntil(mmdd) {                                    // dni do najbliższego wystąpienia MM-DD
            const m = /^(\d{2})-(\d{2})$/.exec(mmdd || ''); if (!m) return null;
            const now = new Date(); now.setHours(0, 0, 0, 0);
            let d = new Date(now.getFullYear(), +m[1] - 1, +m[2]);
            if (d < now) d = new Date(now.getFullYear() + 1, +m[1] - 1, +m[2]);
            return Math.round((d - now) / 86400000);
        }
        // Zwraca <span> badge sezonu (te same stany co /trendy) albo '' gdy brak danych sezonu.
        // Decyzja o typie płynie z season_type (kolumna); /całoroczn/i tylko jako fallback dla nie-zmigrowanych wierszy.
        function seasonBadge(p) {
            const type = (p.season_type || '').trim(), label = (p.season_label || '').trim(), from = p.sell_from, to = p.sell_to;
            if (!type && !label && !from && !to) return '';
            const base = 'inline-flex items-center gap-1 px-2 py-1 rounded-md text-[11px] font-medium border';
            if (type === 'all_year' || (!type && /całoroczn/i.test(label))) return `<span class="${base} bg-zinc-700/20 text-zinc-400 border-zinc-600/30">∞ ${esc(label || 'całoroczny')}</span>`;
            if (type && type !== 'seasonal') return '';                         // nieznany typ → brak badge
            const lab = esc(label || 'sezonowy');
            if (from && to) {
                if (!inWindow(from, to)) return `<span class="${base} bg-red-500/15 text-red-400 border-red-500/25" title="Poza sezonem — wraca ${esc(_mmddPL(from))}">⛔ poza sezonem (${lab})</span>`;
                const end = _mmddPL(to), d = _daysUntil(to);
                if (end && d != null && d <= 21) return `<span class="${base} bg-amber-500/15 text-amber-400 border-amber-500/25">⏳ ${lab} · koniec ${end}</span>`;
                return `<span class="${base} bg-blue-500/15 text-blue-400 border-blue-500/25">🗓 ${lab}${end ? ` · do ${end}` : ''}</span>`;
            }
            return `<span class="${base} bg-blue-500/15 text-blue-400 border-blue-500/25">🗓 ${lab}</span>`;
        }

        // ── Podgląd aukcji na żywo: publiczny edge bud-tt-featured w trybie ?id=<bud_key> ──
        async function openAliModal(key) {
            if (!key) return;
            const modal = document.getElementById('ali-modal');
            const body = document.getElementById('ali-modal-body');
            body.innerHTML = '<div class="py-12 text-center text-zinc-500"><i class="ph ph-spinner text-3xl animate-spin"></i><p class="mt-3 text-xs">Ładowanie aukcji…</p></div>';
            modal.classList.remove('hidden');
            try {
                const res = await fetch(`${SUPABASE_URL}/functions/v1/bud-tt-featured?id=${encodeURIComponent(key)}`, { headers: { apikey: SUPABASE_ANON_KEY } });
                const data = await res.json();
                const p = data && data.product;
                if (!p) { body.innerHTML = '<div class="py-12 text-center text-zinc-500 text-sm">Nie znaleziono danych aukcji.</div>'; return; }
                renderAli(p);
            } catch (e) {
                body.innerHTML = '<div class="py-12 text-center text-red-400 text-sm">Błąd ładowania: ' + esc(e.message) + '</div>';
            }
        }

        function renderAli(p) {
            const ali = p.ali || {};
            const imgs = (Array.isArray(ali.images) && ali.images.length) ? ali.images : [ali.main_image || p.image].filter(Boolean);
            const rs = ali.review_stats || null;
            const reviews = Array.isArray(ali.reviews) ? ali.reviews.slice(0, 5) : [];
            const title = ali.title || p.name || '';
            document.getElementById('ali-modal-body').innerHTML = `
                <div class="space-y-4">
                    <div>
                        <h3 class="text-white font-medium text-base leading-snug">${esc(title)}</h3>
                        <div class="flex items-center gap-3 mt-2 flex-wrap">
                            ${p.price ? `<span class="text-emerald-400 font-semibold text-sm">${esc(p.price)}</span>` : ''}
                            ${rs && rs.avg ? `<span class="inline-flex items-center gap-1 text-xs">${starRow(rs.avg)}<span class="text-zinc-400 ml-1">${esc(rs.avg)}${rs.numRatings ? ` · ${esc(rs.numRatings)} ocen` : ''}</span></span>` : ''}
                        </div>
                        ${p.product_link ? `<a href="${esc(p.product_link)}" target="_blank" rel="noopener" class="inline-flex items-center gap-1 text-orange-400 hover:text-orange-300 text-xs mt-2"><i class="ph ph-arrow-square-out"></i> Otwórz na AliExpress</a>` : ''}
                    </div>
                    ${imgs.length ? `<div class="flex gap-2 overflow-x-auto pb-2 -mx-1 px-1">${imgs.map(u => `<img src="${esc(u)}" class="h-40 w-40 flex-shrink-0 object-cover rounded-lg border border-zinc-800 bg-zinc-900" loading="lazy">`).join('')}</div>` : ''}
                    ${reviews.length ? `<div class="space-y-3">
                        <h4 class="text-zinc-400 text-[10px] font-mono uppercase tracking-wider">Opinie klientów</h4>
                        ${reviews.map(r => `
                            <div class="border border-white/5 rounded-lg p-3 bg-zinc-900/50">
                                <div class="flex items-center justify-between mb-1.5 gap-2">
                                    <span class="text-white text-xs font-medium truncate">${esc(r.name || 'Klient')}</span>
                                    <span class="text-xs flex-shrink-0">${starRow(r.stars)}</span>
                                </div>
                                ${r.text ? `<p class="text-zinc-300 text-xs leading-relaxed">${esc(r.text)}</p>` : ''}
                                ${Array.isArray(r.images) && r.images.length ? `<div class="flex gap-1.5 mt-2 overflow-x-auto">${r.images.slice(0, 6).map(u => `<img src="${esc(u)}" class="h-16 w-16 flex-shrink-0 object-cover rounded border border-zinc-800 bg-zinc-900" loading="lazy">`).join('')}</div>` : ''}
                            </div>
                        `).join('')}
                    </div>` : `<p class="text-zinc-600 text-xs">Brak opinii w migawce aukcji.</p>`}
                </div>
            `;
        }

        function closeAliModal() {
            document.getElementById('ali-modal').classList.add('hidden');
            document.getElementById('ali-modal-body').innerHTML = '';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !document.getElementById('ali-modal').classList.contains('hidden')) {
                closeAliModal();
            }
        });

        // Delegacja kliknięć „Aukcja Ali" (bud_key przez data-atrybut, bez inline onclick = bez XSS).
        document.getElementById('products-grid').addEventListener('click', (e) => {
            const btn = e.target.closest('[data-ali-key]');
            if (btn) openAliModal(btn.getAttribute('data-ali-key'));
        });

        function renderProducts() {
            const grid = document.getElementById('products-grid');
            const emptyState = document.getElementById('empty-state');

            if (filteredProducts.length === 0) {
                grid.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');

            grid.innerHTML = filteredProducts.map(p => {
                const status = statusLabels[p.status] || statusLabels.proposal;
                const isActive = p.is_active !== false;
                const ttId = tiktokVideoId(p.tiktok_url);

                return `
                    <div class="product-card bg-zinc-900/60 border border-white/5 rounded-xl overflow-hidden group transition-all ${!isActive ? 'opacity-60' : ''}">
                        <div class="relative aspect-square bg-zinc-800 overflow-hidden">
                            ${p.image_url
                                ? `<img src="${esc(safeUrl(p.image_url))}" alt="${esc(p.name)}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300 ${!isActive ? 'grayscale' : ''}" loading="lazy">`
                                : `<div class="w-full h-full flex items-center justify-center"><i class="ph ph-package text-4xl text-zinc-700"></i></div>`
                            }
                            <span class="absolute top-3 right-3 px-2 py-1 rounded-md text-[10px] font-medium ${status.class} backdrop-blur-sm">${status.text}</span>
                            ${!isActive ? `<span class="absolute top-3 left-3 px-2 py-1 rounded-md text-[10px] font-medium bg-zinc-800/90 text-zinc-400 backdrop-blur-sm"><i class="ph ph-eye-slash mr-1"></i>Wyłączony</span>` : ''}
                            ${ttId ? `<button onclick="openTiktokModal('${ttId}')" class="absolute inset-0 m-auto w-14 h-14 flex items-center justify-center rounded-full bg-black/50 backdrop-blur-sm border border-white/25 text-white hover:scale-110 hover:bg-black/70 transition-all duration-200" title="Zobacz wideo TikTok"><i class="ph-fill ph-play text-2xl ml-0.5"></i></button>` : ''}
                        </div>
                        <div class="p-4">
                            <h4 class="text-white font-medium text-sm leading-tight mb-2" style="display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${esc(p.name)}</h4>
                            ${p.orders_sold ? `<div class="mb-2"><span class="inline-flex items-center gap-1 px-2 py-1 rounded-md text-[11px] font-medium bg-emerald-500/15 text-emerald-400 border border-emerald-500/25">🛒 ${fmtSold(p.orders_sold)} sprzedanych${p.orders_sold_source === 'tiktok_shop' ? ' (TikTok Shop)' : ''}</span></div>` : ''}
                            ${(() => { const sb = seasonBadge(p); return sb ? `<div class="mb-2">${sb}</div>` : ''; })()}
                            ${p.bud_key ? `<button type="button" data-ali-key="${esc(p.bud_key)}" class="w-full mb-2 flex items-center justify-center gap-1.5 px-3 py-2 rounded-lg text-xs font-medium bg-orange-500/10 text-orange-300 border border-orange-500/20 hover:bg-orange-500/20 transition-colors"><i class="ph ph-storefront"></i> Aukcja Ali</button>` : ''}
                            <div class="flex items-center justify-between pt-2 border-t border-white/5">
                                <button onclick="toggleProductActive('${p.id}')" class="${isActive ? 'text-emerald-500 hover:text-emerald-400' : 'text-zinc-500 hover:text-emerald-400'} text-xs transition-colors" title="${isActive ? 'Wyłącz produkt' : 'Włącz produkt'}">
                                    <i class="ph ${isActive ? 'ph-toggle-right' : 'ph-toggle-left'} text-lg"></i>
                                </button>
                                <div class="flex items-center gap-2">
                                    ${p.report_screenshot_url ? `<a href="${esc(safeUrl(p.report_screenshot_url))}" target="_blank" download class="text-red-400 hover:text-red-300 text-xs" title="Pobierz PDF"><i class="ph ph-file-pdf"></i></a>` : ''}
                                    ${p.source_url ? `<a href="${esc(safeUrl(p.source_url))}" target="_blank" class="text-orange-400 hover:text-orange-300 text-xs"><i class="ph ph-arrow-square-out"></i></a>` : ''}
                                    <button onclick="openAddProductModal('${p.id}')" class="text-zinc-500 hover:text-white text-xs transition-colors"><i class="ph ph-pencil-simple"></i></button>
                                    <button onclick="deleteProduct('${p.id}')" class="text-zinc-500 hover:text-red-400 text-xs transition-colors"><i class="ph ph-trash"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openAddProductModal(editId) {
            const modal = document.getElementById('product-modal');
            const title = document.getElementById('product-modal-title');

            // Reset
            document.getElementById('product-edit-id').value = '';
            document.getElementById('product-name').value = '';
            document.getElementById('product-source-url').value = '';
            document.getElementById('product-image-url').value = '';
            document.getElementById('product-tiktok-url').value = '';
            document.getElementById('product-report-screenshot-url').value = '';
            updateImagePreview();
            resetReportScreenshotPreview();

            const seasonBox = document.getElementById('product-season-display');
            seasonBox.classList.add('hidden');
            seasonBox.innerHTML = '';

            if (editId) {
                const p = products.find(x => x.id === editId);
                if (p) {
                    title.innerHTML = '<i class="ph ph-pencil-simple text-orange-400"></i> Edytuj produkt';
                    document.getElementById('product-edit-id').value = p.id;
                    document.getElementById('product-name').value = p.name || '';
                    document.getElementById('product-source-url').value = p.source_url || '';
                    document.getElementById('product-image-url').value = p.image_url || '';
                    document.getElementById('product-tiktok-url').value = p.tiktok_url || '';
                    updateImagePreview();

                    // Sezonowość — read-only wgląd (edycja tylko w radarze /trendy)
                    const sb = seasonBadge(p);
                    if (sb) {
                        seasonBox.innerHTML = `
                            <label class="block text-zinc-500 text-[10px] font-mono uppercase tracking-wider mb-1.5">Sezonowość</label>
                            <div class="flex items-center gap-2 flex-wrap px-3 py-2.5 rounded-lg bg-zinc-900 border border-zinc-800">
                                ${sb}
                                <span class="text-zinc-500 text-[11px]">dane z radaru — edytuj w /trendy</span>
                            </div>`;
                        seasonBox.classList.remove('hidden');
                    }

                    // PDF screenshot
                    if (p.report_screenshot_url) {
                        document.getElementById('product-report-screenshot-url').value = p.report_screenshot_url;
                        showReportScreenshotPreview(p.report_screenshot_url);
                    }
                }
            } else {
                title.innerHTML = '<i class="ph ph-package text-orange-400"></i> Dodaj produkt';
            }

            modal.classList.remove('hidden');
        }

        function closeProductModal() {
            document.getElementById('product-modal').classList.add('hidden');
        }

        function updateImagePreview() {
            const url = document.getElementById('product-image-url').value.trim();
            const preview = document.getElementById('product-image-preview');
            const img = document.getElementById('product-image-preview-img');
            if (url) {
                img.src = url;
                preview.classList.remove('hidden');
            } else {
                preview.classList.add('hidden');
                img.src = '';
            }
        }

        // Live preview on image URL change
        document.addEventListener('DOMContentLoaded', () => {
            const imgInput = document.getElementById('product-image-url');
            if (imgInput) imgInput.addEventListener('input', updateImagePreview);
        });

        // Report Screenshot PDF functions
        function handleReportScreenshotDrop(event) {
            const file = event.dataTransfer.files[0];
            if (file) processReportScreenshotFile(file);
        }

        async function handleReportScreenshotUpload(event) {
            const file = event.target.files[0];
            if (file) processReportScreenshotFile(file);
        }

        async function processReportScreenshotFile(file) {
            if (!file) return;

            if (file.type !== 'application/pdf') {
                showToast('Wybierz plik PDF', 'error');
                return;
            }

            if (file.size > 50 * 1024 * 1024) {
                showToast('Plik jest za duży (max 50MB)', 'error');
                return;
            }

            // Show loading state
            const emptyEl = document.getElementById('report-screenshot-empty');
            emptyEl.innerHTML = '<i class="ph ph-spinner text-2xl text-zinc-500 animate-spin"></i><p class="text-zinc-500 text-xs mt-2">Przesyłanie...</p>';

            // Upload to Supabase Storage
            const fileName = `product_screenshots/${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.-]/g, '_')}`;
            const { data, error } = await supabaseClient.storage
                .from('attachments')
                .upload(fileName, file, { contentType: 'application/pdf' });

            if (error) {
                console.error('Upload error:', error);
                showToast('Błąd przesyłania: ' + error.message, 'error');
                resetReportScreenshotPreview();
                return;
            }

            // Get public URL
            const { data: { publicUrl } } = supabaseClient.storage
                .from('attachments')
                .getPublicUrl(fileName);

            document.getElementById('product-report-screenshot-url').value = publicUrl;
            showReportScreenshotPreview(publicUrl, file.name);
            showToast('PDF przesłany', 'success');
        }

        function showReportScreenshotPreview(url, filename = null) {
            document.getElementById('report-screenshot-empty').classList.add('hidden');
            document.getElementById('report-screenshot-preview').classList.remove('hidden');
            document.getElementById('report-screenshot-filename').textContent = filename || url.split('/').pop();
        }

        function resetReportScreenshotPreview() {
            document.getElementById('report-screenshot-empty').classList.remove('hidden');
            document.getElementById('report-screenshot-empty').innerHTML = `
                <i class="ph ph-file-pdf text-2xl text-zinc-600 mb-2"></i>
                <p class="text-zinc-500 text-xs">Przeciągnij PDF lub kliknij</p>
            `;
            document.getElementById('report-screenshot-preview').classList.add('hidden');
            document.getElementById('report-screenshot-file').value = '';
        }

        function removeReportScreenshot() {
            document.getElementById('product-report-screenshot-url').value = '';
            resetReportScreenshotPreview();
        }

        async function saveProduct() {
            const id = document.getElementById('product-edit-id').value;
            const name = document.getElementById('product-name').value.trim();

            if (!name) { showToast('Podaj nazwę produktu', 'error'); return; }

            const payload = {
                workflow_id: null,
                name,
                image_url: document.getElementById('product-image-url').value.trim() || null,
                source_url: document.getElementById('product-source-url').value.trim() || null,
                tiktok_url: document.getElementById('product-tiktok-url').value.trim() || null,
                report_screenshot_url: document.getElementById('product-report-screenshot-url').value.trim() || null,
                visible_to_client: true,
            };

            if (!id) payload.status = 'proposal';

            let error;
            if (id) {
                ({ error } = await supabaseClient.from('workflow_products').update(payload).eq('id', id));
            } else {
                const res = await supabaseClient.from('workflow_products').insert(payload).select('id').single();
                error = res.error;
            }

            if (error) {
                console.error('Error saving product:', error);
                showToast('Błąd zapisu: ' + error.message, 'error');
                return;
            }

            closeProductModal();
            showToast(id ? 'Produkt zaktualizowany' : 'Produkt dodany', 'success');
            await loadProducts();
        }

        async function deleteProduct(id) {
            if (!confirm('Usunąć ten produkt?')) return;

            const { error } = await supabaseClient.from('workflow_products').delete().eq('id', id);
            if (!error) {
                products = products.filter(p => p.id !== id);
                applyFilters();
                renderProducts();
                showToast('Produkt usunięty', 'success');
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            const bg = type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#3b82f6';
            toast.style.cssText = `position:fixed;top:20px;right:20px;z-index:9999;background:${bg};color:#fff;padding:12px 20px;border-radius:8px;font:14px/1 sans-serif;box-shadow:0 4px 12px rgba(0,0,0,.3);transition:opacity 0.3s`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2500);
        }

        async function init() {
            const session = await checkAuth();
            if (session) {
                await loadProducts();
            }
        }
        init();

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').catch(() => {});
        }
    </script>
</body>
</html>
