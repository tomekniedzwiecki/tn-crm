<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TN Content - Pomysły</title>
    <link rel="icon" type="image/svg+xml" href="/tn-content/favicon.svg">
    <meta name="theme-color" content="#000000">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="../components/shared-sidebar.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #000; color: #e5e5e5; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::selection { background: #e11d48; color: white; }

        .glass-header {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-enter { animation: fadeIn 0.4s ease-out forwards; }

        .stat-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.2s;
        }
        .stat-card:hover {
            border-color: rgba(255,255,255,0.12);
        }

        .input-field {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s;
        }
        .input-field:focus {
            border-color: #fbbf24;
            outline: none;
            box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.1);
        }

        .idea-item {
            transition: all 0.15s ease;
            cursor: grab;
        }
        .idea-item:hover {
            background: rgba(255,255,255,0.03);
        }
        .idea-item.dragging {
            opacity: 0.5;
        }

        .category-educational { border-left: 3px solid #3b82f6; }
        .category-motivational { border-left: 3px solid #f59e0b; }
        .category-case_study { border-left: 3px solid #8b5cf6; }
        .category-tutorial { border-left: 3px solid #10b981; }
        .category-behind_scenes { border-left: 3px solid #ec4899; }
        .category-qa { border-left: 3px solid #6366f1; }
    </style>
</head>
<body class="h-screen flex overflow-hidden font-sans text-sm tracking-tight antialiased">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-[280px] bg-zinc-950 border-r border-white/5 flex flex-col flex-shrink-0"></aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col bg-black relative min-w-0">
        <!-- Header -->
        <header class="h-16 glass-header flex items-center justify-between px-4 md:px-6 sticky top-0 z-30">
            <div class="flex items-center gap-3">
                <button onclick="Sidebar.toggle()" class="mobile-menu-btn hidden items-center justify-center w-9 h-9 rounded-lg hover:bg-white/5 text-zinc-400 hover:text-white transition-colors">
                    <i class="ph ph-list text-xl"></i>
                </button>
                <div class="flex items-center gap-2 text-zinc-500">
                    <span class="text-zinc-400 hidden sm:inline">tn-content</span>
                    <span class="text-zinc-700 hidden sm:inline">/</span>
                    <span class="text-white font-medium">pomysły</span>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="showNewIdeaModal()" class="flex items-center gap-2 px-4 py-2 bg-amber-500 hover:bg-amber-600 text-black rounded-lg transition-colors text-sm font-medium">
                    <i class="ph ph-plus"></i>
                    <span class="hidden sm:inline">Nowy pomysł</span>
                </button>
            </div>
        </header>

        <!-- Content -->
        <div class="flex-1 overflow-y-auto">
            <div class="p-4 md:p-6 lg:p-10 max-w-5xl mx-auto animate-enter">

                <!-- Filters -->
                <div class="flex flex-wrap items-center gap-2 mb-6">
                    <button onclick="filterIdeas('all')" class="filter-btn active px-3 py-1.5 rounded-lg text-sm bg-white/5 text-zinc-400 hover:text-white transition-colors" data-filter="all">
                        Wszystkie
                    </button>
                    <button onclick="filterIdeas('idea')" class="filter-btn px-3 py-1.5 rounded-lg text-sm bg-white/5 text-zinc-400 hover:text-white transition-colors" data-filter="idea">
                        Pomysły
                    </button>
                    <button onclick="filterIdeas('researching')" class="filter-btn px-3 py-1.5 rounded-lg text-sm bg-white/5 text-zinc-400 hover:text-white transition-colors" data-filter="researching">
                        W researchu
                    </button>
                    <button onclick="filterIdeas('scripting')" class="filter-btn px-3 py-1.5 rounded-lg text-sm bg-white/5 text-zinc-400 hover:text-white transition-colors" data-filter="scripting">
                        Pisanie skryptu
                    </button>
                    <button onclick="filterIdeas('done')" class="filter-btn px-3 py-1.5 rounded-lg text-sm bg-white/5 text-zinc-400 hover:text-white transition-colors" data-filter="done">
                        Zrealizowane
                    </button>
                </div>

                <!-- Ideas list -->
                <div id="ideas-list" class="space-y-2">
                    <!-- Ideas loaded here -->
                </div>

                <!-- Empty state -->
                <div id="empty-state" class="text-center py-20 text-zinc-600 hidden">
                    <i class="ph ph-lightbulb text-5xl mb-4"></i>
                    <p class="text-lg mb-2">Brak pomysłów</p>
                    <button onclick="showNewIdeaModal()" class="text-amber-400 hover:underline">Dodaj pierwszy pomysł</button>
                </div>
            </div>
        </div>
    </main>

    <!-- New/Edit Idea Modal -->
    <div id="idea-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-zinc-900 border border-white/10 rounded-xl w-full max-w-lg">
            <div class="flex items-center justify-between p-4 border-b border-white/5">
                <h3 class="font-semibold text-white" id="modal-title">Nowy pomysł</h3>
                <button onclick="closeModal()" class="text-zinc-400 hover:text-white">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>
            <form onsubmit="saveIdea(event)" class="p-4 space-y-4">
                <input type="hidden" id="idea-id">

                <div>
                    <label class="text-xs text-zinc-500 uppercase tracking-wider mb-1 block">Tytuł / temat</label>
                    <input type="text" id="idea-title" required placeholder="O czym ma być odcinek?" class="input-field w-full px-3 py-2 rounded-lg text-white placeholder:text-zinc-600">
                </div>

                <div>
                    <label class="text-xs text-zinc-500 uppercase tracking-wider mb-1 block">Opis / notatki</label>
                    <textarea id="idea-description" rows="3" placeholder="Dodatkowe przemyślenia, źródła inspiracji..." class="input-field w-full px-3 py-2 rounded-lg text-white placeholder:text-zinc-600 resize-none"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-zinc-500 uppercase tracking-wider mb-1 block">Kategoria</label>
                        <select id="idea-category" class="input-field w-full px-3 py-2 rounded-lg text-white">
                            <option value="">Bez kategorii</option>
                            <option value="educational">Edukacyjny</option>
                            <option value="motivational">Motywacyjny</option>
                            <option value="case_study">Case Study</option>
                            <option value="tutorial">Tutorial</option>
                            <option value="behind_scenes">Za kulisami</option>
                            <option value="qa">Q&A</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-zinc-500 uppercase tracking-wider mb-1 block">Status</label>
                        <select id="idea-status" class="input-field w-full px-3 py-2 rounded-lg text-white">
                            <option value="idea">Pomysł</option>
                            <option value="researching">W researchu</option>
                            <option value="scripting">Pisanie skryptu</option>
                            <option value="scheduled">Zaplanowany</option>
                            <option value="done">Zrealizowany</option>
                            <option value="rejected">Odrzucony</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-xs text-zinc-500 uppercase tracking-wider mb-1 block">Źródło pomysłu</label>
                    <input type="text" id="idea-source" placeholder="Komentarz, trend, osobiste..." class="input-field w-full px-3 py-2 rounded-lg text-white placeholder:text-zinc-600">
                </div>

                <div class="flex items-center gap-2">
                    <input type="checkbox" id="idea-priority" class="w-4 h-4 rounded border-white/20 bg-white/5 text-amber-500 focus:ring-amber-500/20">
                    <label for="idea-priority" class="text-sm text-zinc-400">Priorytetowy pomysł</label>
                </div>

                <div class="flex items-center gap-3 pt-4">
                    <button type="submit" class="flex-1 px-4 py-2.5 bg-amber-500 hover:bg-amber-600 text-black rounded-lg font-medium transition-colors">
                        Zapisz
                    </button>
                    <button type="button" onclick="deleteIdea()" id="delete-idea-btn" class="px-4 py-2.5 text-red-400 hover:text-red-300 hidden">
                        <i class="ph ph-trash"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://yxmavwkwnfuphjqbelws.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4bWF2d2t3bmZ1cGhqcWJlbHdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg3NjQyNTUsImV4cCI6MjA4NDM0MDI1NX0.XeR0Fc7OFn6YbNJrOKTBEj36JtmLISZTM87y4ai9340';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let allIdeas = [];
        let currentFilter = 'all';

        async function init() {
            const { data: { session } } = await supabaseClient.auth.getSession();

            if (!session || session.user.email !== 'tomekniedzwiecki@gmail.com') {
                window.location.href = '/';
                return;
            }

            Sidebar.render({ appId: 'content', userEmail: session.user.email });
            Sidebar.setUserEmail(session.user.email);
            Sidebar.setupLogout(supabaseClient);
            Sidebar.setupProfileClick();

            const { data: teamMember } = await supabaseClient
                .from('team_members')
                .select('name, color')
                .eq('email', session.user.email)
                .single();

            if (teamMember) {
                Sidebar.setUserName(teamMember.name);
                Sidebar.setUserColor(teamMember.color);
            }

            await loadIdeas();

            // Check URL params
            const params = new URLSearchParams(window.location.search);
            if (params.get('new') === '1') {
                showNewIdeaModal();
            } else if (params.get('id')) {
                editIdea(params.get('id'));
            }
        }

        async function loadIdeas() {
            const { data: ideas } = await supabaseClient
                .from('content_ideas')
                .select('*')
                .order('priority', { ascending: false })
                .order('created_at', { ascending: false });

            allIdeas = ideas || [];
            renderIdeas();
        }

        function renderIdeas() {
            const container = document.getElementById('ideas-list');
            const emptyState = document.getElementById('empty-state');

            let filtered = allIdeas;
            if (currentFilter !== 'all') {
                filtered = allIdeas.filter(i => i.status === currentFilter);
            }

            if (filtered.length === 0) {
                container.innerHTML = '';
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');

            container.innerHTML = filtered.map(idea => `
                <div onclick="editIdea('${idea.id}')" class="idea-item stat-card rounded-lg p-4 category-${idea.category || 'none'}">
                    <div class="flex items-start gap-3">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-2 mb-1">
                                ${idea.priority > 0 ? '<i class="ph-fill ph-star text-amber-400"></i>' : ''}
                                <span class="font-medium text-white">${escapeHtml(idea.title)}</span>
                            </div>
                            ${idea.description ? `<p class="text-sm text-zinc-500 line-clamp-2">${escapeHtml(idea.description)}</p>` : ''}
                            <div class="flex items-center gap-3 mt-2">
                                <span class="text-xs text-zinc-600">${getCategoryLabel(idea.category)}</span>
                                <span class="text-xs text-zinc-600">${idea.source || ''}</span>
                            </div>
                        </div>
                        <span class="status-${idea.status} text-xs px-2 py-0.5 rounded-full capitalize shrink-0">${getStatusLabel(idea.status)}</span>
                    </div>
                </div>
            `).join('');
        }

        function filterIdeas(status) {
            currentFilter = status;

            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.filter === status);
                btn.classList.toggle('bg-amber-500/20', btn.dataset.filter === status);
                btn.classList.toggle('text-amber-400', btn.dataset.filter === status);
            });

            renderIdeas();
        }

        function showNewIdeaModal() {
            document.getElementById('modal-title').textContent = 'Nowy pomysł';
            document.getElementById('idea-id').value = '';
            document.getElementById('idea-title').value = '';
            document.getElementById('idea-description').value = '';
            document.getElementById('idea-category').value = '';
            document.getElementById('idea-status').value = 'idea';
            document.getElementById('idea-source').value = '';
            document.getElementById('idea-priority').checked = false;
            document.getElementById('delete-idea-btn').classList.add('hidden');

            document.getElementById('idea-modal').classList.remove('hidden');
        }

        async function editIdea(id) {
            const idea = allIdeas.find(i => i.id === id);
            if (!idea) return;

            document.getElementById('modal-title').textContent = 'Edytuj pomysł';
            document.getElementById('idea-id').value = idea.id;
            document.getElementById('idea-title').value = idea.title || '';
            document.getElementById('idea-description').value = idea.description || '';
            document.getElementById('idea-category').value = idea.category || '';
            document.getElementById('idea-status').value = idea.status || 'idea';
            document.getElementById('idea-source').value = idea.source || '';
            document.getElementById('idea-priority').checked = idea.priority > 0;
            document.getElementById('delete-idea-btn').classList.remove('hidden');

            document.getElementById('idea-modal').classList.remove('hidden');
        }

        async function saveIdea(e) {
            e.preventDefault();

            const id = document.getElementById('idea-id').value;
            const data = {
                title: document.getElementById('idea-title').value,
                description: document.getElementById('idea-description').value,
                category: document.getElementById('idea-category').value || null,
                status: document.getElementById('idea-status').value,
                source: document.getElementById('idea-source').value || null,
                priority: document.getElementById('idea-priority').checked ? 1 : 0
            };

            if (id) {
                await supabaseClient.from('content_ideas').update(data).eq('id', id);
            } else {
                await supabaseClient.from('content_ideas').insert(data);
            }

            closeModal();
            await loadIdeas();
        }

        async function deleteIdea() {
            const id = document.getElementById('idea-id').value;
            if (!id || !confirm('Usunąć ten pomysł?')) return;

            await supabaseClient.from('content_ideas').delete().eq('id', id);
            closeModal();
            await loadIdeas();
        }

        function closeModal() {
            document.getElementById('idea-modal').classList.add('hidden');
        }

        function getStatusLabel(status) {
            const labels = {
                idea: 'Pomysł',
                researching: 'Research',
                scripting: 'Skrypt',
                scheduled: 'Zaplanowany',
                done: 'Zrealizowany',
                rejected: 'Odrzucony'
            };
            return labels[status] || status;
        }

        function getCategoryLabel(category) {
            const labels = {
                educational: 'Edukacyjny',
                motivational: 'Motywacyjny',
                case_study: 'Case Study',
                tutorial: 'Tutorial',
                behind_scenes: 'Za kulisami',
                qa: 'Q&A'
            };
            return labels[category] || 'Bez kategorii';
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Close modal on escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });

        init();
    </script>

    <style>
        .status-idea { background: rgba(251, 191, 36, 0.2); color: #fbbf24; }
        .status-researching { background: rgba(59, 130, 246, 0.2); color: #3b82f6; }
        .status-scripting { background: rgba(168, 85, 247, 0.2); color: #a855f7; }
        .status-scheduled { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .status-done { background: rgba(161, 161, 170, 0.2); color: #a1a1aa; }
        .status-rejected { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>

</body>
</html>
