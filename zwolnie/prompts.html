<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zwolnię · Prompty AI</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/zwolnie/_assets/ds.css">
</head>
<body>

<div class="ds-app">
  <aside id="ze-sidebar" class="ds-sidebar"></aside>
  <main class="ds-main">
    <header class="ds-header">
      <div class="ds-header__left">
        <div class="ds-breadcrumb">
          <a href="/zwolnie/">Zwolnię</a>
          <span class="ds-sep">/</span>
          <span class="ds-current">Prompty AI</span>
        </div>
      </div>
      <div class="ds-header__center">
        <button onclick="ZE_Sidebar.openPalette()" class="ds-cmd">
          <i class="ph ph-magnifying-glass"></i>
          <span>Szukaj lub idź do...</span>
          <span class="ds-cmd__hint"><span class="ds-kbd">⌘</span><span class="ds-kbd">K</span></span>
        </button>
      </div>
      <div class="ds-header__right">
        <button id="add-prompt-btn" class="ds-btn ds-btn--magic ds-btn--sm"><i class="ph ph-plus"></i> Nowy prompt</button>
      </div>
    </header>

    <div class="ds-content ds-fade-in" style="max-width: 1100px;">
      <div class="ds-page-header">
        <div class="ds-page-header__top">
          <div>
            <h1 class="ds-page-header__title">Prompty AI</h1>
            <p class="ds-page-header__sub">Szablony używane w Claude Code. Zmienne: <code class="ds-mono">{{contact_name}}</code>, <code class="ds-mono">{{company}}</code>, <code class="ds-mono">{{problem}}</code>, <code class="ds-mono">{{lead_id}}</code>, <code class="ds-mono">{{panel_url}}</code>.</p>
          </div>
        </div>
      </div>
      <div id="prompts-list" class="ds-flex-col ds-gap-4"></div>
    </div>
  </main>
</div>

<script src="/zwolnie/_assets/config.js"></script>
<script src="/zwolnie/_assets/auth.js"></script>
<script src="/zwolnie/_assets/utils.js"></script>
<script src="/zwolnie/_assets/sidebar.js"></script>
<script>
let prompts = [];

(async () => {
  const { staff } = await ZE_Auth.require();
  ZE_Sidebar.render({ active: 'prompts', userEmail: staff.email });
  await loadPrompts();
  document.getElementById('add-prompt-btn').addEventListener('click', addPrompt);
})();

async function loadPrompts() {
  const { data, error } = await ZE_SB.from('ze_prompts').select('*').order('created_at');
  if (error) return ZE.toast(error.message, 'error');
  prompts = data || [];
  renderPrompts();
}

function renderPrompts() {
  const el = document.getElementById('prompts-list');
  if (!prompts.length) { el.innerHTML = '<div class="ds-empty"><div class="ds-empty__icon"><i class="ph ph-sparkle"></i></div><div class="ds-empty__title">Brak promptów</div></div>'; return; }
  el.innerHTML = prompts.map((p, i) => `
    <details class="ds-card ds-card--magic" ${i === 0 ? 'open' : ''}>
      <summary style="padding: 16px 20px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;">
        <div>
          <div class="ds-flex ds-items-center ds-gap-3">
            <span class="ds-avatar" style="width: 32px; height: 32px; background: var(--ds-magic-gradient);"><i class="ph ph-sparkle"></i></span>
            <div>
              <div class="ds-h4">${ZE.escapeHtml(p.title)}</div>
              <div class="ds-xs ds-mt-2">slug <code class="ds-mono">${ZE.escapeHtml(p.slug)}</code> · format ${ZE.escapeHtml(p.output_format)} · ${ZE.fmtRelative(p.updated_at)}</div>
            </div>
          </div>
        </div>
        <i class="ph ph-caret-down" style="color: var(--ds-fg-4);"></i>
      </summary>
      <div style="padding: 0 20px 20px; border-top: 1px solid var(--ds-border);">
        <div class="ds-grid ds-grid-3 ds-gap-3 ds-mt-4">
          <div class="ds-field">
            <label class="ds-field__label">Tytuł</label>
            <input data-field="title" data-id="${p.id}" value="${ZE.escapeHtml(p.title)}" class="ds-input">
          </div>
          <div class="ds-field">
            <label class="ds-field__label">Slug</label>
            <input data-field="slug" data-id="${p.id}" value="${ZE.escapeHtml(p.slug)}" class="ds-input ds-mono">
          </div>
          <div class="ds-field">
            <label class="ds-field__label">Format output</label>
            <select data-field="output_format" data-id="${p.id}" class="ds-select">
              <option value="markdown" ${p.output_format==='markdown'?'selected':''}>markdown</option>
              <option value="json" ${p.output_format==='json'?'selected':''}>json</option>
              <option value="html" ${p.output_format==='html'?'selected':''}>html</option>
            </select>
          </div>
        </div>
        <div class="ds-field ds-mt-3">
          <label class="ds-field__label">Opis (do czego służy)</label>
          <input data-field="description" data-id="${p.id}" value="${ZE.escapeHtml(p.description || '')}" class="ds-input">
        </div>
        <div class="ds-field ds-mt-3">
          <label class="ds-field__label">Szablon (z {{placeholders}})</label>
          <textarea data-field="template" data-id="${p.id}" rows="16" class="ds-textarea ds-mono" style="font-size: 12px; line-height: 1.55;">${ZE.escapeHtml(p.template)}</textarea>
        </div>
        <div class="ds-field ds-mt-3">
          <label class="ds-field__label">Oczekiwany output (notatka dla Tomka)</label>
          <input data-field="expected_output" data-id="${p.id}" value="${ZE.escapeHtml(p.expected_output || '')}" class="ds-input">
        </div>
        <div class="ds-flex ds-justify-between ds-mt-4">
          <button onclick="deletePrompt('${p.id}', '${ZE.escapeHtml(p.title)}')" class="ds-btn ds-btn--danger ds-btn--sm">Usuń</button>
          <button onclick="savePrompt('${p.id}')" class="ds-btn ds-btn--magic">Zapisz</button>
        </div>
      </div>
    </details>
  `).join('');
}

async function savePrompt(id) {
  const fields = {};
  document.querySelectorAll(`[data-id="${id}"][data-field]`).forEach(el => fields[el.dataset.field] = el.value);
  const staff = ZE_Auth.staff();
  fields.updated_by = staff.id;
  const { error } = await ZE_SB.from('ze_prompts').update(fields).eq('id', id);
  if (error) return ZE.toast(error.message, 'error');
  ZE.toast('Zapisano.', 'success'); await loadPrompts();
}

async function deletePrompt(id, title) {
  const ok = await ZE.confirm(`Usunąć prompt „${title}"?`);
  if (!ok) return;
  const { error } = await ZE_SB.from('ze_prompts').delete().eq('id', id);
  if (error) return ZE.toast(error.message, 'error');
  ZE.toast('Usunięto.', 'success'); await loadPrompts();
}
window.deletePrompt = deletePrompt;
window.savePrompt = savePrompt;

async function addPrompt() {
  const slug = await ZE.askText({ title: 'Slug nowego promptu', placeholder: 'np. deep_audit', multiline: false });
  if (!slug) return;
  const staff = ZE_Auth.staff();
  const { error } = await ZE_SB.from('ze_prompts').insert({
    slug: slug.trim().toLowerCase().replace(/[^a-z0-9_]/g, '_'),
    title: 'Nowy prompt',
    template: 'Hej Claude, klient {{contact_name}} z firmy {{company}} ma problem:\n\n{{problem}}\n\nWynik: ...',
    output_format: 'markdown', updated_by: staff.id
  });
  if (error) return ZE.toast(error.message, 'error');
  await loadPrompts();
}
</script>
</body>
</html>
