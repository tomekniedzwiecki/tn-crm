<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zwolnię · Dashboard</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<link rel="stylesheet" href="/zwolnie/_assets/common.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { font-family: 'Inter', sans-serif; }
</style>
</head>
<body class="min-h-screen flex">

<aside id="ze-sidebar" class="w-[260px] bg-zinc-950 border-r border-white/5 flex-shrink-0"></aside>

<main class="flex-1 flex flex-col min-w-0">
  <header class="h-16 glass-header flex items-center justify-between px-6 sticky top-0 z-30">
    <div class="flex items-center gap-2 text-sm">
      <span class="text-zinc-500">Zwolnię</span>
      <span class="text-zinc-700">/</span>
      <span class="text-white font-medium">Dashboard</span>
    </div>
  </header>

  <div class="flex-1 overflow-y-auto p-8 ze-fade">
    <div class="max-w-6xl mx-auto">
      <h1 class="text-3xl font-semibold text-white mb-1">Dashboard</h1>
      <p class="text-zinc-500 mb-8">Co się dzieje w Twoim pipeline.</p>

      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div class="p-5 bg-zinc-900/60 border border-white/5 rounded-xl">
          <div class="text-xs text-zinc-500 uppercase tracking-wider mb-2">Wszystkie leady</div>
          <div class="text-3xl font-semibold text-white" id="m-total">—</div>
        </div>
        <div class="p-5 bg-zinc-900/60 border border-white/5 rounded-xl">
          <div class="text-xs text-zinc-500 uppercase tracking-wider mb-2">Nowe (ten tydzień)</div>
          <div class="text-3xl font-semibold text-emerald-400" id="m-week">—</div>
        </div>
        <div class="p-5 bg-zinc-900/60 border border-white/5 rounded-xl">
          <div class="text-xs text-zinc-500 uppercase tracking-wider mb-2">Wymagają analizy</div>
          <div class="text-3xl font-semibold text-amber-400" id="m-todo">—</div>
        </div>
        <div class="p-5 bg-zinc-900/60 border border-white/5 rounded-xl">
          <div class="text-xs text-zinc-500 uppercase tracking-wider mb-2">Aktywne projekty</div>
          <div class="text-3xl font-semibold text-violet-400" id="m-projects">—</div>
        </div>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-zinc-900/60 border border-white/5 rounded-xl p-6">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-white">Najnowsze leady</h2>
            <a href="/zwolnie/leads" class="text-xs text-zinc-400 hover:text-white">Wszystkie →</a>
          </div>
          <div id="recent-leads" class="space-y-2">
            <div class="text-sm text-zinc-500">Ładowanie...</div>
          </div>
        </div>

        <div class="bg-zinc-900/60 border border-white/5 rounded-xl p-6">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-white">Wymagają Twojej akcji</h2>
            <a href="/zwolnie/pipeline" class="text-xs text-zinc-400 hover:text-white">Pipeline →</a>
          </div>
          <div id="action-needed" class="space-y-2">
            <div class="text-sm text-zinc-500">Ładowanie...</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="/zwolnie/_assets/config.js"></script>
<script src="/zwolnie/_assets/auth.js"></script>
<script src="/zwolnie/_assets/utils.js"></script>
<script src="/zwolnie/_assets/sidebar.js"></script>
<script>
(async () => {
  const { staff } = await ZE_Auth.require();
  ZE_Sidebar.render({ active: 'dashboard', userEmail: staff.email });

  // Metrics
  const weekAgo = new Date(Date.now() - 7*24*60*60*1000).toISOString();
  const [
    totalRes,
    weekRes,
    todoRes,
    projectsRes,
    recentRes,
    actionRes
  ] = await Promise.all([
    ZE_SB.from('ze_leads').select('id', { count: 'exact', head: true }),
    ZE_SB.from('ze_leads').select('id', { count: 'exact', head: true }).gte('created_at', weekAgo),
    ZE_SB.from('ze_leads').select('id', { count: 'exact', head: true }).in('status', ['new', 'analyzing']),
    ZE_SB.from('ze_projects').select('id', { count: 'exact', head: true }).in('status', ['planning', 'building']),
    ZE_SB.from('ze_leads').select('id, contact_name, company, status, created_at').order('created_at', { ascending: false }).limit(8),
    ZE_SB.from('ze_leads').select('id, contact_name, company, status, created_at').in('status', ['new', 'analyzing']).order('created_at', { ascending: false }).limit(8)
  ]);

  document.getElementById('m-total').textContent = totalRes.count ?? '0';
  document.getElementById('m-week').textContent = weekRes.count ?? '0';
  document.getElementById('m-todo').textContent = todoRes.count ?? '0';
  document.getElementById('m-projects').textContent = projectsRes.count ?? '0';

  ZE_Sidebar.setBadge('leads', totalRes.count ?? 0);

  const renderRow = (l) => `
    <a href="/zwolnie/lead?id=${l.id}" class="flex items-center justify-between p-3 rounded-lg hover:bg-white/5 transition-colors">
      <div class="min-w-0">
        <div class="text-sm text-white truncate">${ZE.escapeHtml(l.contact_name || '(brak imienia)')}</div>
        <div class="text-xs text-zinc-500 truncate">${ZE.escapeHtml(l.company || '—')} · ${ZE.fmtRelative(l.created_at)}</div>
      </div>
      ${ZE.statusBadge(l.status)}
    </a>
  `;

  const recentEl = document.getElementById('recent-leads');
  recentEl.innerHTML = (recentRes.data || []).length
    ? (recentRes.data.map(renderRow).join(''))
    : '<div class="text-sm text-zinc-500 py-4">Brak leadów. Pierwszy wpadnie z formularza zwolnie.tomekniedzwiecki.pl/zwolnie/.</div>';

  const actionEl = document.getElementById('action-needed');
  actionEl.innerHTML = (actionRes.data || []).length
    ? (actionRes.data.map(renderRow).join(''))
    : '<div class="text-sm text-zinc-500 py-4">Wszystko ogarnięte. Brak leadów do analizy.</div>';
})();
</script>
</body>
</html>
