<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zwolnię · Dashboard</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/zwolnie/_assets/ds.css">
<script>
  tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'], mono: ['JetBrains Mono','monospace'] } } } }
</script>
</head>
<body class="font-sans tracking-tight antialiased">

<div class="ds-app">
  <aside id="ze-sidebar"></aside>

  <main class="ds-main">
    <header class="glass-header px-6">
      <div class="ds-header__left">
        <div class="ds-breadcrumb"><span class="ds-current">Dashboard</span></div>
      </div>
      <div class="ds-header__center">
        <button onclick="ZE_Sidebar.openPalette()" class="ds-cmd">
          <i class="ph ph-magnifying-glass"></i>
          <span>Szukaj lub idź do...</span>
          <span class="ds-cmd__hint"><span class="ds-kbd">⌘</span><span class="ds-kbd">K</span></span>
        </button>
      </div>
      <div class="ds-header__right"></div>
    </header>

    <div class="ds-content animate-enter">

      <!-- Hero (radial gradient — Tomek's signature) -->
      <section class="hero-revenue p-8 mb-6 relative overflow-hidden">
        <div class="flex items-center justify-between gap-6 flex-wrap mb-6">
          <div>
            <div class="text-xs uppercase tracking-widest text-zinc-500 mb-2">Dashboard</div>
            <h1 class="text-3xl font-bold tracking-tight">Cześć, Tomek</h1>
            <p class="text-zinc-400 text-sm mt-2">Co się dzieje w Twoim pipeline. <span class="ds-kbd">⌘K</span> = command palette.</p>
          </div>
          <div class="flex items-center gap-2">
            <a href="/zwolnie/leads" class="ds-btn ds-btn--secondary"><i class="ph ph-users-three"></i> Leady</a>
            <a href="/zwolnie/pipeline" class="ds-btn ds-btn--accent"><i class="ph ph-kanban"></i> Pipeline</a>
          </div>
        </div>

        <!-- Mini stats trio: TYDZIEŃ / MIESIĄC / WSZYSTKIE -->
        <div class="grid grid-cols-3 gap-4 max-w-2xl">
          <div class="mini-stat" style="text-align:left">
            <div class="mini-stat-label">7 dni</div>
            <div class="mini-stat-value" id="ms-week">—</div>
            <div class="mini-stat-delta neutral" id="ms-week-delta">vs poprzedni tydzień</div>
          </div>
          <div class="mini-stat" style="text-align:left;border-left:1px solid var(--ds-border);padding-left:16px">
            <div class="mini-stat-label">Miesiąc</div>
            <div class="mini-stat-value" id="ms-month">—</div>
            <div class="mini-stat-delta neutral">nowych leadów</div>
          </div>
          <div class="mini-stat" style="text-align:left;border-left:1px solid var(--ds-border);padding-left:16px">
            <div class="mini-stat-label">Wszystkie</div>
            <div class="mini-stat-value" id="ms-total">—</div>
            <div class="mini-stat-delta neutral">w bazie</div>
          </div>
        </div>
      </section>

      <!-- Bento grid: 4 metric cards + 2 feed cards -->
      <div class="grid grid-cols-12 gap-4 mb-6">
        <a href="/zwolnie/leads" class="stat-card p-5 col-span-3">
          <div class="flex items-center justify-between mb-3">
            <span class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:rgba(255,255,255,0.06)"><i class="ph ph-users-three text-base"></i></span>
            <i class="ph ph-arrow-up-right text-zinc-600"></i>
          </div>
          <div class="text-[10px] uppercase tracking-widest text-zinc-500 mb-1">Wszystkie leady</div>
          <div class="font-mono text-3xl font-bold leading-none" id="m-total">—</div>
        </a>
        <a href="/zwolnie/leads#stale" class="stat-card p-5 col-span-3">
          <div class="flex items-center justify-between mb-3">
            <span class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:var(--ds-amber-soft);color:var(--ds-amber)"><i class="ph ph-clock-clockwise text-base"></i></span>
            <i class="ph ph-arrow-up-right text-zinc-600"></i>
          </div>
          <div class="text-[10px] uppercase tracking-widest text-zinc-500 mb-1">Czekają na analizę</div>
          <div class="font-mono text-3xl font-bold leading-none" id="m-todo" style="color:var(--ds-amber)">—</div>
        </a>
        <a href="/zwolnie/projects" class="stat-card p-5 col-span-3">
          <div class="flex items-center justify-between mb-3">
            <span class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:var(--ds-violet-soft);color:var(--ds-violet)"><i class="ph ph-folder-simple text-base"></i></span>
            <i class="ph ph-arrow-up-right text-zinc-600"></i>
          </div>
          <div class="text-[10px] uppercase tracking-widest text-zinc-500 mb-1">Aktywne projekty</div>
          <div class="font-mono text-3xl font-bold leading-none" id="m-projects" style="color:var(--ds-violet)">—</div>
        </a>
        <a href="/zwolnie/pipeline" class="stat-card p-5 col-span-3">
          <div class="flex items-center justify-between mb-3">
            <span class="w-8 h-8 rounded-lg flex items-center justify-center" style="background:var(--ds-teal-soft);color:var(--ds-teal)"><i class="ph ph-trophy text-base"></i></span>
            <i class="ph ph-arrow-up-right text-zinc-600"></i>
          </div>
          <div class="text-[10px] uppercase tracking-widest text-zinc-500 mb-1">Wygrane</div>
          <div class="font-mono text-3xl font-bold leading-none" id="m-won" style="color:var(--ds-teal)">—</div>
        </a>
      </div>

      <!-- Activity feeds -->
      <div class="grid grid-cols-12 gap-4">
        <div class="section-card col-span-7 overflow-hidden">
          <div class="px-5 py-4 border-b border-white/[0.06] flex items-center justify-between">
            <div class="flex items-center gap-2">
              <i class="ph ph-list-bullets text-zinc-500"></i>
              <h3 class="text-sm font-semibold">Najnowsze leady</h3>
            </div>
            <a href="/zwolnie/leads" class="ds-btn ds-btn--ghost ds-btn--sm">Wszystkie <i class="ph ph-arrow-right"></i></a>
          </div>
          <div class="p-2 max-h-[420px] overflow-y-auto" id="recent-leads"></div>
        </div>

        <div class="section-card col-span-5 overflow-hidden">
          <div class="px-5 py-4 border-b border-white/[0.06] flex items-center justify-between">
            <div class="flex items-center gap-2">
              <i class="ph ph-flame" style="color:var(--ds-amber)"></i>
              <h3 class="text-sm font-semibold">Wymagają akcji</h3>
            </div>
            <a href="/zwolnie/pipeline" class="ds-btn ds-btn--ghost ds-btn--sm">Pipeline <i class="ph ph-arrow-right"></i></a>
          </div>
          <div class="p-2 max-h-[420px] overflow-y-auto" id="action-needed"></div>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="/zwolnie/_assets/config.js"></script>
<script src="/zwolnie/_assets/auth.js"></script>
<script src="/zwolnie/_assets/utils.js"></script>
<script src="/zwolnie/_assets/sidebar.js"></script>
<script>
(async () => {
  const { staff } = await ZE_Auth.require();
  ZE_Sidebar.render({ active: 'dashboard', userEmail: staff.email });

  const weekAgo = new Date(Date.now() - 7*24*60*60*1000).toISOString();
  const monthAgo = new Date(Date.now() - 30*24*60*60*1000).toISOString();

  const [totalRes, weekRes, monthRes, todoRes, projectsRes, wonRes, recentRes, actionRes] = await Promise.all([
    ZE_SB.from('ze_leads').select('id', { count: 'exact', head: true }),
    ZE_SB.from('ze_leads').select('id', { count: 'exact', head: true }).gte('created_at', weekAgo),
    ZE_SB.from('ze_leads').select('id', { count: 'exact', head: true }).gte('created_at', monthAgo),
    ZE_SB.from('ze_leads').select('id', { count: 'exact', head: true }).in('status', ['new', 'analyzing']),
    ZE_SB.from('ze_projects').select('id', { count: 'exact', head: true }).in('status', ['planning', 'building']),
    ZE_SB.from('ze_leads').select('id', { count: 'exact', head: true }).eq('status', 'won'),
    ZE_SB.from('ze_leads').select('id, contact_name, company, status, created_at').order('created_at', { ascending: false }).limit(7),
    ZE_SB.from('ze_leads').select('id, contact_name, company, status, created_at, status_changed_at').in('status', ['new', 'analyzing']).order('status_changed_at', { ascending: true }).limit(7)
  ]);

  document.getElementById('m-total').textContent = totalRes.count ?? '0';
  document.getElementById('m-todo').textContent = todoRes.count ?? '0';
  document.getElementById('m-projects').textContent = projectsRes.count ?? '0';
  document.getElementById('m-won').textContent = wonRes.count ?? '0';
  document.getElementById('ms-week').textContent = weekRes.count ?? '0';
  document.getElementById('ms-month').textContent = monthRes.count ?? '0';
  document.getElementById('ms-total').textContent = totalRes.count ?? '0';
  ZE_Sidebar.setBadge('leads', totalRes.count ?? 0);

  const renderRow = (l) => `
    <a href="/zwolnie/lead?id=${l.id}" class="flex items-center gap-3 px-3 py-2.5 rounded-lg hover:bg-white/[0.03] transition-colors">
      ${ZE.avatarHtml(l.contact_name || l.company || '?', 28)}
      <div class="flex-1 min-w-0">
        <div class="ds-truncate" style="font-size:13px;font-weight:500;color:var(--ds-fg-1)">${ZE.escapeHtml(l.contact_name || '(brak)')}</div>
        <div class="ds-truncate" style="font-size:11px;color:var(--ds-fg-5)">${ZE.escapeHtml(l.company || '—')} · ${ZE.fmtRelative(l.created_at)}</div>
      </div>
      <span class="ds-badge ds-badge--${l.status}">${ZE.STATUS_LABELS[l.status]}</span>
    </a>
  `;

  document.getElementById('recent-leads').innerHTML = (recentRes.data || []).length
    ? recentRes.data.map(renderRow).join('')
    : `<div class="ds-empty"><div class="ds-empty__icon"><i class="ph ph-inbox"></i></div><div class="ds-empty__title">Pusto</div><div class="ds-empty__desc">Pierwszy lead wpadnie z formularza zwolnie.tomekniedzwiecki.pl</div></div>`;

  document.getElementById('action-needed').innerHTML = (actionRes.data || []).length
    ? actionRes.data.map(renderRow).join('')
    : `<div class="ds-empty"><div class="ds-empty__icon"><i class="ph ph-check-circle"></i></div><div class="ds-empty__title">Wszystko ogarnięte</div><div class="ds-empty__desc">Brak leadów do analizy.</div></div>`;
})();
</script>
</body>
</html>
