<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zwolnię · Pipeline</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/zwolnie/_assets/ds.css">
</head>
<body>

<div class="ds-app">
  <aside id="ze-sidebar" class="ds-sidebar"></aside>

  <main class="ds-main">
    <header class="ds-header">
      <div class="ds-header__left">
        <div class="ds-breadcrumb">
          <a href="/zwolnie/">Zwolnię</a>
          <span class="ds-sep">/</span>
          <span class="ds-current">Pipeline</span>
        </div>
      </div>
      <div class="ds-header__center">
        <button onclick="ZE_Sidebar.openPalette()" class="ds-cmd">
          <i class="ph ph-magnifying-glass"></i>
          <span>Szukaj lub idź do...</span>
          <span class="ds-cmd__hint"><span class="ds-kbd">⌘</span><span class="ds-kbd">K</span></span>
        </button>
      </div>
      <div class="ds-header__right">
        <label class="ds-flex ds-items-center ds-gap-2" style="font-size: 12px; color: var(--ds-fg-3);">
          <input type="checkbox" id="show-terminal"> Won/lost
        </label>
        <button id="open-batch-btn" class="ds-btn ds-btn--secondary ds-btn--sm"><i class="ph ph-tabs"></i> Otwórz N</button>
        <button id="refresh-btn" class="ds-btn ds-btn--ghost ds-btn--sm"><i class="ph ph-arrows-clockwise" id="refresh-icon"></i></button>
      </div>
    </header>

    <div class="ds-content ds-content--full ds-fade-in">
      <div class="ds-page-header">
        <div class="ds-page-header__top">
          <div>
            <h1 class="ds-page-header__title">Pipeline</h1>
            <p class="ds-page-header__sub">Przeciągaj między etapami. Czerwone „d" = czas w obecnym statusie.</p>
          </div>
          <div class="ds-page-header__actions">
            <div class="ds-input-group" style="width: 280px;">
              <i class="ph ph-magnifying-glass ds-input-group__icon"></i>
              <input id="p-search" type="text" class="ds-input" placeholder="Szukaj leada...">
            </div>
            <select id="p-sort" class="ds-select" style="width: 240px;">
              <option value="status-time-desc">Najpilniejsze</option>
              <option value="created-desc">Najnowsze</option>
              <option value="created-asc">Najstarsze</option>
            </select>
            <button id="p-clear" class="ds-btn ds-btn--ghost ds-btn--sm ds-hidden">Wyczyść</button>
          </div>
        </div>
      </div>

      <div id="kanban-board" class="ds-kanban"></div>
    </div>
  </main>
</div>

<!-- Batch modal -->
<div id="batch-modal" class="ds-modal-backdrop ds-hidden">
  <div class="ds-modal" style="max-width: 380px;">
    <div class="ds-modal__header">
      <div>
        <h3 class="ds-h3">Otwórz w nowych kartach</h3>
        <p class="ds-small ds-mt-2">Z bieżącego widoku, top N wg sortowania.</p>
      </div>
      <button onclick="document.getElementById('batch-modal').classList.add('ds-hidden')" class="ds-btn ds-btn--ghost ds-btn--sm"><i class="ph ph-x"></i></button>
    </div>
    <div class="ds-modal__body">
      <div class="ds-grid ds-grid-3 ds-gap-2">
        <button data-n="5" class="ze-batch-n ds-btn ds-btn--secondary">5</button>
        <button data-n="10" class="ze-batch-n ds-btn ds-btn--secondary">10</button>
        <button data-n="20" class="ze-batch-n ds-btn ds-btn--secondary">20</button>
        <button data-n="30" class="ze-batch-n ds-btn ds-btn--secondary">30</button>
        <button data-n="50" class="ze-batch-n ds-btn ds-btn--secondary">50</button>
        <button data-n="all" class="ze-batch-n ds-btn ds-btn--secondary">wsz.</button>
      </div>
    </div>
  </div>
</div>

<script src="/zwolnie/_assets/config.js"></script>
<script src="/zwolnie/_assets/auth.js"></script>
<script src="/zwolnie/_assets/utils.js"></script>
<script src="/zwolnie/_assets/sidebar.js"></script>
<script>
const COLS_MAIN = ['new', 'analyzing', 'analyzed', 'proposal_sent', 'negotiation'];
const COLS_TERMINAL = ['won', 'lost'];
let allLeads = [];
let filters = { search: '', sort: 'status-time-desc' };

(async () => {
  const { staff } = await ZE_Auth.require();
  ZE_Sidebar.render({ active: 'pipeline', userEmail: staff.email });

  document.getElementById('show-terminal').addEventListener('change', renderBoard);
  document.getElementById('refresh-btn').addEventListener('click', async () => {
    document.getElementById('refresh-icon').classList.add('ds-spin');
    await loadLeads();
    setTimeout(() => document.getElementById('refresh-icon').classList.remove('ds-spin'), 600);
  });
  document.getElementById('p-search').addEventListener('input', (e) => {
    filters.search = e.target.value.trim().toLowerCase();
    document.getElementById('p-clear').classList.toggle('ds-hidden', !filters.search);
    renderBoard();
  });
  document.getElementById('p-sort').addEventListener('change', (e) => { filters.sort = e.target.value; renderBoard(); });
  document.getElementById('p-clear').addEventListener('click', () => {
    document.getElementById('p-search').value = ''; filters.search = '';
    document.getElementById('p-clear').classList.add('ds-hidden'); renderBoard();
  });
  document.getElementById('open-batch-btn').addEventListener('click', () => document.getElementById('batch-modal').classList.remove('ds-hidden'));
  document.querySelectorAll('.ze-batch-n').forEach(btn => {
    btn.addEventListener('click', () => {
      const filtered = getFilteredAndSorted();
      const n = btn.dataset.n === 'all' ? filtered.length : parseInt(btn.dataset.n, 10);
      const slice = filtered.slice(0, n);
      slice.forEach(l => window.open('/zwolnie/lead?id=' + l.id, '_blank', 'noopener'));
      document.getElementById('batch-modal').classList.add('ds-hidden');
      ZE.toast(`Otwarto ${slice.length} leadów.`, 'success');
    });
  });

  await loadLeads();
})();

async function loadLeads() {
  const { data, error } = await ZE_SB.from('ze_leads')
    .select('id, status, contact_name, contact_email, company, industry, budget, created_at, status_changed_at, starred, ai_analysis, mvp_html')
    .neq('status', 'archived').order('updated_at', { ascending: false }).range(0, 999);
  if (error) { ZE.toast(error.message, 'error'); return; }
  allLeads = data || [];
  ZE_Sidebar.setBadge('leads', allLeads.length);
  renderBoard();
}

function getFilteredAndSorted() {
  const q = filters.search;
  let list = allLeads.filter(l => {
    if (!q) return true;
    const hay = [l.contact_name, l.contact_email, l.company, l.industry].filter(Boolean).join(' ').toLowerCase();
    return hay.includes(q);
  });
  if (filters.sort === 'status-time-desc') list.sort((a, b) => new Date(a.status_changed_at || a.created_at) - new Date(b.status_changed_at || b.created_at));
  else if (filters.sort === 'created-desc') list.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
  else if (filters.sort === 'created-asc') list.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  return list;
}

function renderBoard() {
  const showTerminal = document.getElementById('show-terminal').checked;
  const cols = showTerminal ? [...COLS_MAIN, ...COLS_TERMINAL] : COLS_MAIN;
  const filtered = getFilteredAndSorted();
  const board = document.getElementById('kanban-board');
  board.innerHTML = cols.map(col => {
    const list = filtered.filter(l => l.status === col);
    return `
      <div class="ds-kanban__col">
        <div class="ds-kanban__col-head">
          <span class="ds-badge ds-badge--${col}">${ZE.STATUS_LABELS[col]}</span>
          <span class="ds-xs ds-num">${list.length}</span>
        </div>
        <div class="ds-kanban__body" data-status="${col}"
             ondragover="event.preventDefault(); this.classList.add('is-over');"
             ondragleave="this.classList.remove('is-over');"
             ondrop="handleDrop(event)">
          ${list.map(renderCard).join('') || '<div class="ds-empty" style="padding: 20px;"><div class="ds-empty__desc">Pusto</div></div>'}
        </div>
      </div>
    `;
  }).join('');
}

function renderCard(l) {
  const days = ZE.daysInStatus(l.status_changed_at);
  const urgent = days != null && days >= 7;
  const urgencyBadge = ZE.urgencyBadge(l.status_changed_at, l.status);
  return `
    <div class="ds-kanban__card ${urgent ? 'is-urgent' : ''}"
         draggable="true" data-id="${l.id}"
         ondragstart="event.dataTransfer.setData('text', '${l.id}'); this.classList.add('is-dragging');"
         ondragend="this.classList.remove('is-dragging');"
         onclick="location.href='/zwolnie/lead?id=${l.id}'"
         onauxclick="if(event.button === 1){ event.preventDefault(); window.open('/zwolnie/lead?id=${l.id}', '_blank', 'noopener'); }">
      <div class="ds-flex ds-items-start ds-gap-3 ds-mb-3">
        ${ZE.avatarHtml(l.contact_name || l.contact_email || '?', 32)}
        <div style="flex: 1; min-width: 0;">
          <div class="ds-fg-1 ds-truncate" style="font-weight: 500; font-size: 13px;">${ZE.escapeHtml(l.contact_name || '(brak)')}</div>
          <div class="ds-xs ds-truncate">${ZE.escapeHtml(l.company || '—')}</div>
        </div>
        ${l.starred ? '<i class="ph-fill ph-star" style="color: var(--ds-amber); font-size: 14px;"></i>' : ''}
      </div>
      <div class="ds-flex ds-items-center ds-gap-2" style="flex-wrap: wrap; font-size: 11px;">
        ${urgencyBadge}
        ${l.industry ? `<span class="ds-badge ds-badge--no-dot">${ZE.escapeHtml(ZE.INDUSTRY_LABELS[l.industry] || l.industry)}</span>` : ''}
        ${l.budget ? `<span class="ds-badge ds-badge--no-dot">${ZE.escapeHtml(ZE.BUDGET_LABELS[l.budget] || l.budget)}</span>` : ''}
      </div>
      <div class="ds-flex ds-items-center ds-justify-between ds-mt-3" style="font-size: 11px; color: var(--ds-fg-5);">
        <span>${ZE.fmtRelative(l.created_at)}</span>
        <div class="ds-flex ds-gap-2">
          ${l.ai_analysis ? '<i class="ph-fill ph-sparkle" style="color: var(--ds-magic)" title="Analiza"></i>' : ''}
          ${l.mvp_html ? '<i class="ph-fill ph-cursor-click" style="color: var(--ds-emerald)" title="MVP"></i>' : ''}
        </div>
      </div>
    </div>
  `;
}

async function handleDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('is-over');
  const leadId = e.dataTransfer.getData('text');
  const newStatus = e.currentTarget.dataset.status;
  const lead = allLeads.find(l => l.id === leadId);
  if (!lead || lead.status === newStatus) return;
  const oldStatus = lead.status;

  if (newStatus === 'won' || newStatus === 'proposal_sent') {
    const { data: full } = await ZE_SB.from('ze_leads').select('ai_analysis, mvp_html').eq('id', leadId).single();
    const missing = [];
    if (!full?.ai_analysis) missing.push('analizy');
    if (!full?.mvp_html) missing.push('MVP');
    if (missing.length) {
      const ok = await ZE.confirm(`Lead nie ma jeszcze ${missing.join(' ani ')}. Przesunąć na „${ZE.STATUS_LABELS[newStatus]}"?`, { danger: false, okLabel: 'Przesuń' });
      if (!ok) return;
    }
  }

  lead.status = newStatus; renderBoard();
  const { error } = await ZE_SB.from('ze_leads').update({ status: newStatus }).eq('id', leadId);
  if (error) { ZE.toast(error.message, 'error'); lead.status = oldStatus; renderBoard(); return; }
  await ZE.logActivity(leadId, 'status_changed', { from: oldStatus, to: newStatus });
}
</script>
</body>
</html>
