<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zwolnię · Pipeline</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<link rel="stylesheet" href="/zwolnie/_assets/common.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { font-family: 'Inter', sans-serif; }
  .kanban-col { min-width: 280px; max-width: 320px; }
  .kanban-card { transition: transform .15s, box-shadow .15s; cursor: grab; }
  .kanban-card:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
  .kanban-card.is-dragging { opacity: .4; cursor: grabbing; }
  .kanban-body.is-over { background: rgba(16, 185, 129, 0.05); border-color: rgba(16, 185, 129, 0.3); }
</style>
</head>
<body class="min-h-screen flex">

<aside id="ze-sidebar" class="w-[260px] bg-zinc-950 border-r border-white/5 flex-shrink-0"></aside>

<main class="flex-1 flex flex-col min-w-0">
  <header class="h-16 glass-header flex items-center justify-between px-6 sticky top-0 z-30">
    <div class="flex items-center gap-2 text-sm">
      <span class="text-zinc-500">Zwolnię</span>
      <span class="text-zinc-700">/</span>
      <span class="text-white font-medium">Pipeline</span>
    </div>
    <div class="flex items-center gap-2">
      <label class="flex items-center gap-2 text-xs text-zinc-400">
        <input type="checkbox" id="show-terminal" class="rounded bg-zinc-800 border-zinc-700">
        Pokaż wygrane/przegrane
      </label>
      <button id="refresh-btn" class="text-zinc-400 hover:text-white border border-zinc-800 hover:border-zinc-700 px-2.5 py-2 rounded-lg text-xs font-medium transition-all flex items-center gap-1.5">
        <i class="ph ph-arrows-clockwise text-base" id="refresh-icon"></i>
      </button>
    </div>
  </header>

  <div class="flex-1 overflow-y-auto p-6 ze-fade">
    <div class="mb-5 px-2">
      <h1 class="text-2xl font-semibold text-white">Pipeline</h1>
      <p class="text-zinc-500 text-sm">Przeciągaj leady między etapami. Status zmienia się automatycznie.</p>
    </div>

    <div id="kanban-board" class="flex gap-4 overflow-x-auto pb-6"></div>
  </div>
</main>

<script src="/zwolnie/_assets/config.js"></script>
<script src="/zwolnie/_assets/auth.js"></script>
<script src="/zwolnie/_assets/utils.js"></script>
<script src="/zwolnie/_assets/sidebar.js"></script>
<script>
const COLS_MAIN = ['new', 'analyzing', 'analyzed', 'proposal_sent', 'negotiation'];
const COLS_TERMINAL = ['won', 'lost'];
let allLeads = [];

(async () => {
  const { staff } = await ZE_Auth.require();
  ZE_Sidebar.render({ active: 'pipeline', userEmail: staff.email });

  document.getElementById('show-terminal').addEventListener('change', renderBoard);
  document.getElementById('refresh-btn').addEventListener('click', async () => {
    document.getElementById('refresh-icon').classList.add('ze-spin');
    await loadLeads();
    setTimeout(() => document.getElementById('refresh-icon').classList.remove('ze-spin'), 600);
  });

  await loadLeads();
})();

async function loadLeads() {
  const { data, error } = await ZE_SB
    .from('ze_leads')
    .select('id, status, contact_name, company, industry, budget, created_at, starred')
    .neq('status', 'archived')
    .order('updated_at', { ascending: false })
    .range(0, 999);
  if (error) { ZE.toast(error.message, 'error'); return; }
  allLeads = data || [];
  ZE_Sidebar.setBadge('leads', allLeads.length);
  renderBoard();
}

function renderBoard() {
  const showTerminal = document.getElementById('show-terminal').checked;
  const cols = showTerminal ? [...COLS_MAIN, ...COLS_TERMINAL] : COLS_MAIN;
  const board = document.getElementById('kanban-board');
  board.innerHTML = cols.map(col => {
    const list = allLeads.filter(l => l.status === col);
    return `
      <div class="kanban-col flex-shrink-0 flex flex-col">
        <div class="px-3 py-2 mb-2 flex items-center justify-between">
          ${ZE.statusBadge(col)}
          <span class="text-xs text-zinc-500">${list.length}</span>
        </div>
        <div class="kanban-body flex-1 bg-zinc-900/30 border border-white/5 rounded-xl p-2 space-y-2 min-h-[200px]"
             data-status="${col}"
             ondragover="event.preventDefault(); this.classList.add('is-over');"
             ondragleave="this.classList.remove('is-over');"
             ondrop="handleDrop(event)">
          ${list.map(renderCard).join('') || '<div class="text-xs text-zinc-600 text-center py-6">Pusto</div>'}
        </div>
      </div>
    `;
  }).join('');
}

function renderCard(l) {
  return `
    <div class="kanban-card bg-zinc-900 border border-white/5 rounded-lg p-3"
         draggable="true" data-id="${l.id}"
         ondragstart="event.dataTransfer.setData('text', '${l.id}'); this.classList.add('is-dragging');"
         ondragend="this.classList.remove('is-dragging');"
         onclick="location.href='/zwolnie/lead?id=${l.id}'">
      <div class="flex items-start justify-between gap-2">
        <div class="text-sm text-white font-medium truncate flex-1">${ZE.escapeHtml(l.contact_name || '(brak)')}</div>
        ${l.starred ? '<i class="ph ph-fill ph-star text-amber-400 text-xs"></i>' : ''}
      </div>
      <div class="text-xs text-zinc-500 truncate mt-0.5">${ZE.escapeHtml(l.company || '—')}</div>
      <div class="mt-2 flex items-center gap-2 text-[10px] text-zinc-500">
        ${l.industry ? `<span class="px-1.5 py-0.5 bg-zinc-800 rounded">${ZE.escapeHtml(ZE.INDUSTRY_LABELS[l.industry] || l.industry)}</span>` : ''}
        ${l.budget ? `<span class="px-1.5 py-0.5 bg-zinc-800 rounded">${ZE.escapeHtml(ZE.BUDGET_LABELS[l.budget] || l.budget)}</span>` : ''}
      </div>
      <div class="mt-2 text-[10px] text-zinc-600">${ZE.fmtRelative(l.created_at)}</div>
    </div>
  `;
}

async function handleDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove('is-over');
  const leadId = e.dataTransfer.getData('text');
  const newStatus = e.currentTarget.dataset.status;
  const lead = allLeads.find(l => l.id === leadId);
  if (!lead || lead.status === newStatus) return;
  const oldStatus = lead.status;
  lead.status = newStatus;
  renderBoard();
  const { error } = await ZE_SB.from('ze_leads').update({ status: newStatus }).eq('id', leadId);
  if (error) {
    ZE.toast(error.message, 'error');
    lead.status = oldStatus;
    renderBoard();
    return;
  }
  await ZE.logActivity(leadId, 'status_changed', { from: oldStatus, to: newStatus });
}
</script>
</body>
</html>
