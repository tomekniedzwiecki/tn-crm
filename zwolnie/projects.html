<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zwolnię · Projekty</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<link rel="stylesheet" href="/zwolnie/_assets/common.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>html, body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen flex">

<aside id="ze-sidebar" class="w-[260px] bg-zinc-950 border-r border-white/5 flex-shrink-0"></aside>

<main class="flex-1 flex flex-col min-w-0">
  <header class="h-16 glass-header flex items-center justify-between px-6 sticky top-0 z-30">
    <div class="flex items-center gap-2 text-sm">
      <span class="text-zinc-500">Zwolnię</span>
      <span class="text-zinc-700">/</span>
      <span class="text-white font-medium">Projekty</span>
    </div>
  </header>

  <div class="flex-1 overflow-y-auto p-6 lg:p-8 ze-fade">
    <div class="max-w-7xl mx-auto">
      <div class="mb-6">
        <h1 class="text-2xl font-semibold text-white">Projekty</h1>
        <p class="text-zinc-500 text-sm">Konwertowane leady. Każdy ma swój widok dla klienta.</p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="projects-grid">
        <div class="text-sm text-zinc-500 col-span-full text-center py-10">Ładowanie...</div>
      </div>
    </div>
  </div>
</main>

<script src="/zwolnie/_assets/config.js"></script>
<script src="/zwolnie/_assets/auth.js"></script>
<script src="/zwolnie/_assets/utils.js"></script>
<script src="/zwolnie/_assets/sidebar.js"></script>
<script>
const STATUS_LABELS = { planning: 'Planowanie', building: 'Budowa', delivered: 'Dostarczony', on_hold: 'Wstrzymany', closed: 'Zamknięty' };
const STATUS_COLORS = {
  planning: 'bg-blue-500/10 border-blue-500/30 text-blue-300',
  building: 'bg-amber-500/10 border-amber-500/30 text-amber-300',
  delivered: 'bg-emerald-500/10 border-emerald-500/30 text-emerald-300',
  on_hold: 'bg-zinc-500/10 border-zinc-500/30 text-zinc-300',
  closed: 'bg-zinc-500/10 border-zinc-500/30 text-zinc-400'
};

(async () => {
  const { staff } = await ZE_Auth.require();
  ZE_Sidebar.render({ active: 'projects', userEmail: staff.email });

  const { data, error } = await ZE_SB
    .from('ze_projects')
    .select('id, token, title, description, status, kickoff_at, delivery_at, created_at, ze_leads:lead_id(contact_name, contact_email, company), ze_project_stages(id, status)')
    .order('created_at', { ascending: false });

  if (error) { ZE.toast(error.message, 'error'); return; }
  renderProjects(data || []);
})();

function renderProjects(list) {
  const el = document.getElementById('projects-grid');
  if (!list.length) {
    el.innerHTML = '<div class="text-sm text-zinc-500 col-span-full text-center py-10">Brak projektów. Konwertuj WON lead na projekt z detail-view.</div>';
    return;
  }
  el.innerHTML = list.map(p => {
    const stages = p.ze_project_stages || [];
    const total = stages.length;
    const done = stages.filter(s => s.status === 'completed').length;
    const progress = total ? Math.round(done / total * 100) : 0;
    return `
      <a href="/zwolnie/projekt?id=${p.id}" class="bg-zinc-900/40 border border-white/5 rounded-xl p-5 hover:border-white/15 transition-colors block">
        <div class="flex items-start justify-between gap-2 mb-3">
          <div class="min-w-0">
            <div class="text-white font-semibold truncate">${ZE.escapeHtml(p.title)}</div>
            <div class="text-xs text-zinc-500 truncate">${ZE.escapeHtml(p.ze_leads?.contact_name || p.ze_leads?.contact_email || '—')}</div>
          </div>
          <span class="inline-block text-[10px] uppercase tracking-wider font-semibold px-2 py-1 rounded-md border ${STATUS_COLORS[p.status]}">${STATUS_LABELS[p.status]}</span>
        </div>
        ${p.description ? `<div class="text-xs text-zinc-400 line-clamp-2 mb-3">${ZE.escapeHtml(p.description)}</div>` : ''}
        <div class="mb-1 flex items-center justify-between text-[10px] text-zinc-500">
          <span>Postęp etapów</span>
          <span>${done}/${total} (${progress}%)</span>
        </div>
        <div class="h-1.5 bg-white/5 rounded-full overflow-hidden">
          <div class="h-full bg-gradient-to-r from-emerald-500 to-emerald-400" style="width: ${progress}%"></div>
        </div>
        <div class="mt-3 flex items-center justify-between text-[10px] text-zinc-500">
          <span><i class="ph ph-calendar"></i> ${ZE.fmtRelative(p.created_at)}</span>
          <span class="text-zinc-600">${p.token}</span>
        </div>
      </a>
    `;
  }).join('');
}
</script>
</body>
</html>
