<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zwolnię · Projekty</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/zwolnie/_assets/ds.css">
</head>
<body>

<div class="ds-app">
  <aside id="ze-sidebar" class="ds-sidebar"></aside>
  <main class="ds-main">
    <header class="ds-header">
      <div class="ds-header__left">
        <div class="ds-breadcrumb">
          <a href="/zwolnie/">Zwolnię</a>
          <span class="ds-sep">/</span>
          <span class="ds-current">Projekty</span>
        </div>
      </div>
      <div class="ds-header__center">
        <button onclick="ZE_Sidebar.openPalette()" class="ds-cmd">
          <i class="ph ph-magnifying-glass"></i>
          <span>Szukaj lub idź do...</span>
          <span class="ds-cmd__hint"><span class="ds-kbd">⌘</span><span class="ds-kbd">K</span></span>
        </button>
      </div>
      <div class="ds-header__right"></div>
    </header>

    <div class="ds-content ds-fade-in">
      <div class="ds-page-header">
        <div class="ds-page-header__top">
          <div>
            <h1 class="ds-page-header__title">Projekty</h1>
            <p class="ds-page-header__sub">Konwertowane leady. Każdy ma prywatny link dla klienta.</p>
          </div>
        </div>
      </div>
      <div class="ds-grid ds-grid-3 ds-gap-4" id="projects-grid">
        <div class="ds-empty" style="grid-column: 1 / -1;">Ładowanie...</div>
      </div>
    </div>
  </main>
</div>

<script src="/zwolnie/_assets/config.js"></script>
<script src="/zwolnie/_assets/auth.js"></script>
<script src="/zwolnie/_assets/utils.js"></script>
<script src="/zwolnie/_assets/sidebar.js"></script>
<script>
const STATUS_LABELS = { planning: 'Planowanie', building: 'Budowa', delivered: 'Dostarczony', on_hold: 'Wstrzymany', closed: 'Zamknięty' };
const STATUS_COLORS = {
  planning:  { bg: 'rgba(0,112,243,0.08)', border: 'rgba(0,112,243,0.3)', fg: '#93C5FD' },
  building:  { bg: 'rgba(245,166,35,0.08)', border: 'rgba(245,166,35,0.3)', fg: '#FCD34D' },
  delivered: { bg: 'rgba(0,200,150,0.1)', border: 'rgba(0,200,150,0.35)', fg: '#6EE7B7' },
  on_hold:   { bg: 'rgba(163,163,163,0.08)', border: 'rgba(163,163,163,0.25)', fg: '#A3A3A3' },
  closed:    { bg: 'rgba(163,163,163,0.08)', border: 'rgba(163,163,163,0.25)', fg: '#A3A3A3' }
};

(async () => {
  const { staff } = await ZE_Auth.require();
  ZE_Sidebar.render({ active: 'projects', userEmail: staff.email });

  const { data, error } = await ZE_SB.from('ze_projects')
    .select('id, token, title, description, status, kickoff_at, delivery_at, created_at, ze_leads:lead_id(contact_name, contact_email, company), ze_project_stages(id, status)')
    .order('created_at', { ascending: false });
  if (error) return ZE.toast(error.message, 'error');
  renderProjects(data || []);
})();

function renderProjects(list) {
  const el = document.getElementById('projects-grid');
  if (!list.length) {
    el.innerHTML = `<div class="ds-empty" style="grid-column: 1 / -1;"><div class="ds-empty__icon"><i class="ph ph-folder-open"></i></div><div class="ds-empty__title">Brak projektów</div><div class="ds-empty__desc">Konwertuj WON lead na projekt z widoku lead detail.</div></div>`;
    return;
  }
  el.innerHTML = list.map(p => {
    const stages = p.ze_project_stages || [];
    const total = stages.length, done = stages.filter(s => s.status === 'completed').length;
    const progress = total ? Math.round(done / total * 100) : 0;
    const c = STATUS_COLORS[p.status] || STATUS_COLORS.planning;
    return `
      <a href="/zwolnie/projekt?id=${p.id}" class="ds-card" style="padding: 20px;">
        <div class="ds-flex ds-items-start ds-justify-between ds-gap-3 ds-mb-3">
          <div style="min-width: 0;">
            <div class="ds-h4 ds-truncate">${ZE.escapeHtml(p.title)}</div>
            <div class="ds-xs ds-mt-2 ds-truncate">${ZE.escapeHtml(p.ze_leads?.contact_name || p.ze_leads?.contact_email || '—')}</div>
          </div>
          <span style="background: ${c.bg}; border: 1px solid ${c.border}; color: ${c.fg}; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 500; white-space: nowrap;">${STATUS_LABELS[p.status]}</span>
        </div>
        ${p.description ? `<div class="ds-small ds-mt-3" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${ZE.escapeHtml(p.description)}</div>` : ''}
        <div class="ds-mt-4">
          <div class="ds-flex ds-justify-between ds-mb-2"><span class="ds-xs">Postęp</span><span class="ds-xs ds-num ds-fg-2">${done}/${total} (${progress}%)</span></div>
          <div style="height: 4px; background: var(--ds-surface-3); border-radius: 999px; overflow: hidden;">
            <div style="height: 100%; width: ${progress}%; background: linear-gradient(90deg, var(--ds-emerald) 0%, #6EE7B7 100%);"></div>
          </div>
        </div>
        <div class="ds-flex ds-items-center ds-justify-between ds-mt-4">
          <span class="ds-xs"><i class="ph ph-calendar"></i> ${ZE.fmtRelative(p.created_at)}</span>
          <span class="ds-mono" style="font-size: 10px; color: var(--ds-fg-5);">${p.token}</span>
        </div>
      </a>
    `;
  }).join('');
}
</script>
</body>
</html>
