<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zwolnię · Leady</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1/dist/fonts.css">
<link rel="stylesheet" href="/zwolnie/_assets/ds.css">
<style>
  .filter-bar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 12px 16px; background: var(--ds-surface-1); border: 1px solid var(--ds-border); border-radius: var(--ds-r-md); }
  .quick-chip { padding: 4px 10px; border-radius: 999px; border: 1px solid var(--ds-border); font-size: 12px; color: var(--ds-fg-3); transition: all var(--ds-d-fast) var(--ds-ease); background: transparent; }
  .quick-chip:hover { color: var(--ds-fg-1); border-color: var(--ds-border-hover); }
  .quick-chip.is-active { background: var(--ds-fg-1); color: var(--ds-bg); border-color: var(--ds-fg-1); }
  .row-actions { opacity: 0; transition: opacity var(--ds-d-fast) var(--ds-ease); }
  tr:hover .row-actions { opacity: 1; }
  .bulk-bar { position: sticky; top: var(--ds-header-h); z-index: 20; padding: 10px 16px; background: var(--ds-magic-gradient); color: white; border-radius: var(--ds-r-md); display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; box-shadow: var(--ds-shadow-3); }
</style>
</head>
<body>

<div class="ds-app">
  <aside id="ze-sidebar" class="ds-sidebar"></aside>

  <main class="ds-main">
    <header class="ds-header">
      <div class="ds-breadcrumb">
        <a href="/zwolnie/">Zwolnię</a>
        <span class="ds-sep">/</span>
        <span class="ds-current">Leady</span>
      </div>
      <div class="ds-flex ds-items-center ds-gap-2">
        <button id="export-btn" class="ds-btn ds-btn--ghost ds-btn--sm"><i class="ph ph-download-simple"></i> Export</button>
        <button id="refresh-btn" class="ds-btn ds-btn--ghost ds-btn--sm"><i class="ph ph-arrows-clockwise" id="refresh-icon"></i></button>
        <button id="add-lead-btn" class="ds-btn ds-btn--primary ds-btn--sm"><i class="ph ph-plus"></i> Dodaj lead</button>
      </div>
    </header>

    <div class="ds-content ds-fade-in">
      <div class="ds-flex ds-items-start ds-justify-between ds-mb-6">
        <div>
          <h1 class="ds-h1">Leady</h1>
          <p class="ds-small ds-mt-2">Wszystkie zgłoszenia z formularza i dodane ręcznie.</p>
        </div>
        <div style="text-align: right;">
          <div class="ds-h1 ds-num" id="lead-count" style="font-size: 28px;">—</div>
          <div class="ds-xs" id="lead-count-filtered"></div>
        </div>
      </div>

      <!-- Filter bar -->
      <div class="filter-bar ds-mb-3">
        <div class="ds-input-group" style="flex: 1; min-width: 200px;">
          <i class="ph ph-magnifying-glass ds-input-group__icon"></i>
          <input id="f-search" type="text" class="ds-input" placeholder="Szukaj po imieniu, firmie, mailu...">
        </div>
        <select id="f-status" class="ds-select" style="width: 160px;">
          <option value="">Wszystkie statusy</option>
        </select>
        <select id="f-industry" class="ds-select" style="width: 160px;">
          <option value="">Każda branża</option>
        </select>
        <select id="f-budget" class="ds-select" style="width: 140px;">
          <option value="">Każdy budżet</option>
        </select>
        <select id="f-date" class="ds-select" style="width: 130px;">
          <option value="">Dowolna data</option>
          <option value="today">Dziś</option>
          <option value="week">Ostatni tydzień</option>
          <option value="month">Ostatni miesiąc</option>
        </select>
        <select id="f-sort" class="ds-select" style="width: 160px;">
          <option value="created_at-desc">Najnowsze</option>
          <option value="created_at-asc">Najstarsze</option>
          <option value="updated_at-desc">Ostatnio zmienione</option>
          <option value="contact_name-asc">Imię A-Z</option>
        </select>
      </div>

      <!-- Quick chips -->
      <div class="ds-flex ds-items-center ds-gap-2 ds-mb-4" style="flex-wrap: wrap;">
        <span class="ds-xs ds-fg-4" style="margin-right: 4px;">Szybkie:</span>
        <button data-quick="todo" class="quick-chip">Czeka na analizę</button>
        <button data-quick="no-mvp" class="quick-chip">Bez MVP</button>
        <button data-quick="needs-action" class="quick-chip">Wymaga akcji</button>
        <button data-quick="stale" class="quick-chip">Pilne (5+ dni)</button>
        <button data-quick="starred" class="quick-chip">⭐ Gwiazdki</button>
        <button data-quick="clear" class="quick-chip">Wyczyść</button>
      </div>

      <!-- Bulk bar -->
      <div id="bulk-bar" class="bulk-bar ds-hidden">
        <span style="font-weight: 500; font-size: 13px;"><span id="bulk-count">0</span> wybranych</span>
        <div class="ds-flex ds-gap-2">
          <button id="bulk-archive" class="ds-btn ds-btn--ghost ds-btn--sm" style="color: white; border-color: rgba(255,255,255,0.3);">Archiwizuj</button>
          <button id="bulk-delete" class="ds-btn ds-btn--sm" style="background: rgba(0,0,0,0.3); color: white; border: 1px solid rgba(255,255,255,0.3);">Usuń</button>
        </div>
      </div>

      <!-- Table -->
      <div class="ds-table--card">
        <table class="ds-table">
          <thead>
            <tr>
              <th style="width: 36px;"><input type="checkbox" id="check-all"></th>
              <th>Kontakt</th>
              <th>Firma</th>
              <th class="ds-truncate">Branża</th>
              <th>Zespół</th>
              <th>Budżet</th>
              <th>Status</th>
              <th>Postęp</th>
              <th>Dodany</th>
              <th style="width: 32px;"></th>
            </tr>
          </thead>
          <tbody id="leads-tbody">
            <tr><td colspan="10" class="ds-table-empty">Ładowanie...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<!-- Add Lead Modal -->
<div id="add-modal" class="ds-modal-backdrop ds-hidden">
  <div class="ds-modal">
    <div class="ds-modal__header">
      <div>
        <h3 class="ds-h3">Dodaj lead ręcznie</h3>
        <p class="ds-small ds-mt-2">Dla klienta z poza formularza.</p>
      </div>
      <button onclick="closeAddModal()" class="ds-btn ds-btn--ghost ds-btn--sm"><i class="ph ph-x"></i></button>
    </div>
    <div class="ds-modal__body">
      <form id="add-form" class="ds-flex-col ds-gap-3">
        <div class="ds-field">
          <label class="ds-field__label">Imię i nazwisko *</label>
          <input name="contact_name" required class="ds-input">
        </div>
        <div class="ds-grid ds-grid-2 ds-gap-3">
          <div class="ds-field">
            <label class="ds-field__label">Email *</label>
            <input name="contact_email" type="email" required class="ds-input">
          </div>
          <div class="ds-field">
            <label class="ds-field__label">Telefon</label>
            <input name="contact_phone" class="ds-input">
          </div>
        </div>
        <div class="ds-grid ds-grid-2 ds-gap-3">
          <div class="ds-field">
            <label class="ds-field__label">Firma</label>
            <input name="company" class="ds-input">
          </div>
          <div class="ds-field">
            <label class="ds-field__label">Strona WWW</label>
            <input name="website" class="ds-input">
          </div>
        </div>
        <div class="ds-field">
          <label class="ds-field__label">Krótki opis problemu</label>
          <textarea name="problem" rows="3" class="ds-textarea"></textarea>
        </div>
      </form>
    </div>
    <div class="ds-modal__footer">
      <button onclick="closeAddModal()" class="ds-btn ds-btn--ghost">Anuluj</button>
      <button onclick="document.getElementById('add-form').requestSubmit()" class="ds-btn ds-btn--primary">Dodaj lead</button>
    </div>
  </div>
</div>

<script src="/zwolnie/_assets/config.js"></script>
<script src="/zwolnie/_assets/auth.js"></script>
<script src="/zwolnie/_assets/utils.js"></script>
<script src="/zwolnie/_assets/sidebar.js"></script>
<script>
let allLeads = [];
let selectedIds = new Set();
let activeQuick = null;

(async () => {
  const { staff } = await ZE_Auth.require();
  ZE_Sidebar.render({ active: 'leads', userEmail: staff.email });

  const fStatus = document.getElementById('f-status');
  ZE.STATUS_ORDER.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = ZE.STATUS_LABELS[s]; fStatus.appendChild(o); });
  const fIndustry = document.getElementById('f-industry');
  Object.entries(ZE.INDUSTRY_LABELS).forEach(([v, l]) => { const o = document.createElement('option'); o.value = v; o.textContent = l; fIndustry.appendChild(o); });
  const fBudget = document.getElementById('f-budget');
  Object.entries(ZE.BUDGET_LABELS).forEach(([v, l]) => { const o = document.createElement('option'); o.value = v; o.textContent = l; fBudget.appendChild(o); });

  await loadLeads();
  ['f-search','f-status','f-industry','f-budget','f-date','f-sort'].forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('input', applyFilters);
    el.addEventListener('change', applyFilters);
  });
  document.getElementById('refresh-btn').addEventListener('click', async () => {
    document.getElementById('refresh-icon').classList.add('ds-spin');
    await loadLeads();
    setTimeout(() => document.getElementById('refresh-icon').classList.remove('ds-spin'), 600);
  });
  document.getElementById('check-all').addEventListener('change', (e) => {
    document.querySelectorAll('.ze-row-check').forEach(c => {
      c.checked = e.target.checked;
      if (e.target.checked) selectedIds.add(c.dataset.id); else selectedIds.delete(c.dataset.id);
    });
    document.querySelectorAll('#leads-tbody tr').forEach(r => r.classList.toggle('is-selected', selectedIds.has(r.dataset.id)));
    updateBulkBar();
  });
  document.getElementById('bulk-delete').addEventListener('click', async () => {
    const ok = await ZE.confirm(`Usunąć ${selectedIds.size} leadów? Nieodwracalne.`);
    if (!ok) return;
    const { error } = await ZE_SB.from('ze_leads').delete().in('id', Array.from(selectedIds));
    if (error) return ZE.toast(error.message, 'error');
    ZE.toast('Usunięto.', 'success'); selectedIds.clear(); await loadLeads();
  });
  document.getElementById('bulk-archive').addEventListener('click', async () => {
    const { error } = await ZE_SB.from('ze_leads').update({ status: 'archived' }).in('id', Array.from(selectedIds));
    if (error) return ZE.toast(error.message, 'error');
    ZE.toast('Zarchiwizowano.', 'success'); selectedIds.clear(); await loadLeads();
  });
  document.getElementById('export-btn').addEventListener('click', exportCSV);
  document.getElementById('add-lead-btn').addEventListener('click', () => document.getElementById('add-modal').classList.remove('ds-hidden'));
  document.getElementById('add-form').addEventListener('submit', handleAddLead);
  document.querySelectorAll('[data-quick]').forEach(btn => {
    btn.addEventListener('click', () => {
      activeQuick = btn.dataset.quick === 'clear' ? null : btn.dataset.quick;
      document.querySelectorAll('[data-quick]').forEach(b => b.classList.toggle('is-active', b.dataset.quick === activeQuick));
      if (!activeQuick) ['f-status','f-industry','f-budget','f-search','f-date'].forEach(id => document.getElementById(id).value = '');
      applyFilters();
    });
  });
})();

async function loadLeads() {
  const { data, error } = await ZE_SB.from('ze_leads')
    .select('*, ze_lead_attachments(count), ze_lead_notes(count)')
    .order('created_at', { ascending: false }).range(0, 999);
  if (error) {
    document.getElementById('leads-tbody').innerHTML = `<tr><td colspan="10" class="ds-table-empty" style="color: var(--ds-red)">${ZE.escapeHtml(error.message)}</td></tr>`;
    return;
  }
  allLeads = data || [];
  ZE_Sidebar.setBadge('leads', allLeads.length);
  document.getElementById('lead-count').textContent = allLeads.length;
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('f-search').value.trim().toLowerCase();
  const fs = document.getElementById('f-status').value;
  const fi = document.getElementById('f-industry').value;
  const fb = document.getElementById('f-budget').value;
  const fd = document.getElementById('f-date').value;
  const [sortKey, sortDir] = document.getElementById('f-sort').value.split('-');

  let list = allLeads.filter(l => {
    if (fs && l.status !== fs) return false;
    if (fi && l.industry !== fi) return false;
    if (fb && l.budget !== fb) return false;
    if (q) {
      const hay = [l.contact_name, l.company, l.contact_email, l.contact_phone].filter(Boolean).join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (activeQuick === 'todo' && (l.ai_analysis || ['lost','archived'].includes(l.status))) return false;
    if (activeQuick === 'no-mvp' && (l.mvp_html || ['lost','archived'].includes(l.status))) return false;
    if (activeQuick === 'needs-action' && !['new','analyzing','analyzed','proposal_sent','negotiation'].includes(l.status)) return false;
    if (activeQuick === 'stale') {
      const days = ZE.daysInStatus(l.status_changed_at);
      if (days == null || days < 5 || ['won','lost','archived'].includes(l.status)) return false;
    }
    if (activeQuick === 'starred' && !l.starred) return false;
    if (fd) {
      const ago = { today: 1, week: 7, month: 30 }[fd];
      if (new Date(l.created_at).getTime() < Date.now() - ago * 86400000) return false;
    }
    return true;
  });

  list.sort((a, b) => {
    const av = a[sortKey] || '', bv = b[sortKey] || '';
    if (av < bv) return sortDir === 'asc' ? -1 : 1;
    if (av > bv) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });
  renderLeads(list);
  document.getElementById('lead-count-filtered').textContent = list.length !== allLeads.length ? `widoczne: ${list.length}` : '';
}

function renderLeads(list) {
  const tbody = document.getElementById('leads-tbody');
  if (!list.length) {
    tbody.innerHTML = `<tr><td colspan="10"><div class="ds-empty"><div class="ds-empty__icon"><i class="ph ph-magnifying-glass"></i></div><div class="ds-empty__title">Nic nie znaleziono</div><div class="ds-empty__desc">Brak leadów spełniających kryteria. Zmień filtry albo dodaj lead.</div></div></td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(l => {
    const attCount = (l.ze_lead_attachments && l.ze_lead_attachments[0]?.count) || 0;
    const noteCount = (l.ze_lead_notes && l.ze_lead_notes[0]?.count) || 0;
    const safeWeb = ZE.safeUrl(l.website);
    return `
      <tr data-id="${l.id}" class="${selectedIds.has(l.id) ? 'is-selected' : ''}">
        <td onclick="event.stopPropagation()">
          <input type="checkbox" class="ze-row-check" data-id="${l.id}" ${selectedIds.has(l.id) ? 'checked' : ''} onchange="toggleSelect('${l.id}', this.checked)">
        </td>
        <td>
          <div class="ds-flex ds-items-center ds-gap-3">
            ${ZE.avatarHtml(l.contact_name || l.contact_email || '?', 32)}
            <div style="min-width: 0;">
              <div class="ds-fg-1 ds-truncate" style="font-weight: 500;">${ZE.escapeHtml(l.contact_name || '(brak)')}</div>
              <div class="ds-xs ds-truncate ds-mono">${ZE.escapeHtml(l.contact_email || '—')}</div>
            </div>
            <div class="row-actions ds-flex ds-gap-1" onclick="event.stopPropagation()">
              ${l.contact_email ? `<a href="mailto:${ZE.escapeHtml(l.contact_email)}" title="Email" class="ds-btn ds-btn--ghost ds-btn--sm" style="height:24px;padding:0 6px"><i class="ph ph-envelope"></i></a>` : ''}
              ${l.contact_phone ? `<a href="tel:${ZE.escapeHtml(l.contact_phone)}" title="Zadzwoń" class="ds-btn ds-btn--ghost ds-btn--sm" style="height:24px;padding:0 6px"><i class="ph ph-phone"></i></a>` : ''}
            </div>
          </div>
        </td>
        <td>
          <div class="ds-fg-2 ds-truncate" style="max-width: 180px;">${ZE.escapeHtml(l.company || '—')}</div>
          ${safeWeb ? `<a href="${ZE.escapeHtml(safeWeb)}" target="_blank" rel="noopener nofollow" onclick="event.stopPropagation()" class="ds-xs ds-truncate" style="display:inline-block;max-width:160px;color:var(--ds-blue)"><i class="ph ph-link-simple"></i> ${ZE.escapeHtml(l.website.replace(/^https?:\/\//, ''))}</a>` : ''}
        </td>
        <td class="ds-fg-3 ds-truncate">${ZE.escapeHtml(ZE.INDUSTRY_LABELS[l.industry] || l.industry || '—')}</td>
        <td class="ds-fg-3">${ZE.escapeHtml(ZE.TEAM_SIZE_LABELS[l.team_size] || '—')}</td>
        <td class="ds-fg-3">${ZE.escapeHtml(ZE.BUDGET_LABELS[l.budget] || '—')}</td>
        <td onclick="event.stopPropagation()">
          <select class="ds-select ze-row-status" style="height: 26px; font-size: 11px; padding: 0 6px;" data-id="${l.id}">
            ${ZE.STATUS_ORDER.map(s => `<option value="${s}" ${s === l.status ? 'selected' : ''}>${ZE.STATUS_LABELS[s]}</option>`).join('')}
          </select>
        </td>
        <td>
          <div class="ds-flex ds-items-center ds-gap-2" style="font-size: 12px;">
            ${l.ai_analysis ? '<span title="Analiza" style="color: var(--ds-magic)"><i class="ph-fill ph-sparkle"></i></span>' : '<span title="Brak analizy" style="color: var(--ds-fg-6)"><i class="ph ph-sparkle"></i></span>'}
            ${l.mvp_html ? '<span title="MVP" style="color: var(--ds-emerald)"><i class="ph-fill ph-cursor-click"></i></span>' : '<span title="Brak MVP" style="color: var(--ds-fg-6)"><i class="ph ph-cursor-click"></i></span>'}
            ${attCount > 0 ? `<span title="Pliki: ${attCount}" style="color: var(--ds-fg-4); font-size: 11px;"><i class="ph ph-paperclip"></i> ${attCount}</span>` : ''}
            ${noteCount > 0 ? `<span title="Notatki: ${noteCount}" style="color: var(--ds-fg-4); font-size: 11px;"><i class="ph ph-note"></i> ${noteCount}</span>` : ''}
            ${l.converted_to_project_id ? '<span title="Projekt utworzony" style="color: var(--ds-magic)"><i class="ph-fill ph-folder-open"></i></span>' : ''}
          </div>
        </td>
        <td class="ds-xs ds-num" style="white-space: nowrap;">${ZE.fmtRelative(l.created_at)}</td>
        <td onclick="event.stopPropagation()">
          <button onclick="toggleStar('${l.id}', ${!l.starred})" class="ds-btn ds-btn--ghost ds-btn--sm" style="height:24px;padding:0 4px;color:${l.starred ? 'var(--ds-amber)' : 'var(--ds-fg-5)'}">
            <i class="ph ${l.starred ? 'ph-fill ph-star' : 'ph-star'}"></i>
          </button>
        </td>
      </tr>
    `;
  }).join('');
  tbody.querySelectorAll('tr').forEach(row => row.addEventListener('click', () => { location.href = '/zwolnie/lead?id=' + row.dataset.id; }));
  tbody.querySelectorAll('.ze-row-status').forEach(sel => {
    sel.addEventListener('change', async (e) => {
      const id = sel.dataset.id;
      const old = allLeads.find(x => x.id === id)?.status;
      const { error } = await ZE_SB.from('ze_leads').update({ status: sel.value }).eq('id', id);
      if (error) { ZE.toast(error.message, 'error'); sel.value = old; return; }
      await ZE.logActivity(id, 'status_changed', { from: old, to: sel.value });
      const lead = allLeads.find(x => x.id === id); if (lead) lead.status = sel.value;
      ZE.toast('Status zmieniony.', 'success');
    });
  });
}

function toggleSelect(id, checked) {
  if (checked) selectedIds.add(id); else selectedIds.delete(id);
  document.querySelector(`#leads-tbody tr[data-id="${id}"]`)?.classList.toggle('is-selected', checked);
  updateBulkBar();
}
function updateBulkBar() {
  const bar = document.getElementById('bulk-bar');
  document.getElementById('bulk-count').textContent = selectedIds.size;
  bar.classList.toggle('ds-hidden', selectedIds.size === 0);
}
async function toggleStar(id, value) {
  await ZE_SB.from('ze_leads').update({ starred: value }).eq('id', id);
  await loadLeads();
}
function closeAddModal() { document.getElementById('add-modal').classList.add('ds-hidden'); }
async function handleAddLead(e) {
  e.preventDefault();
  const fd = new FormData(e.target);
  const payload = {
    contact_name: fd.get('contact_name'), contact_email: fd.get('contact_email'),
    contact_phone: fd.get('contact_phone') || null, company: fd.get('company') || null,
    website: fd.get('website') || null, problem: fd.get('problem') || null,
    source: 'manual', status: 'new'
  };
  const { data, error } = await ZE_SB.from('ze_leads').insert(payload).select('id').single();
  if (error) return ZE.toast(error.message, 'error');
  closeAddModal(); e.target.reset();
  ZE.toast('Lead dodany.', 'success');
  location.href = '/zwolnie/lead?id=' + data.id;
}
function exportCSV() {
  const visible = new Set(Array.from(document.querySelectorAll('#leads-tbody tr')).map(r => r.dataset.id));
  const list = allLeads.filter(l => visible.has(l.id));
  if (!list.length) { ZE.toast('Nic do wyeksportowania.', 'error'); return; }
  const headers = ['created_at','status','contact_name','contact_email','contact_phone','company','website','industry','team_size','payroll','budget','problem'];
  const rows = list.map(l => headers.map(h => {
    let v = l[h] ?? '';
    if (typeof v === 'string' && (v.includes(',') || v.includes('"') || v.includes('\n'))) v = '"' + v.replace(/"/g, '""') + '"';
    return v;
  }).join(','));
  const blob = new Blob(['﻿' + headers.join(',') + '\n' + rows.join('\n')], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `zwolnie-leady-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>
</body>
</html>
