<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zwolnię · Projekt</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://unpkg.com/@phosphor-icons/web"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist@1/dist/fonts.css">
<link rel="stylesheet" href="/zwolnie/_assets/ds.css">
<style>
  .pj-grid { display: grid; grid-template-columns: 1fr 320px; gap: 24px; }
  @media (max-width: 1100px) { .pj-grid { grid-template-columns: 1fr; } }
  .stage-row { border: 1px solid var(--ds-border); border-radius: var(--ds-r-md); padding: 16px; transition: border-color var(--ds-d-fast) var(--ds-ease); }
  .stage-row.is-progress { border-color: rgba(245,166,35,0.4); background: rgba(245,166,35,0.04); }
  .stage-row.is-done { border-color: rgba(0,200,150,0.4); background: rgba(0,200,150,0.04); }
  .stage-dot { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
  .stage-dot.pending { background: var(--ds-surface-3); color: var(--ds-fg-4); }
  .stage-dot.in_progress { background: var(--ds-amber); color: #000; }
  .stage-dot.completed { background: var(--ds-emerald); color: #000; }
  .stage-dot.skipped { background: var(--ds-surface-3); color: var(--ds-fg-5); }
</style>
</head>
<body>

<div class="ds-app">
  <aside id="ze-sidebar" class="ds-sidebar"></aside>
  <main class="ds-main">
    <header class="ds-header">
      <div class="ds-breadcrumb">
        <a href="/zwolnie/projects">Projekty</a>
        <span class="ds-sep">/</span>
        <span class="ds-current ds-truncate" id="hdr-title" style="max-width: 320px;">—</span>
      </div>
      <div class="ds-flex ds-items-center ds-gap-2">
        <button id="copy-client-link" class="ds-btn ds-btn--secondary ds-btn--sm"><i class="ph ph-link"></i> Kopiuj link klienta</button>
        <select id="status-select" class="ds-select" style="width: 160px;"></select>
      </div>
    </header>

    <div class="ds-content ds-fade-in" style="max-width: 1400px;">
      <div class="pj-grid">
        <section>
          <div class="ds-mb-6">
            <h1 id="project-title" class="ds-h1"></h1>
            <p id="project-desc" class="ds-body ds-mt-3"></p>
          </div>

          <!-- Brief -->
          <details class="ds-card ds-mb-4" open>
            <summary style="padding: 16px 24px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;">
              <h3 class="ds-h4">Brief klienta</h3>
              <i class="ph ph-caret-down ds-fg-5"></i>
            </summary>
            <div style="padding: 0 24px 24px; border-top: 1px solid var(--ds-border);">
              <div class="ds-grid ds-grid-2 ds-gap-3 ds-mt-4 ds-mb-4">
                <div><div class="ds-label">Kontakt</div><div class="ds-fg-1 ds-mt-2 ds-truncate" id="b-contact"></div></div>
                <div><div class="ds-label">Firma</div><div class="ds-fg-1 ds-mt-2 ds-truncate" id="b-company"></div></div>
                <div><div class="ds-label">Branża</div><div class="ds-fg-1 ds-mt-2" id="b-industry">—</div></div>
                <div><div class="ds-label">Zespół</div><div class="ds-fg-1 ds-mt-2" id="b-team">—</div></div>
                <div><div class="ds-label">Pensje</div><div class="ds-fg-1 ds-mt-2" id="b-payroll">—</div></div>
                <div><div class="ds-label">Budżet</div><div class="ds-fg-1 ds-mt-2" id="b-budget">—</div></div>
              </div>
              <div class="ds-label">Problem własnymi słowami</div>
              <div id="b-problem" class="ds-fg-2 ds-mt-2" style="white-space: pre-wrap; line-height: 1.65; padding: 16px; background: var(--ds-surface-2); border-radius: var(--ds-r-sm);"></div>
              <a id="b-lead-link" class="ds-btn ds-btn--ghost ds-btn--sm ds-mt-3"><i class="ph ph-arrow-square-out"></i> Otwórz pełny lead</a>
            </div>
          </details>

          <!-- Analiza AI -->
          <details id="analysis-details" class="ds-card ds-card--magic ds-mb-4 ds-hidden" open>
            <summary style="padding: 16px 24px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;">
              <div class="ds-flex ds-items-center ds-gap-3">
                <span class="ds-avatar" style="width: 28px; height: 28px; background: var(--ds-magic-gradient);"><i class="ph ph-sparkle"></i></span>
                <h3 class="ds-h4">Analiza AI</h3>
                <span id="analysis-date" class="ds-xs"></span>
              </div>
              <i class="ph ph-caret-down ds-fg-5"></i>
            </summary>
            <div style="padding: 24px; border-top: 1px solid var(--ds-border);">
              <div id="analysis-rendered"></div>
            </div>
          </details>

          <!-- Etapy -->
          <div class="ds-card ds-mb-4">
            <div class="ds-card__header">
              <h3 class="ds-h4">Etapy projektu</h3>
              <button id="add-stage-btn" class="ds-btn ds-btn--ghost ds-btn--sm"><i class="ph ph-plus"></i> Dodaj etap</button>
            </div>
            <div class="ds-card__body" id="stages-list" style="display: flex; flex-direction: column; gap: 8px;"></div>
          </div>

          <!-- Aktualizacje -->
          <div class="ds-card ds-mb-4">
            <div class="ds-card__header"><h3 class="ds-h4">Aktualizacje dla klienta</h3></div>
            <div class="ds-card__body">
              <input id="update-title" placeholder="Tytuł aktualizacji..." class="ds-input ds-mb-2">
              <textarea id="update-body" rows="2" placeholder="Treść (opcjonalnie)..." class="ds-textarea"></textarea>
              <div class="ds-flex ds-justify-between ds-mt-3"><span></span><button id="add-update-btn" class="ds-btn ds-btn--primary ds-btn--sm">Dodaj</button></div>
              <div id="updates-list" class="ds-mt-6 ds-flex-col ds-gap-3"></div>
            </div>
          </div>

          <!-- MVP -->
          <div class="ds-card">
            <div class="ds-card__header">
              <h3 class="ds-h4">Klikalny prototyp MVP</h3>
              <button id="open-mvp-btn" class="ds-btn ds-btn--ghost ds-btn--sm ds-hidden"><i class="ph ph-arrow-square-out"></i> Pełny ekran</button>
            </div>
            <div class="ds-card__body">
              <div id="mvp-window" class="ds-window ds-hidden">
                <div class="ds-window__bar"><span class="ds-dot"></span><span class="ds-window__bar-title">prototyp</span></div>
                <iframe id="mvp-iframe" sandbox="allow-scripts allow-forms" style="width: 100%; height: 600px; border: 0; display: block; background: white;"></iframe>
              </div>
              <div id="mvp-empty" class="ds-empty"><div class="ds-empty__icon"><i class="ph ph-cursor-click"></i></div><div class="ds-empty__title">Brak MVP</div><div class="ds-empty__desc">Wróć do <a id="lead-link" style="color: var(--ds-magic);">lead'a</a> i wygeneruj prototyp.</div></div>
            </div>
          </div>
        </section>

        <aside class="ds-flex-col ds-gap-4">
          <div class="ds-card">
            <div class="ds-card__body">
              <div class="ds-label">Klient widzi</div>
              <a id="client-link" target="_blank" class="ds-mono ds-mt-3" style="display: block; font-size: 11px; color: var(--ds-blue); word-break: break-all;"></a>
            </div>
          </div>
          <div class="ds-card">
            <div class="ds-card__body">
              <div class="ds-label">Postęp etapów</div>
              <div id="progress-summary" class="ds-num ds-mt-3" style="font-size: 28px; font-weight: 600; color: var(--ds-fg-1);">0/0</div>
              <div style="height: 4px; background: var(--ds-surface-3); border-radius: 999px; overflow: hidden; margin-top: 8px;">
                <div id="progress-bar" style="height: 100%; width: 0%; background: linear-gradient(90deg, var(--ds-emerald) 0%, #6EE7B7 100%); transition: width 280ms;"></div>
              </div>
            </div>
          </div>
          <a id="lead-back" class="ds-btn ds-btn--ghost ds-btn--sm"><i class="ph ph-arrow-left"></i> Wróć do lead'a</a>
        </aside>
      </div>
    </div>
  </main>
</div>

<script src="/zwolnie/_assets/config.js"></script>
<script src="/zwolnie/_assets/auth.js"></script>
<script src="/zwolnie/_assets/utils.js"></script>
<script src="/zwolnie/_assets/sidebar.js"></script>
<script>
const projectId = new URLSearchParams(location.search).get('id');
const PROJECT_STATUS = { planning: 'Planowanie', building: 'Budowa', delivered: 'Dostarczony', on_hold: 'Wstrzymany', closed: 'Zamknięty' };
const STAGE_STATUS = { pending: 'Czeka', in_progress: 'W toku', completed: 'Zrobione', skipped: 'Pominięte' };
let project = null;
let stages = [];

(async () => {
  if (!projectId) { location.replace('/zwolnie/projects'); return; }
  const { staff } = await ZE_Auth.require();
  ZE_Sidebar.render({ active: 'projects', userEmail: staff.email });

  await loadProject();
  await loadStages();
  await loadUpdates();

  document.getElementById('status-select').addEventListener('change', async (e) => {
    const v = e.target.value;
    const { error } = await ZE_SB.from('ze_projects').update({ status: v }).eq('id', projectId);
    if (error) return ZE.toast(error.message, 'error');
    project.status = v; ZE.toast('Status zmieniony.', 'success');
  });
  document.getElementById('copy-client-link').addEventListener('click', () => {
    navigator.clipboard.writeText(location.origin + ZE_CONFIG.CLIENT_VIEW_BASE + project.token);
    ZE.toast('Link skopiowany.', 'success');
  });
  document.getElementById('add-stage-btn').addEventListener('click', addStage);
  document.getElementById('add-update-btn').addEventListener('click', addUpdate);
  document.getElementById('open-mvp-btn').addEventListener('click', () => ZE.openHtmlInNewTab(project.mvp_html));
})();

async function loadProject() {
  const { data, error } = await ZE_SB.from('ze_projects')
    .select('*, ze_leads:lead_id(id, contact_name, contact_email, contact_phone, company, website, industry, team_size, payroll, budget, problem, ai_analysis, ai_analysis_published_at)')
    .eq('id', projectId).single();
  if (error || !data) { location.replace('/zwolnie/projects'); return; }
  project = data;
  document.title = `Zwolnię · ${project.title}`;
  document.getElementById('hdr-title').textContent = project.title;
  document.getElementById('project-title').textContent = project.title;
  document.getElementById('project-desc').textContent = project.description || '';
  document.getElementById('status-select').innerHTML = Object.entries(PROJECT_STATUS).map(([v, l]) => `<option value="${v}" ${v === project.status ? 'selected' : ''}>${l}</option>`).join('');

  const clientUrl = location.origin + ZE_CONFIG.CLIENT_VIEW_BASE + project.token;
  const cl = document.getElementById('client-link');
  cl.href = clientUrl; cl.textContent = clientUrl;
  document.querySelectorAll('#lead-link, #lead-back').forEach(a => a.href = '/zwolnie/lead?id=' + project.lead_id);

  renderBrief(project.ze_leads || {});
  renderAnalysis(project.ze_leads?.ai_analysis, project.ze_leads?.ai_analysis_published_at);

  if (project.mvp_html) {
    document.getElementById('mvp-iframe').srcdoc = project.mvp_html;
    document.getElementById('mvp-window').classList.remove('ds-hidden');
    document.getElementById('mvp-empty').classList.add('ds-hidden');
    document.getElementById('open-mvp-btn').classList.remove('ds-hidden');
  }
}

function renderBrief(l) {
  document.getElementById('b-contact').textContent = [l.contact_name, l.contact_email, l.contact_phone].filter(Boolean).join(' · ') || '—';
  document.getElementById('b-company').textContent = [l.company, l.website].filter(Boolean).join(' · ') || '—';
  document.getElementById('b-industry').textContent = ZE.INDUSTRY_LABELS[l.industry] || l.industry || '—';
  document.getElementById('b-team').textContent = ZE.TEAM_SIZE_LABELS[l.team_size] || l.team_size || '—';
  document.getElementById('b-payroll').textContent = ZE.PAYROLL_LABELS[l.payroll] || l.payroll || '—';
  document.getElementById('b-budget').textContent = ZE.BUDGET_LABELS[l.budget] || l.budget || '—';
  document.getElementById('b-problem').textContent = l.problem || '(brak opisu)';
  if (l.id) document.getElementById('b-lead-link').href = '/zwolnie/lead?id=' + l.id;
}

function renderAnalysis(a, publishedAt) {
  if (!a) return;
  document.getElementById('analysis-details').classList.remove('ds-hidden');
  if (publishedAt) document.getElementById('analysis-date').textContent = '· ' + ZE.fmtRelative(publishedAt);
  document.getElementById('analysis-rendered').innerHTML = ZE.renderAnalysisHtml(a);
}

async function loadStages() {
  const { data } = await ZE_SB.from('ze_project_stages').select('*, ze_project_tasks(id, title, completed, order_index)').eq('project_id', projectId).order('order_index');
  stages = data || [];
  renderStages();
}

function renderStages() {
  const el = document.getElementById('stages-list');
  if (!stages.length) { el.innerHTML = '<div class="ds-xs" style="text-align: center; padding: 24px;">Brak etapów.</div>'; return; }
  el.innerHTML = stages.map((s, idx) => {
    const tasks = (s.ze_project_tasks || []).sort((a, b) => a.order_index - b.order_index);
    const cls = s.status === 'completed' ? 'is-done' : s.status === 'in_progress' ? 'is-progress' : '';
    return `
      <div class="stage-row ${cls}">
        <div class="ds-flex ds-items-center ds-justify-between ds-gap-3">
          <div class="ds-flex ds-items-center ds-gap-3" style="min-width: 0;">
            <div class="stage-dot ${s.status}">${s.status === 'completed' ? '<i class="ph-bold ph-check"></i>' : idx + 1}</div>
            <div style="min-width: 0;">
              <div class="ds-fg-1" style="font-weight: 500; font-size: 14px;">${ZE.escapeHtml(s.title)}</div>
              <div class="ds-xs ds-truncate" style="max-width: 360px;">${ZE.escapeHtml(s.description || '')}</div>
            </div>
          </div>
          <select onchange="updateStageStatus('${s.id}', this.value)" class="ds-select" style="width: 130px; height: 28px; font-size: 11px;">
            ${Object.entries(STAGE_STATUS).map(([v, l]) => `<option value="${v}" ${v === s.status ? 'selected' : ''}>${l}</option>`).join('')}
          </select>
        </div>
        <div class="ds-flex-col ds-gap-1 ds-mt-3" style="padding-left: 40px;">
          ${tasks.map(t => `
            <label class="ds-flex ds-items-center ds-gap-2" style="cursor: pointer; padding: 4px 0; font-size: 13px; color: ${t.completed ? 'var(--ds-fg-5)' : 'var(--ds-fg-2)'};">
              <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTask('${t.id}', this.checked)">
              <span style="${t.completed ? 'text-decoration: line-through;' : ''}">${ZE.escapeHtml(t.title)}</span>
            </label>
          `).join('')}
          <button onclick="addTask('${s.id}')" class="ds-btn ds-btn--ghost ds-btn--sm" style="align-self: flex-start; padding: 4px 6px; height: 22px;"><i class="ph ph-plus"></i> Dodaj zadanie</button>
        </div>
      </div>
    `;
  }).join('');
  const total = stages.length, done = stages.filter(s => s.status === 'completed').length;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('progress-summary').textContent = `${done}/${total}`;
  document.getElementById('progress-bar').style.width = pct + '%';
}

async function updateStageStatus(id, status) {
  const patch = { status };
  if (status === 'in_progress') patch.started_at = new Date().toISOString();
  if (status === 'completed') patch.completed_at = new Date().toISOString();
  const { error } = await ZE_SB.from('ze_project_stages').update(patch).eq('id', id);
  if (error) return ZE.toast(error.message, 'error');
  await loadStages();
}
window.updateStageStatus = updateStageStatus;

async function toggleTask(id, completed) {
  const { error } = await ZE_SB.from('ze_project_tasks').update({ completed, completed_at: completed ? new Date().toISOString() : null }).eq('id', id);
  if (error) return ZE.toast(error.message, 'error');
  await loadStages();
}
window.toggleTask = toggleTask;

async function addTask(stageId) {
  const title = await ZE.askText({ title: 'Nowe zadanie', placeholder: 'Co konkretnie do zrobienia?', multiline: false });
  if (!title) return;
  const stage = stages.find(s => s.id === stageId);
  const order = (stage?.ze_project_tasks || []).length;
  const { error } = await ZE_SB.from('ze_project_tasks').insert({ stage_id: stageId, title: title.slice(0, 500), order_index: order });
  if (error) return ZE.toast(error.message, 'error');
  await loadStages();
}
window.addTask = addTask;

async function addStage() {
  const title = await ZE.askText({ title: 'Nowy etap', placeholder: 'Np. "Migracja danych"', multiline: false });
  if (!title) return;
  const slug = (title.toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 30) || 'etap') + '-' + Math.random().toString(36).slice(2, 6);
  const order = stages.length + 1;
  const { error } = await ZE_SB.from('ze_project_stages').insert({ project_id: projectId, title: title.slice(0, 200), slug, order_index: order, status: 'pending' });
  if (error) return ZE.toast(error.message, 'error');
  await loadStages();
}

async function loadUpdates() {
  const { data } = await ZE_SB.from('ze_project_updates').select('*').eq('project_id', projectId).order('posted_at', { ascending: false });
  const list = data || [];
  const el = document.getElementById('updates-list');
  if (!list.length) { el.innerHTML = '<div class="ds-xs" style="text-align: center; padding: 12px;">Brak aktualizacji.</div>'; return; }
  el.innerHTML = list.map(u => `
    <article style="padding: 14px 16px; background: var(--ds-surface-2); border: 1px solid var(--ds-border); border-radius: var(--ds-r-sm);">
      <div class="ds-flex ds-items-center ds-justify-between ds-mb-2">
        <div class="ds-fg-1" style="font-weight: 500;">${ZE.escapeHtml(u.title)}</div>
        <button onclick="deleteUpdate('${u.id}')" class="ds-btn ds-btn--ghost ds-btn--sm" style="height: 22px; padding: 0 4px; color: var(--ds-fg-5);"><i class="ph ph-trash"></i></button>
      </div>
      ${u.body ? `<div class="ds-fg-2" style="font-size: 13px; white-space: pre-wrap; line-height: 1.6;">${ZE.escapeHtml(u.body)}</div>` : ''}
      <div class="ds-xs ds-mt-2">${ZE.fmtRelative(u.posted_at)}</div>
    </article>
  `).join('');
}

async function addUpdate() {
  const title = document.getElementById('update-title').value.trim();
  const body = document.getElementById('update-body').value.trim();
  if (!title) return;
  const staff = ZE_Auth.staff();
  const { error } = await ZE_SB.from('ze_project_updates').insert({ project_id: projectId, title, body: body || null, author_id: staff.id });
  if (error) return ZE.toast(error.message, 'error');
  document.getElementById('update-title').value = '';
  document.getElementById('update-body').value = '';
  await loadUpdates();
}

async function deleteUpdate(id) {
  const ok = await ZE.confirm('Usunąć aktualizację?');
  if (!ok) return;
  const { error } = await ZE_SB.from('ze_project_updates').delete().eq('id', id);
  if (error) return ZE.toast(error.message, 'error');
  await loadUpdates();
}
window.deleteUpdate = deleteUpdate;
</script>
</body>
</html>
