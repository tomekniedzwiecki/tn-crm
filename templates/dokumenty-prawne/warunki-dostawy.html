16&quot; height=&quot;16&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;> <circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;10&quot;/> <path d=&quot;M12 16v-4M12 8h.01&quot;/> </svg> Dlaczego wysyłka trwa dłużej? </h3> <p> Produkty pokonują trasę z Azji do Polski. To dłużej niż wysyłka krajowa, ale w zamian otrzymujesz produkt w znacznie lepszej cenie. </p> </div> </section> <!-- Czas dostawy --> <section class=&quot;section&quot;> <h2> <span class=&quot;icon&quot;> <svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;> <circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;10&quot;/> <polyline points=&quot;12 6 12 12 16 14&quot;/> </svg> </span> Czas dostawy </h2> <p>Czas dostawy liczony jest <strong>od momentu wysyłki</strong>, nie od złożenia zamówienia.</p> <table class=&quot;delivery-table&quot;> <thead> <tr> <th>Parametr</th> <th>Wartość</th> </tr> </thead> <tbody> <tr> <td>Typowy czas dostawy</td> <td class=&quot;highlight-cell&quot;>{{DELIVERY_TIME_TYPICAL}}</td> </tr> <tr> <td>Maksymalny czas dostawy</td> <td>{{DELIVERY_TIME_MAX}}</td> </tr> <tr> <td>Koszt dostawy</td> <td><strong>{{DELIVERY_COST}}</strong></td> </tr> </tbody> </table> <p> W większości przypadków przesyłki docierają w ciągu <strong>{{DELIVERY_TIME_TYPICAL}}</strong>. Maksymalny czas ({{DELIVERY_TIME_MAX}}) dotyczy sytuacji wyjątkowych (np. święta, opóźnienia celne). </p> </section> <!-- Śledzenie --> <section class=&quot;section&quot;> <h2> <span class=&quot;icon&quot;> <svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;> <rect x=&quot;1&quot; y=&quot;3&quot; width=&quot;15&quot; height=&quot;13&quot;/> <polygon points=&quot;16 8 20 8 23 11 23 16 16 16 16 8&quot;/> <circle cx=&quot;5.5&quot; cy=&quot;18.5&quot; r=&quot;2.5&quot;/> <circle cx=&quot;18.5&quot; cy=&quot;18.5&quot; r=&quot;2.5&quot;/> </svg> </span> Śledzenie przesyłki </h2> <p> Po wysyłce produktu otrzymasz <strong>e-mail z numerem śledzenia</strong>. Możesz sprawdzić status przesyłki na stronie przewoźnika lub przez: </p> <ul> <li><a href=&quot;https://www.17track.net/pl&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot;>17track.net</a> — uniwersalny tracker</li> <li><a href=&quot;https://parcelsapp.com/pl&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot;>parcelsapp.com</a> — śledzenie z polskim tłumaczeniem</li> </ul> <div class=&quot;info-box&quot;> <p> <strong>Uwaga:</strong> Numer śledzenia może zacząć pokazywać status dopiero po 2-5 dniach od wysyłki — to normalne przy przesyłkach międzynarodowych. </p> </div> </section> <!-- Cło i VAT --> <section class=&quot;section&quot;> <h2> <span class=&quot;icon&quot;> <svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;> <path d=&quot;M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z&quot;/> </svg> </span> Cło i podatki </h2> <div class=&quot;info-box success&quot;> <h3> <svg width=&quot;16&quot; height=&quot;16&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;> <path d=&quot;M22 11.08V12a10 10 0 1 1-5.93-9.14&quot;/> <polyline points=&quot;22 4 12 14.01 9 11.01&quot;/> </svg> VAT już opłacony </h3> <p> VAT jest rozliczany przez platformę wysyłkową w ramach systemu IOSS. <strong>Nie płacisz żadnych dodatkowych opłat przy odbiorze.</strong> </p> </div> <ul> <li><strong>VAT</strong> — już wliczony w cenę produktu</li> <li><strong>Cło</strong> — przesyłki do 150 EUR są zwolnione z cła</li> <li><strong>Dodatkowe opłaty</strong> — brak opłat przy odbiorze</li> </ul> <p> Przesyłka jest odprawiona celnie przed doręczeniem. Kurier dostarczy paczkę bez pobierania żadnych dodatkowych kwot. </p> </section> <!-- FAQ --> <section class=&quot;section&quot;> <h2> <span class=&quot;icon&quot;> <svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;> <circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;10&quot;/> <path d=&quot;M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3&quot;/> <line x1=&quot;12&quot; y1=&quot;17&quot; x2=&quot;12.01&quot; y2=&quot;17&quot;/> </svg> </span> Często zadawane pytania </h2> <div class=&quot;faq-item&quot;> <strong>Zamówiłem 3 dni temu, a tracking nie działa?</strong> <p> To normalne. Numery śledzenia zaczynają działać po 2-5 dniach od nadania. Poczekaj kilka dni i sprawdź ponownie. </p> </div> <div class=&quot;faq-item&quot;> <strong>Czy mogę zmienić adres dostawy po zamówieniu?</strong> <p> Tak, ale tylko przed wysyłką. Napisz do nas jak najszybciej na <a href=&quot;mailto:{{EMAIL}}&quot;>{{EMAIL}}</a>. </p> </div> <div class=&quot;faq-item&quot;> <strong>Co jeśli paczka nie dotrze?</strong> <p> Jeśli przesyłka nie dotrze w ciągu {{DELIVERY_TIME_MAX}}, skontaktuj się z nami. Wyślemy produkt ponownie lub zwrócimy pieniądze. </p> </div> <div class=&quot;faq-item&quot;> <strong>Czy wysyłacie za granicę?</strong> <p> Obecnie wysyłamy tylko na terenie Polski. </p> </div> </section> <!-- Kontakt --> <section class=&quot;section&quot;> <h2> <span class=&quot;icon&quot;> <svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;> <path d=&quot;M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z&quot;/> <polyline points=&quot;22,6 12,13 2,6&quot;/> </svg> </span> Pytania o dostawę? </h2> <p>Jeśli masz pytania dotyczące wysyłki lub chcesz sprawdzić status zamówienia:</p> <ul> <li>E-mail: <a href=&quot;mailto:{{EMAIL}}&quot;>{{EMAIL}}</a></li> <li>Telefon: <a href=&quot;tel:{{PHONE}}&quot;>{{PHONE}}</a></li> </ul> <p>Odpowiadamy w ciągu 24 godzin w dni robocze.</p> </section> </div> </div> <footer class=&quot;footer&quot;> <p>&copy; {{YEAR}} {{BRAND_NAME}}. Wszelkie prawa zastrzeżone.</p> <a href=&quot;{{MAIN_URL}}&quot; class=&quot;back-btn&quot;> <svg width=&quot;16&quot; height=&quot;16&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;> <line x1=&quot;19&quot; y1=&quot;12&quot; x2=&quot;5&quot; y2=&quot;12&quot;/> <polyline points=&quot;12 19 5 12 12 5&quot;/> </svg> Wróć do sklepu </a> </footer> </body> </html>"></iframe>
