} .legal-footer .back-btn:hover { background: var(--primary); text-decoration: none; } @media (max-width: 600px) { .legal-toc ol { columns: 1; } .legal-content { padding: 24px 20px; } .contact-row { flex-direction: column; gap: 2px; } .contact-row .label { width: auto; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; } .legal-table { font-size: 13px; } .legal-table th, .legal-table td { padding: 8px; } } @media print { .legal-header { padding: 24px; } .legal-toc { break-after: page; } .legal-section { break-inside: avoid; } .legal-footer { display: none; } } </style> </head> <body> <!-- HEADER --> <header class=&quot;legal-header&quot;> <div class=&quot;brand&quot;>{{BRAND_NAME}}</div> <h1>Polityka Prywatności</h1> <p class=&quot;subtitle&quot;>Informacje o przetwarzaniu danych osobowych</p> <div class=&quot;meta&quot;> <svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;> <rect x=&quot;3&quot; y=&quot;4&quot; width=&quot;18&quot; height=&quot;18&quot; rx=&quot;2&quot;/> <line x1=&quot;16&quot; y1=&quot;2&quot; x2=&quot;16&quot; y2=&quot;6&quot;/> <line x1=&quot;8&quot; y1=&quot;2&quot; x2=&quot;8&quot; y2=&quot;6&quot;/> <line x1=&quot;3&quot; y1=&quot;10&quot; x2=&quot;21&quot; y2=&quot;10&quot;/> </svg> Aktualizacja: {{UPDATE_DATE}} </div> </header> <!-- CONTENT --> <div class=&quot;legal-container&quot;> <!-- SPIS TREŚCI --> <nav class=&quot;legal-toc&quot;> <h2>Spis treści</h2> <ol> <li><a href=&quot;#s1&quot;><span>1.</span> Administrator danych</a></li> <li><a href=&quot;#s2&quot;><span>2.</span> Cele przetwarzania</a></li> <li><a href=&quot;#s3&quot;><span>3.</span> Podstawy prawne</a></li> <li><a href=&quot;#s4&quot;><span>4.</span> Odbiorcy danych</a></li> <li><a href=&quot;#s5&quot;><span>5.</span> Okres przechowywania</a></li> <li><a href=&quot;#s6&quot;><span>6.</span> Twoje prawa</a></li> <li><a href=&quot;#s7&quot;><span>7.</span> Bezpieczeństwo</a></li> <li><a href=&quot;#s8&quot;><span>8.</span> Pliki cookies</a></li> <li><a href=&quot;#s9&quot;><span>9.</span> Zmiany polityki</a></li> <li><a href=&quot;#s10&quot;><span>10.</span> Kontakt</a></li> </ol> </nav> <!-- TREŚĆ --> <div class=&quot;legal-content&quot;> <!-- 1. Administrator --> <section id=&quot;s1&quot; class=&quot;legal-section&quot;> <h2><span class=&quot;num&quot;>1</span> Administrator danych osobowych</h2> <p>Administratorem Twoich danych osobowych jest:</p> <div class=&quot;contact-data&quot;> <h3>Administrator</h3> <div class=&quot;contact-row&quot;> <span class=&quot;label&quot;>Firma</span> <span class=&quot;value&quot;>{{COMPANY_NAME}}</span> </div> <div class=&quot;contact-row&quot;> <span class=&quot;label&quot;>Adres</span> <span class=&quot;value&quot;>{{COMPANY_ADDRESS}}</span> </div> <div class=&quot;contact-row&quot;> <span class=&quot;label&quot;>NIP</span> <span class=&quot;value&quot;>{{NIP}}</span> </div> <div class=&quot;contact-row&quot;> <span class=&quot;label&quot;>E-mail</span> <span class=&quot;value&quot;><a href=&quot;mailto:{{EMAIL}}&quot;>{{EMAIL}}</a></span> </div> <div class=&quot;contact-row&quot;> <span class=&quot;label&quot;>Telefon</span> <span class=&quot;value&quot;><a href=&quot;tel:{{PHONE}}&quot;>{{PHONE}}</a></span> </div> </div> <p>W sprawach dotyczących ochrony danych osobowych możesz kontaktować się pod adresem e-mail: <a href=&quot;mailto:{{EMAIL}}&quot;>{{EMAIL}}</a>.</p> </section> <!-- 2. Cele przetwarzania --> <section id=&quot;s2&quot; class=&quot;legal-section&quot;> <h2><span class=&quot;num&quot;>2</span> Cele przetwarzania danych</h2> <p>Twoje dane osobowe przetwarzamy w następujących celach:</p> <ol> <li><strong>Realizacja zamówień</strong> — przetwarzanie danych niezbędnych do przyjęcia i realizacji zamówienia, dostawy produktów oraz obsługi płatności.</li> <li><strong>Obsługa konta klienta</strong> — jeśli zakładasz konto w naszym sklepie, przetwarzamy dane potrzebne do jego prowadzenia.</li> <li><strong>Obsługa reklamacji i zwrotów</strong> — rozpatrywanie reklamacji, obsługa odstąpień od umowy i zwrotów.</li> <li><strong>Kontakt</strong> — odpowiadanie na Twoje zapytania przesłane przez formularz kontaktowy lub e-mail.</li> <li><strong>Newsletter</strong> — wysyłka informacji marketingowych, jeśli wyraziłeś na to zgodę.</li> <li><strong>Obowiązki prawne</strong> — wystawianie faktur, prowadzenie księgowości, przechowywanie dokumentacji podatkowej.</li> <li><strong>Dochodzenie roszczeń</strong> — ustalenie, dochodzenie lub obrona przed roszczeniami.</li> </ol> </section> <!-- 3. Podstawy prawne --> <section id=&quot;s3&quot; class=&quot;legal-section&quot;> <h2><span class=&quot;num&quot;>3</span> Podstawy prawne przetwarzania</h2> <p>Przetwarzamy Twoje dane na podstawie:</p> <table class=&quot;legal-table&quot;> <thead> <tr> <th>Cel</th> <th>Podstawa prawna (RODO)</th> </tr> </thead> <tbody> <tr> <td>Realizacja zamówienia</td> <td>Art. 6 ust. 1 lit. b — wykonanie umowy</td> </tr> <tr> <td>Obsługa reklamacji</td> <td>Art. 6 ust. 1 lit. b — wykonanie umowy</td> </tr> <tr> <td>Wystawienie faktury</td> <td>Art. 6 ust. 1 lit. c — obowiązek prawny</td> </tr> <tr> <td>Newsletter</td> <td>Art. 6 ust. 1 lit. a — Twoja zgoda</td> </tr> <tr> <td>Marketing własny</td> <td>Art. 6 ust. 1 lit. f — uzasadniony interes</td> </tr> <tr> <td>Dochodzenie roszczeń</td> <td>Art. 6 ust. 1 lit. f — uzasadniony interes</td> </tr> </tbody> </table> </section> <!-- 4. Odbiorcy danych --> <section id=&quot;s4&quot; class=&quot;legal-section&quot;> <h2><span class=&quot;num&quot;>4</span> Odbiorcy danych</h2> <p>Twoje dane mogą być przekazywane następującym kategoriom odbiorców:</p> <ul> <li><strong>Partnerzy logistyczni</strong> — w celu realizacji wysyłki i dostawy (firmy kurierskie, operatorzy logistyczni).</li> <li><strong>Operatorzy płatności</strong> — w celu obsługi płatności (np. {{PAYMENT_PROVIDER}}).</li> <li><strong>Dostawcy usług IT</strong> — hosting, oprogramowanie sklepu, narzędzia analityczne.</li> <li><strong>Biuro rachunkowe</strong> — w celu prowadzenia księgowości.</li> <li><strong>Organy państwowe</strong> — jeśli wynika to z obowiązujących przepisów prawa.</li> </ul> <div class=&quot;info-box highlight&quot;> <h3>Transfer danych poza EOG</h3> <p>W związku z realizacją zamówień, Twoje dane adresowe (imię, nazwisko, adres dostawy, telefon) mogą być przekazywane partnerom logistycznym znajdującym się poza Europejskim Obszarem Gospodarczym. Przekazanie następuje wyłącznie w celu realizacji dostawy i na podstawie standardowych klauzul umownych zatwierdzonych przez Komisję Europejską (art. 46 ust. 2 lit. c RODO).</p> </div> <div class=&quot;info-box&quot;> <p>Nie sprzedajemy Twoich danych osobowych podmiotom trzecim. Przekazujemy je tylko w zakresie niezbędnym do realizacji usług.</p> </div> </section> <!-- 5. Okres przechowywania --> <section id=&quot;s5&quot; class=&quot;legal-section&quot;> <h2><span class=&quot;num&quot;>5</span> Okres przechowywania danych</h2> <p>Przechowujemy Twoje dane przez okres niezbędny do realizacji celów:</p> <table class=&quot;legal-table&quot;> <thead> <tr> <th>Rodzaj danych</th> <th>Okres przechowywania</th> </tr> </thead> <tbody> <tr> <td>Dane zamówień</td> <td>5 lat (przepisy podatkowe)</td> </tr> <tr> <td>Dane reklamacji</td> <td>6 lat (przedawnienie roszczeń)</td> </tr> <tr> <td>Dane newslettera</td> <td>Do wycofania zgody</td> </tr> <tr> <td>Dane konta klienta</td> <td>Do usunięcia konta + 3 lata</td> </tr> <tr> <td>Dane kontaktowe (zapytania)</td> <td>1 rok od ostatniego kontaktu</td> </tr> </tbody> </table> </section> <!-- 6. Twoje prawa --> <section id=&quot;s6&quot; class=&quot;legal-section&quot;> <h2><span class=&quot;num&quot;>6</span> Twoje prawa</h2> <p>W związku z przetwarzaniem danych osobowych przysługują Ci następujące prawa:</p> <ol> <li><strong>Prawo dostępu</strong> — możesz uzyskać informacje o przetwarzaniu Twoich danych oraz ich kopię.</li> <li><strong>Prawo do sprostowania</strong> — możesz żądać poprawienia nieprawidłowych lub uzupełnienia niekompletnych danych.</li> <li><strong>Prawo do usunięcia</strong> („prawo do bycia zapomnianym&quot;) — możesz żądać usunięcia danych, gdy nie są już potrzebne do celów przetwarzania.</li> <li><strong>Prawo do ograniczenia przetwarzania</strong> — możesz żądać ograniczenia przetwarzania w określonych sytuacjach.</li> <li><strong>Prawo do przenoszenia danych</strong> — możesz otrzymać swoje dane w formacie nadającym się do odczytu maszynowego.</li> <li><strong>Prawo do sprzeciwu</strong> — możesz sprzeciwić się przetwarzaniu opartemu na uzasadnionym interesie.</li> <li><strong>Prawo do cofnięcia zgody</strong> — w każdej chwili możesz wycofać zgodę na przetwarzanie (nie wpływa to na zgodność z prawem wcześniejszego przetwarzania).</li> <li><strong>Prawo do skargi</strong> — możesz złożyć skargę do Prezesa Urzędu Ochrony Danych Osobowych (ul. Stawki 2, 00-193 Warszawa, <a href=&quot;https://uodo.gov.pl&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot;>uodo.gov.pl</a>).</li> </ol> <div class=&quot;info-box highlight&quot;> <p>Aby skorzystać ze swoich praw, skontaktuj się z nami: <a href=&quot;mailto:{{EMAIL}}&quot;>{{EMAIL}}</a></p> </div> </section> <!-- 7. Bezpieczeństwo --> <section id=&quot;s7&quot; class=&quot;legal-section&quot;> <h2><span class=&quot;num&quot;>7</span> Bezpieczeństwo danych</h2> <p>Stosujemy odpowiednie środki techniczne i organizacyjne zapewniające bezpieczeństwo danych osobowych:</p> <ul> <li><strong>Szyfrowanie SSL/TLS</strong> — połączenie ze sklepem jest szyfrowane.</li> <li><strong>Ograniczony dostęp</strong> — dostęp do danych mają tylko upoważnione osoby.</li> <li><strong>Regularne kopie zapasowe</strong> — zabezpieczenie przed utratą danych.</li> <li><strong>Bezpieczne hasła</strong> — wymóg silnych haseł dla kont.</li> </ul> </section> <!-- 8. Pliki cookies --> <section id=&quot;s8&quot; class=&quot;legal-section&quot;> <h2><span class=&quot;num&quot;>8</span> Pliki cookies (ciasteczka)</h2> <h3 style=&quot;font-size: 16px; margin: 24px 0 12px; color: var(--text-dark);&quot;>8.1 Czym są pliki cookies?</h3> <p>Pliki cookies to małe pliki tekstowe zapisywane na Twoim urządzeniu podczas korzystania z naszej strony. Pozwalają „zapamiętać&quot; Twoje działania i preferencje.</p> <div class=&quot;info-box&quot;> <p><strong>Ważne:</strong> Pliki cookies nie zawierają wirusów i nie mają dostępu do danych na Twoim urządzeniu.</p> </div> <h3 style=&quot;font-size: 16px; margin: 24px 0 12px; color: var(--text-dark);&quot;>8.2 Rodzaje plików cookies</h3> <table class=&quot;legal-table&quot;> <thead> <tr> <th>Rodzaj</th> <th>Opis</th> <th>Zgoda</th> </tr> </thead> <tbody> <tr> <td><strong>Niezbędne</strong></td> <td>Konieczne do działania strony (koszyk, logowanie, bezpieczeństwo).</td> <td>Nie wymagana</td> </tr> <tr> <td><strong>Funkcjonalne</strong></td> <td>Zapamiętują Twoje preferencje (język, region).</td> <td>Wymagana</td> </tr> <tr> <td><strong>Analityczne</strong></td> <td>Pomagają zrozumieć, jak użytkownicy korzystają ze strony.</td> <td>Wymagana</td> </tr> <tr> <td><strong>Marketingowe</strong></td> <td>Służą do wyświetlania spersonalizowanych reklam.</td> <td>Wymagana</td> </tr> </tbody> </table> <h3 style=&quot;font-size: 16px; margin: 24px 0 12px; color: var(--text-dark);&quot;>8.3 Lista używanych cookies</h3> <table class=&quot;legal-table&quot;> <thead> <tr> <th>Nazwa</th> <th>Dostawca</th> <th>Cel</th> <th>Ważność</th> </tr> </thead> <tbody> <tr> <td>cart_token</td> <td>{{DOMAIN}}</td> <td>Przechowywanie koszyka</td> <td>30 dni</td> </tr> <tr> <td>cookie_consent</td> <td>{{DOMAIN}}</td> <td>Zapamiętanie zgody</td> <td>12 mies.</td> </tr> <tr> <td>_ga, _gid</td> <td>Google Analytics</td> <td>Analiza ruchu</td> <td>2 lata / 24h</td> </tr> <tr> <td>_fbp</td> <td>Facebook</td> <td>Śledzenie konwersji</td> <td>3 mies.</td> </tr> </tbody> </table> <h3 style=&quot;font-size: 16px; margin: 24px 0 12px; color: var(--text-dark);&quot;>8.4 Podmioty trzecie</h3> <p>Na stronie używamy cookies od:</p> <ul> <li><strong>Google Analytics</strong> — analiza ruchu (<a href=&quot;https://policies.google.com/privacy&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot;>polityka prywatności</a>)</li> <li><strong>Facebook Pixel</strong> — mierzenie skuteczności reklam (<a href=&quot;https://www.facebook.com/policy.php&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot;>polityka prywatności</a>)</li> <li><strong>{{PAYMENT_PROVIDER}}</strong> — obsługa płatności</li> </ul> <h3 style=&quot;font-size: 16px; margin: 24px 0 12px; color: var(--text-dark);&quot;>8.5 Zarządzanie cookies</h3> <p>Masz pełną kontrolę nad cookies. Możesz zmienić ustawienia w przeglądarce:</p> <ul> <li><a href=&quot;https://support.google.com/chrome/answer/95647&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot;>Google Chrome</a></li> <li><a href=&quot;https://support.mozilla.org/pl/kb/ciasteczka&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot;>Mozilla Firefox</a></li> <li><a href=&quot;https://support.apple.com/pl-pl/guide/safari/sfri11471/mac&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot;>Safari</a></li> <li><a href=&quot;https://support.microsoft.com/pl-pl/microsoft-edge&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot;>Microsoft Edge</a></li> </ul> <div class=&quot;info-box&quot;> <p><strong>Uwaga:</strong> Wyłączenie niektórych cookies może wpłynąć na działanie strony (np. koszyk).</p> </div> <h3 style=&quot;font-size: 16px; margin: 24px 0 12px; color: var(--text-dark);&quot;>8.6 Zgoda na cookies</h3> <p>Przy pierwszej wizycie wyświetlamy baner informujący o cookies. Możesz zaakceptować wszystkie, dostosować lub odrzucić opcjonalne. Swoją zgodę możesz zmienić w każdej chwili.</p> </section> <!-- 9. Zmiany polityki --> <section id=&quot;s9&quot; class=&quot;legal-section&quot;> <h2><span class=&quot;num&quot;>9</span> Zmiany polityki prywatności</h2> <p>Polityka prywatności może być aktualizowana w przypadku:</p> <ul> <li>zmian w przepisach prawa,</li> <li>zmian w sposobie przetwarzania danych,</li> <li>wprowadzenia nowych funkcjonalności.</li> </ul> <p>O istotnych zmianach poinformujemy na stronie sklepu. Aktualna wersja polityki jest zawsze dostępna pod tym adresem.</p> </section> <!-- 10. Kontakt --> <section id=&quot;s10&quot; class=&quot;legal-section&quot;> <h2><span class=&quot;num&quot;>10</span> Kontakt</h2> <p>W sprawach związanych z ochroną danych osobowych możesz skontaktować się z nami:</p> <div class=&quot;contact-data&quot;> <h3>Dane kontaktowe</h3> <div class=&quot;contact-row&quot;> <span class=&quot;label&quot;>E-mail</span> <span class=&quot;value&quot;><a href=&quot;mailto:{{EMAIL}}&quot;>{{EMAIL}}</a></span> </div> <div class=&quot;contact-row&quot;> <span class=&quot;label&quot;>Adres</span> <span class=&quot;value&quot;>{{COMPANY_ADDRESS}}</span> </div> <div class=&quot;contact-row&quot;> <span class=&quot;label&quot;>Telefon</span> <span class=&quot;value&quot;><a href=&quot;tel:{{PHONE}}&quot;>{{PHONE}}</a></span> </div> </div> </section> </div> </div> <!-- FOOTER --> <footer class=&quot;legal-footer&quot;> <p>&copy; {{YEAR}} {{BRAND_NAME}}. Wszelkie prawa zastrzeżone.</p> <a href=&quot;{{MAIN_URL}}&quot; class=&quot;back-btn&quot;> <svg width=&quot;16&quot; height=&quot;16&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;> <line x1=&quot;19&quot; y1=&quot;12&quot; x2=&quot;5&quot; y2=&quot;12&quot;/> <polyline points=&quot;12 19 5 12 12 5&quot;/> </svg> Wróć do sklepu </a> </footer> </body> </html>"></iframe>
