* Section */ .legal-section { margin-bottom: 40px; padding-bottom: 40px; border-bottom: 1px solid var(--border); scroll-margin-top: 20px; } .legal-section:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; } .legal-section > h2 { font-size: 18px; font-weight: 700; color: var(--text-dark); margin-bottom: 20px; display: flex; align-items: center; gap: 12px; } .legal-section > h2 .num { display: inline-flex; align-items: center; justify-content: center; min-width: 32px; height: 32px; background: var(--primary-soft); color: var(--primary); font-size: 13px; font-weight: 700; border-radius: var(--radius); } /* Typography */ .legal-section p { margin-bottom: 16px; } .legal-section p:last-child { margin-bottom: 0; } /* Lists */ .legal-section ol, .legal-section ul { margin: 16px 0; padding-left: 24px; } .legal-section li { margin-bottom: 10px; padding-left: 4px; } .legal-section li:last-child { margin-bottom: 0; } .legal-section ul { list-style: disc; } .legal-section ul ul { list-style: circle; margin: 8px 0; } /* Nested lists */ .legal-section li > ul, .legal-section li > ol { margin-top: 8px; } /* Strong */ strong { color: var(--text-dark); font-weight: 600; } /* ══════════════════════════════════════════════════════════════ SPECIAL BLOCKS ══════════════════════════════════════════════════════════════ */ /* Info box */ .info-box { background: var(--bg-lighter); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin: 20px 0; } .info-box.highlight { background: var(--primary-soft); border-color: rgba(37, 99, 235, 0.2); } .info-box.warning { background: #fef3c7; border-color: #fcd34d; } .info-box h3 { font-size: 14px; font-weight: 600; color: var(--text-dark); margin-bottom: 12px; display: flex; align-items: center; gap: 8px; } .info-box p { margin: 0; font-size: 14px; } /* Contact data */ .contact-data { background: var(--bg-lighter); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin: 16px 0; } .contact-data h3 { font-size: 13px; font-weight: 600; color: var(--text-dark); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; } .contact-row { display: flex; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 14px; } .contact-row:last-child { border-bottom: none; } .contact-row .label { width: 100px; flex-shrink: 0; color: var(--text-muted); font-weight: 500; } .contact-row .value { color: var(--text-dark); } /* Table */ .legal-table { width: 100%; border-collapse: collapse; margin: 16px 0; font-size: 14px; } .legal-table th, .legal-table td { padding: 12px; text-align: left; border: 1px solid var(--border); } .legal-table th { background: var(--bg-lighter); font-weight: 600; color: var(--text-dark); font-size: 13px; } .legal-table tr:hover td { background: var(--bg-light); } /* ══════════════════════════════════════════════════════════════ FOOTER ══════════════════════════════════════════════════════════════ */ .legal-footer { text-align: center; padding: 40px 24px; border-top: 1px solid var(--border); background: var(--bg-white); margin-top: 60px; } .legal-footer p { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; } .legal-footer .back-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: var(--text-dark); color: #fff; border-radius: 100px; font-size: 14px; font-weight: 500; transition: background 0.2s; } .legal-footer .back-btn:hover { background: var(--primary); text-decoration: none; } /* ══════════════════════════════════════════════════════════════ RESPONSIVE ══════════════════════════════════════════════════════════════ */ @media (max-width: 600px) { .legal-toc ol { columns: 1; } .legal-content { padding: 24px 20px; } .contact-row { flex-direction: column; gap: 2px; } .contact-row .label { width: auto; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; } .legal-table { font-size: 13px; } .legal-table th, .legal-table td { padding: 8px; } } /* Print */ @media print { .legal-header { padding: 24px; } .legal-toc { break-after: page; } .legal-section { break-inside: avoid; } .legal-footer { display: none; } } </style> </head> <body> <!-- HEADER --> <header class=&quot;legal-header&quot;> <div class=&quot;brand&quot;>{{BRAND_NAME}}</div> <h1>Regulamin Sklepu Internetowego</h1> <p class=&quot;subtitle&quot;>{{DOMAIN}}</p> <div class=&quot;meta&quot;> <svg viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;> <rect x=&quot;3&quot; y=&quot;4&quot; width=&quot;18&quot; height=&quot;18&quot; rx=&quot;2&quot;/> <line x1=&quot;16&quot; y1=&quot;2&quot; x2=&quot;16&quot; y2=&quot;6&quot;/> <line x1=&quot;8&quot; y1=&quot;2&quot; x2=&quot;8&quot; y2=&quot;6&quot;/> <line x1=&quot;3&quot; y1=&quot;10&quot; x2=&quot;21&quot; y2=&quot;10&quot;/> </svg> Aktualizacja: {{UPDATE_DATE}} </div> </header> <!-- CONTENT --> <div class=&quot;legal-container&quot;> <!-- SPIS TREŚCI --> <nav class=&quot;legal-toc&quot;> <h2>Spis treści</h2> <ol> <li><a href=&quot;#s1&quot;><span>§1</span> Postanowienia ogólne</a></li> <li><a href=&quot;#s2&quot;><span>§2</span> Definicje</a></li> <li><a href=&quot;#s3&quot;><span>§3</span> Usługi elektroniczne</a></li> <li><a href=&quot;#s4&quot;><span>§4</span> Składanie zamówień</a></li> <li><a href=&quot;#s5&quot;><span>§5</span> Ceny i płatności</a></li> <li><a href=&quot;#s6&quot;><span>§6</span> Dostawa</a></li> <li><a href=&quot;#s7&quot;><span>§7</span> Prawo odstąpienia</a></li> <li><a href=&quot;#s8&quot;><span>§8</span> Reklamacje</a></li> <li><a href=&quot;#s9&quot;><span>§9</span> Pozasądowe spory</a></li> <li><a href=&quot;#s10&quot;><span>§10</span> Postanowienia końcowe</a></li> <li><a href=&quot;#zalacznik&quot;><span>Zał.</span> Formularz odstąpienia</a></li> </ol> </nav> <!-- TREŚĆ --> <div class=&quot;legal-content&quot;> <!-- §1 --> <section id=&quot;s1&quot; class=&quot;legal-section&quot;> <h2><span class=&quot;num&quot;>§1</span> Postanowienia ogólne</h2> <ol> <li>Niniejszy Regulamin określa zasady korzystania ze sklepu internetowego <strong>{{DOMAIN}}</strong>.</li> <li>Sklep internetowy prowadzony jest przez: <div class=&quot;contact-data&quot;> <h3>Dane Sprzedawcy</h3> <div class=&quot;contact-row&quot;> <span class=&quot;label&quot;>Firma</span> <span class=&quot;value&quot;>{{COMPANY_NAME}}</span> </div> <div class=&quot;contact-row&quot;> <span class=&quot;label&quot;>Adres</span> <span class=&quot;value&quot;>{{COMPANY_ADDRESS}}</span> </div> <div class=&quot;contact-row&quot;> <span class=&quot;label&quot;>NIP</span> <span class=&quot;value&quot;>{{NIP}}</span> </div> <div class=&quot;contact-row&quot;> <span class=&quot;label&quot;>REGON</span> <span class=&quot;value&quot;>{{REGON}}</span> </div> <div class=&quot;contact-row&quot;> <span class=&quot;label&quot;>E-mail</span> <span class=&quot;value&quot;><a href=&quot;mailto:{{EMAIL}}&quot;>{{EMAIL}}</a></span> </div> <div class=&quot;contact-row&quot;> <span class=&quot;label&quot;>Telefon</span> <span class=&quot;value&quot;><a href=&quot;tel:{{PHONE}}&quot;>{{PHONE}}</a></span> </div> </div> </li> <li>Regulamin jest udostępniany nieodpłatnie na stronie Sklepu w sposób umożliwiający jego pobranie, utrwalenie i wydrukowanie.</li> <li>Korzystanie ze Sklepu wymaga akceptacji niniejszego Regulaminu.</li> </ol> </section> <!-- §2 --> <section id=&quot;s2&quot; class=&quot;legal-section&quot;> <h2><span class=&quot;num&quot;>§2</span> Definicje</h2> <p>Użyte w Regulaminie pojęcia oznaczają:</p> <ol> <li><strong>Sprzedawca</strong> — {{COMPANY_NAME}}, {{COMPANY_ADDRESS}}, NIP: {{NIP}}.</li> <li><strong>Sklep</strong> — sklep internetowy dostępny pod adresem {{DOMAIN}}.</li> <li><strong>Klient</strong> — osoba fizyczna, prawna lub jednostka organizacyjna korzystająca ze Sklepu.</li> <li><strong>Konsument</strong> — osoba fizyczna dokonująca czynności prawnej niezwiązanej z działalnością gospodarczą lub zawodową.</li> <li><strong>Przedsiębiorca na prawach konsumenta</strong> — osoba fizyczna prowadząca działalność gospodarczą, zawierająca umowę nieposiadającą dla niej charakteru zawodowego.</li> <li><strong>Produkt</strong> — rzecz ruchoma dostępna w Sklepie, będąca przedmiotem umowy sprzedaży.</li> <li><strong>Zamówienie</strong> — oświadczenie woli Klienta zmierzające do zawarcia umowy sprzedaży.</li> <li><strong>Dzień roboczy</strong> — dni od poniedziałku do piątku, z wyłączeniem dni ustawowo wolnych od pracy.</li> </ol> </section> <!-- §3 --> <section id=&quot;s3&quot; class=&quot;legal-section&quot;> <h2><span class=&quot;num&quot;>§3</span> Usługi świadczone drogą elektroniczną</h2> <ol> <li>Sprzedawca świadczy następujące usługi elektroniczne: <ul> <li>możliwość składania zamówień na Produkty,</li> <li>formularz kontaktowy,</li> <li>newsletter (po wyrażeniu odrębnej zgody).</li> </ul> </li> <li>Korzystanie ze Sklepu wymaga: <ul> <li>urządzenia z dostępem do Internetu,</li> <li>przeglądarki obsługującej JavaScript i pliki cookies,</li> <li>aktywnego adresu e-mail.</li> </ul> </li> <li>Usługi elektroniczne są świadczone nieodpłatnie.</li> </ol> </section> <!-- §4 --> <section id=&quot;s4&quot; class=&quot;legal-section&quot;> <h2><span class=&quot;num&quot;>§4</span> Składanie zamówień</h2> <ol> <li>Zamówienia można składać 24 godziny na dobę, 7 dni w tygodniu.</li> <li>W celu złożenia zamówienia należy: <ul> <li>wybrać Produkt i dodać go do koszyka,</li> <li>wypełnić formularz zamówienia (dane do wysyłki),</li> <li>wybrać sposób dostawy i płatności,</li> <li>zaakceptować Regulamin,</li> <li>kliknąć przycisk „Zamówienie z obowiązkiem zapłaty&quot;.</li> </ul> </li> <li>Po złożeniu zamówienia Klient otrzymuje potwierdzenie na adres e-mail.</li> <li>Umowa sprzedaży zostaje zawarta z chwilą potwierdzenia przyjęcia zamówienia.</li> </ol> </section> <!-- §5 --> <section id=&quot;s5&quot; class=&quot;legal-section&quot;> <h2><span class=&quot;num&quot;>§5</span> Ceny i płatności</h2> <ol> <li>Wszystkie ceny w Sklepie są cenami brutto (zawierają VAT) i wyrażone są w złotych polskich (PLN).</li> <li>Cena Produktu nie zawiera kosztów dostawy, które są podawane przed złożeniem zamówienia.</li> <li> <div class=&quot;info-box highlight&quot;> <p><strong>Informacja o obniżkach cen:</strong> Przy promocjach obok ceny promocyjnej podajemy najniższą cenę z ostatnich 30 dni przed obniżką (Dyrektywa Omnibus).</p> </div> </li> <li>Dostępne metody płatności: <ul> <li>płatność online (karty, BLIK, przelewy) — {{PAYMENT_PROVIDER}},</li> <li>przelew tradycyjny.</li> </ul> </li> <li>Realizacja zamówienia rozpoczyna się po zaksięgowaniu wpłaty.</li> </ol> </section> <!-- §6 --> <section id=&quot;s6&quot; class=&quot;legal-section&quot;> <h2><span class=&quot;num&quot;>§6</span> Dostawa</h2> <ol> <li>Dostawa realizowana jest na terytorium Polski.</li> <li> <div class=&quot;info-box highlight&quot;> <p><strong>Informacja o wysyłce:</strong> Produkty wysyłane są z magazynu zagranicznego. Czas dostawy jest dłuższy niż w przypadku wysyłki krajowej.</p> </div> </li> <li>Szacowane czasy dostawy: <table class=&quot;legal-table&quot;> <thead> <tr> <th>Parametr</th> <th>Wartość</th> </tr> </thead> <tbody> <tr> <td>Typowy czas dostawy</td> <td><strong>{{DELIVERY_TIME_TYPICAL}}</strong></td> </tr> <tr> <td>Maksymalny czas dostawy</td> <td>{{DELIVERY_TIME_MAX}}</td> </tr> <tr> <td>Koszt dostawy</td> <td>{{DELIVERY_COST}}</td> </tr> </tbody> </table> </li> <li>Czas dostawy liczony jest od momentu wysyłki Produktu. W większości przypadków przesyłki docierają w ciągu {{DELIVERY_TIME_TYPICAL}}.</li> <li><strong>Cło i podatki:</strong> Produkty są wysyłane z magazynu zagranicznego. VAT jest rozliczany w ramach systemu IOSS przez platformę realizującą wysyłkę: <ul> <li>VAT jest już <strong>wliczony w cenę produktu</strong>,</li> <li>Klient <strong>nie ponosi dodatkowych opłat</strong> przy odbiorze przesyłki,</li> <li>przesyłki o wartości do 150 EUR są zwolnione z cła.</li> </ul> </li> <li>Po wysyłce Klient otrzymuje numer śledzenia przesyłki na adres e-mail.</li> </ol> </section> <!-- §7 --> <section id=&quot;s7&quot; class=&quot;legal-section&quot;> <h2><span class=&quot;num&quot;>§7</span> Prawo odstąpienia od umowy</h2> <div class=&quot;info-box warning&quot;> <p><strong>Konsument ma prawo odstąpić od umowy w terminie 14 dni bez podania przyczyny.</strong></p> </div> <ol> <li>Konsument może odstąpić od umowy w terminie <strong>14 dni</strong> od dnia otrzymania Produktu (nie od dnia zamówienia).</li> <li>Aby odstąpić od umowy, należy poinformować Sprzedawcę: <ul> <li>pisemnie: {{COMPANY_ADDRESS}}</li> <li>e-mailem: {{EMAIL}}</li> </ul> </li> <li>Do zachowania terminu wystarczy wysłanie oświadczenia przed jego upływem.</li> <li><strong>Skutki odstąpienia:</strong> <ul> <li>Sprzedawca zwraca wszystkie płatności, w tym koszty dostawy (najtańszej oferowanej),</li> <li>zwrot następuje w terminie 14 dni od otrzymania zwróconego Produktu,</li> <li>Konsument ponosi bezpośrednie koszty zwrotu Produktu.</li> </ul> </li> <li><strong>Adres do zwrotów:</strong> <div class=&quot;contact-data&quot;> <div class=&quot;contact-row&quot;> <span class=&quot;label&quot;>Adres</span> <span class=&quot;value&quot;>{{RETURN_ADDRESS}}</span> </div> </div> <p style=&quot;margin-top: 8px; font-size: 14px; color: var(--text-muted);&quot;>Zwroty należy wysyłać na powyższy adres w Polsce. <strong>Nie wysyłaj produktów za granicę</strong> — takie przesyłki nie zostaną przyjęte.</p> </li> <li>Produkt należy odesłać w terminie 14 dni od odstąpienia.</li> </ol> <p><strong>Prawo odstąpienia nie przysługuje przy:</strong></p> <ul> <li>produktach personalizowanych (na zamówienie),</li> <li>produktach szybko psujących się,</li> <li>produktach w zapieczętowanym opakowaniu, otwartym po dostawie (higiena),</li> <li>produktach nierozłącznie połączonych z innymi.</li> </ul> </section> <!-- §8 --> <section id=&quot;s8&quot; class=&quot;legal-section&quot;> <h2><span class=&quot;num&quot;>§8</span> Reklamacje — niezgodność towaru z umową</h2> <div class=&quot;info-box&quot;> <p><strong>Ważne:</strong> To Sprzedawca ({{COMPANY_NAME}}) odpowiada za jakość Produktu wobec Klienta — niezależnie od miejsca produkcji czy wysyłki. Wszelkie roszczenia kieruj wyłącznie do Sprzedawcy.</p> </div> <ol> <li>Sprzedawca odpowiada za brak zgodności Produktu z umową przez <strong>2 lata</strong> od dostarczenia (rękojmia).</li> <li>Produkt jest niezgodny z umową, gdy: <ul> <li>nie odpowiada opisowi, rodzajowi, ilości lub jakości,</li> <li>nie nadaje się do celu wskazanego przez Konsumenta,</li> <li>nie ma właściwości typowych dla produktów tego rodzaju,</li> <li>nie jest kompletny (brak akcesoriów, instrukcji).</li> </ul> </li> <li><strong>Uprawnienia Konsumenta:</strong> <ul> <li>naprawa Produktu,</li> <li>wymiana na nowy,</li> <li>obniżenie ceny,</li> <li>odstąpienie od umowy (przy istotnej wadzie).</li> </ul> </li> <li>Reklamację można złożyć: <ul> <li>pisemnie: {{COMPANY_ADDRESS}}</li> <li>e-mailem: {{EMAIL}}</li> </ul> </li> <li>Sprzedawca rozpatrzy reklamację w terminie <strong>14 dni</strong>. Brak odpowiedzi = uznanie reklamacji.</li> <li>Koszty naprawy/wymiany ponosi Sprzedawca.</li> <li><strong>Adres do reklamacji:</strong> {{RETURN_ADDRESS}} (ten sam co do zwrotów).</li> </ol> </section> <!-- §9 --> <section id=&quot;s9&quot; class=&quot;legal-section&quot;> <h2><span class=&quot;num&quot;>§9</span> Pozasądowe rozwiązywanie sporów</h2> <ol> <li>Konsument może skorzystać z: <ul> <li>mediacji Wojewódzkich Inspektoratów Inspekcji Handlowej,</li> <li>pomocy rzeczników konsumentów,</li> <li>stałych polubownych sądów konsumenckich.</li> </ul> </li> <li>Informacje: <a href=&quot;https://www.uokik.gov.pl&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot;>www.uokik.gov.pl</a></li> <li>Platforma ODR: <a href=&quot;https://ec.europa.eu/consumers/odr&quot; target=&quot;_blank&quot; rel=&quot;noopener&quot;>https://ec.europa.eu/consumers/odr</a></li> </ol> </section> <!-- §10 --> <section id=&quot;s10&quot; class=&quot;legal-section&quot;> <h2><span class=&quot;num&quot;>§10</span> Postanowienia końcowe</h2> <ol> <li>W sprawach nieuregulowanych stosuje się przepisy prawa polskiego, w szczególności ustawę o prawach konsumenta, ustawę o świadczeniu usług drogą elektroniczną oraz Kodeks cywilny.</li> <li>Sprzedawca może zmienić Regulamin z ważnych przyczyn (zmiany prawa, funkcjonowania Sklepu).</li> <li>O zmianach Klienci zostaną poinformowani z 14-dniowym wyprzedzeniem.</li> <li>Do zamówień złożonych przed zmianami stosuje się Regulamin obowiązujący w chwili zamówienia.</li> <li>Regulamin wchodzi w życie dnia {{UPDATE_DATE}}.</li> </ol> </section> <!-- ZAŁĄCZNIK: FORMULARZ ODSTĄPIENIA --> <section id=&quot;zalacznik&quot; class=&quot;legal-section&quot; style=&quot;margin-top: 60px; padding-top: 40px; border-top: 2px solid var(--border-dark);&quot;> <h2 style=&quot;font-size: 20px;&quot;><span class=&quot;num&quot;>Zał.</span> Formularz odstąpienia od umowy</h2> <p style=&quot;margin-bottom: 24px; color: var(--text-muted);&quot;>Wzór zgodny z ustawą o prawach konsumenta. Wypełnij i wyślij tylko jeśli chcesz odstąpić od umowy.</p> <div class=&quot;contact-data&quot; style=&quot;margin-bottom: 24px;&quot;> <h3>Adresat (Sprzedawca)</h3> <div class=&quot;contact-row&quot;> <span class=&quot;label&quot;>Firma</span> <span class=&quot;value&quot;>{{COMPANY_NAME}}</span> </div> <div class=&quot;contact-row&quot;> <span class=&quot;label&quot;>Adres</span> <span class=&quot;value&quot;>{{COMPANY_ADDRESS}}</span> </div> <div class=&quot;contact-row&quot;> <span class=&quot;label&quot;>E-mail</span> <span class=&quot;value&quot;>{{EMAIL}}</span> </div> <div class=&quot;contact-row&quot;> <span class=&quot;label&quot;>Telefon</span> <span class=&quot;value&quot;>{{PHONE}}</span> </div> </div> <div style=&quot;background: var(--bg-lighter); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 24px;&quot;> <p style=&quot;margin-bottom: 16px;&quot;> Ja/My(*) niniejszym informuję/informujemy(*) o moim/naszym(*) odstąpieniu od umowy sprzedaży następujących towarów(*): </p> <div style=&quot;margin-bottom: 16px;&quot;> <label style=&quot;display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px;&quot;>Nazwa/opis towaru:</label> <div style=&quot;border-bottom: 1px solid var(--border); height: 32px;&quot;></div> </div> <div style=&quot;display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;&quot;> <div> <label style=&quot;display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px;&quot;>Numer zamówienia:</label> <div style=&quot;border-bottom: 1px solid var(--border); height: 32px;&quot;></div> </div> <div> <label style=&quot;display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px;&quot;>Data odbioru towaru:</label> <div style=&quot;border-bottom: 1px solid var(--border); height: 32px;&quot;></div> </div> </div> <div style=&quot;margin-bottom: 16px;&quot;> <label style=&quot;display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px;&quot;>Imię i nazwisko konsumenta:</label> <div style=&quot;border-bottom: 1px solid var(--border); height: 32px;&quot;></div> </div> <div style=&quot;margin-bottom: 16px;&quot;> <label style=&quot;display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px;&quot;>Adres konsumenta:</label> <div style=&quot;border-bottom: 1px solid var(--border); height: 32px;&quot;></div> </div> <div style=&quot;margin-bottom: 24px;&quot;> <label style=&quot;display: block; font-size: 13px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px;&quot;>Numer konta do zwrotu (opcjonalnie):</label> <div style=&quot;border-bottom: 1px solid var(--border); height: 32px;&quot;></div> <p style=&quot;font-size: 12px; color: var(--text-muted); margin-top: 4px;&quot;>Jeśli płaciłeś kartą/BLIK, zwrot nastąpi tą samą metodą.</p> </div> <div style=&quot;display: grid; grid-template-columns: 1fr 1fr; gap: 32px; padding-top: 16px; border-top: 1px solid var(--border);&quot;> <div style=&quot;text-align: center;&quot;> <div style=&quot;border-bottom: 1px solid var(--border); height: 48px; margin-bottom: 8px;&quot;></div> <p style=&quot;font-size: 12px; color: var(--text-muted);&quot;>Data</p> </div> <div style=&quot;text-align: center;&quot;> <div style=&quot;border-bottom: 1px solid var(--border); height: 48px; margin-bottom: 8px;&quot;></div> <p style=&quot;font-size: 12px; color: var(--text-muted);&quot;>Podpis konsumenta(*)</p> </div> </div> <p style=&quot;font-size: 12px; color: var(--text-muted); margin-top: 16px; text-align: center;&quot;>(*) Niepotrzebne skreślić. Podpis wymagany tylko przy wersji papierowej.</p> </div> <div class=&quot;info-box&quot;> <h3>Jak złożyć odstąpienie?</h3> <p>Wyślij wypełniony formularz e-mailem na <a href=&quot;mailto:{{EMAIL}}&quot;>{{EMAIL}}</a> lub pocztą na adres: {{COMPANY_ADDRESS}}</p> <p style=&quot;margin-top: 8px;&quot;><strong>Adres do zwrotu produktu:</strong> {{RETURN_ADDRESS}}</p> <p style=&quot;margin-top: 4px; font-size: 13px;&quot;>Zwroty wysyłaj tylko na adres w Polsce. Przesyłki zagraniczne nie zostaną przyjęte.</p> </div> </section> </div> </div> <!-- FOOTER --> <footer class=&quot;legal-footer&quot;> <p>&copy; {{YEAR}} {{BRAND_NAME}}. Wszelkie prawa zastrzeżone.</p> <a href=&quot;{{MAIN_URL}}&quot; class=&quot;back-btn&quot;> <svg width=&quot;16&quot; height=&quot;16&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot; stroke=&quot;currentColor&quot; stroke-width=&quot;2&quot;> <line x1=&quot;19&quot; y1=&quot;12&quot; x2=&quot;5&quot; y2=&quot;12&quot;/> <polyline points=&quot;12 19 5 12 12 5&quot;/> </svg> Wróć do sklepu </a> </footer> </body> </html>"></iframe>
