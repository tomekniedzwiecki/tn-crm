<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Przenoszę do rozmowy… | Stworzę</title>
    <meta name="robots" content="noindex, nofollow">
    <!-- Panel projektu zlikwidowany (2026-06-12): karta, ekrany i współpraca
         żyją w zakładkach OBOK rozmowy (sidebar w sparingu). Stare linki
         z historii rozmów przekierowujemy do właściwej sesji czatu. -->
    <script>
        (function () {
            var id = new URLSearchParams(location.search).get('id') || '';
            var url = 'https://tomekniedzwiecki.pl/stworze/sparing/' +
                (/^[0-9a-f-]{36}$/i.test(id) ? '?id=' + encodeURIComponent(id) : '');
            location.replace(url);
        })();
    </script>
    <style>body{background:#000;color:#8b8f98;font:15px/1.6 system-ui;display:grid;place-items:center;min-height:100vh;margin:0}</style>
</head>
<body>
    <p>Przenoszę do rozmowy… <a href="https://tomekniedzwiecki.pl/stworze/sparing/" style="color:#4d9fff">kliknij, jeśli nic się nie dzieje</a></p>
</body>
</html>
