<!--
============================================================================
MODUŁ KANONICZNY: wideo-rail@1
ŹRÓDŁO:   loczek@8726382b (2026-07-17) — sekcja #wideo (ostatni dobry wzorzec)
ROLA:     rail UGC-wideo (pionowe kafle 9:16), mobile=flex peek 68% + kropki,
          desktop=grid repeat(4,1fr); IntersectionObserver-autoplay, dźwięk
          wykluczający (jeden gra głośno), lazy <video> tworzone dopiero na akcję.

────────────────────────────────────────────────────────────────────────────
KONTRAKT SKÓROWANIA (co WOLNO zmienić):
  • TYLKO tokeny/kolory/promienie/cienie: var(--cta), var(--paper-2), var(--ink),
    var(--body), var(--line), border-radius, box-shadow, font-family nagłówka.
  • Liczba kafli N: dostosuj markup (li.vid__tile) i kropki (button.vid__dot) —
    ALE desktop grid MUSI mieć DOKŁADNIE tyle kolumn ile kafli, przez
    `grid-template-columns: repeat(N, 1fr)`. Dla N=4 zostaw repeat(4,1fr).

CO JEST NIETYKALNE (mechanika i proporcje — NIE RUSZAĆ):
  • flex: 0 0 68% + scroll-snap na mobile (peek następnego kafla),
  • aspect-ratio: 9/16 na .vid__card (proporcja kafla),
  • grid-template-columns: repeat(N,1fr) na desktop (RÓWNE kolumny),
  • cały JS (IO-autoplay, unmute-exclusive, kropki, klawiatura, a11y).

⛔ ZAKAZANY ANTY-WZORZEC (slivery Odpalaka, incydent 17.07):
     .vid__grid{ grid-auto-flow:column; grid-auto-columns:1fr }
  Przy grid-auto-flow:column każdy kafel tworzy WŁASNĄ ścieżkę 1fr — 6 kafli =
  6 wąskich slverów zamiast 4 czytelnych. ZAWSZE `grid-template-columns:repeat(N,1fr)`
  z jawnym N. Jeżeli dobierasz N≠4 — zmień N w repeat, NIGDY nie wracaj do auto-flow.
============================================================================
-->
<section id="wideo" class="sect-pad" aria-labelledby="vid-h">
  <style>
    #wideo {
      position: relative;
      overflow: hidden;
      background: var(--paper-2);
      color: var(--ink);
    }

    #wideo .vid__head {
      position: relative;
      margin-bottom: clamp(28px, 5vw, 56px);
    }

    #wideo .vid__eyebrow {
      position: relative;
      display: inline-block;
      margin: 0 0 18px;
      color: var(--ink);
    }

    #wideo .vid__eyebrow::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -7px;
      width: 54px;
      height: 1px;
      background: var(--cta);
    }

    #wideo .vid__title-wrap {
      position: relative;
      isolation: isolate;
    }

    #wideo .vid__title {
      position: relative;
      z-index: 1;
      margin: 0;
      color: var(--ink);
      line-height: .95;
    }

    #wideo .vid__sub {
      position: relative;
      z-index: 1;
      max-width: 460px;
      margin: 14px 0 0;
      color: var(--body);
      font-family: inherit;
      font-size: clamp(16px, 2vw, 19px);
      line-height: 1.55;
    }

    #wideo .vid__swash {
      position: absolute;
      z-index: 0;
      top: 24%;
      right: 1%;
      width: 130px;
      height: auto;
      color: var(--cta);
      opacity: .28;
      pointer-events: none;
      transform: translateY(-50%);
    }

    /* ── MOBILE: rail z peekiem następnego kafla (NIE RUSZAĆ proporcji 68%) ── */
    #wideo .vid__grid {
      display: flex;
      gap: 14px;
      margin: 0;
      padding: 0;
      overflow-x: auto;
      list-style: none;
      scroll-padding: 0 16px;
      scroll-snap-type: x mandatory;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    #wideo .vid__grid::-webkit-scrollbar {
      display: none;
    }

    #wideo .vid__tile {
      flex: 0 0 68%;
      min-width: 0;
      scroll-snap-align: center;
    }

    #wideo .vid__card {
      position: relative;
      width: 100%;
      aspect-ratio: 9 / 16;
      overflow: hidden;
      border: 1px solid rgba(241, 87, 58, .2);
      border-radius: 18px;
      box-shadow: 0 18px 40px -24px rgba(58, 42, 46, .25);
      cursor: pointer;
      outline: none;
      transform: translateZ(0);
      transition: transform .28s ease, box-shadow .28s ease;
    }

    #wideo .vid__card:focus-visible,
    #wideo .vid__mute:focus-visible,
    #wideo .vid__dot:focus-visible {
      outline: 3px solid var(--cta);
      outline: 3px solid color-mix(in srgb, var(--cta) 45%, transparent);
      outline-offset: 3px;
    }

    #wideo .vid__poster,
    #wideo .vid__card video {
      position: absolute;
      inset: 0;
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #wideo .vid__card video {
      z-index: 1;
    }

    #wideo .vid__poster {
      z-index: 2;
      transition: opacity .28s ease;
    }

    #wideo .vid__card.is-playing .vid__poster {
      opacity: 0;
      pointer-events: none;
    }

    #wideo .vid__play {
      position: absolute;
      z-index: 5;
      top: 50%;
      left: 50%;
      display: grid;
      width: 62px;
      height: 62px;
      place-items: center;
      border: 2px solid var(--cta);
      border-radius: 50%;
      background: white;
      box-shadow: 0 12px 28px rgba(80, 45, 39, .18);
      pointer-events: none;
      transform: translate(-50%, -50%);
      transition: opacity .22s ease, transform .22s ease;
    }

    #wideo .vid__play svg {
      width: 23px;
      height: 23px;
      margin-left: 4px;
      color: var(--ink);
    }

    #wideo .vid__card.is-playing .vid__play {
      opacity: 0;
      transform: translate(-50%, -50%) scale(.82);
    }

    #wideo .vid__cap {
      position: absolute;
      z-index: 3;
      right: 0;
      bottom: 0;
      left: 0;
      min-height: 122px;
      padding: 58px 58px 50px 14px;
      color: white;
      background: linear-gradient(to top, rgba(43, 25, 20, .62), transparent);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.3;
      text-shadow: 0 1px 6px rgba(43, 25, 20, .6);
      pointer-events: none;
    }

    #wideo .vid__author {
      position: absolute;
      z-index: 5;
      left: 14px;
      bottom: 16px;
      max-width: calc(100% - 76px);
      overflow: hidden;
      color: white;
      font-size: 12px;
      line-height: 1.2;
      text-overflow: ellipsis;
      text-shadow: 0 1px 5px rgba(43, 25, 20, .75);
      white-space: nowrap;
      pointer-events: none;
    }

    #wideo .vid__mute {
      position: absolute;
      z-index: 6;
      right: 12px;
      bottom: 12px;
      display: grid;
      width: 44px;
      min-width: 44px;
      height: 44px;
      min-height: 44px;
      padding: 0;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, .22);
      border-radius: 50%;
      color: white;
      background: rgba(43, 25, 20, .55);
      box-shadow: 0 8px 20px rgba(43, 25, 20, .16);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #wideo .vid__mute svg {
      width: 21px;
      height: 21px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-width: 1.8;
      pointer-events: none;
    }

    #wideo .vid__mute .vid__sound-on {
      display: none;
    }

    #wideo .vid__mute[data-muted="false"] .vid__sound-off {
      display: none;
    }

    #wideo .vid__mute[data-muted="false"] .vid__sound-on {
      display: block;
    }

    #wideo .vid__dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 20px;
    }

    #wideo .vid__dot {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      padding: 0;
      border: 0;
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
    }

    #wideo .vid__dot::before {
      content: "";
      display: block;
      width: 7px;
      height: 7px;
      margin: auto;
      border-radius: 50%;
      background: var(--line);
      transition: width .2s ease, border-radius .2s ease, background .2s ease;
    }

    #wideo .vid__dot.is-active::before {
      width: 18px;
      border-radius: 999px;
      background: var(--cta);
    }

    /* ── DESKTOP: RÓWNE kolumny. ⛔ NIGDY grid-auto-flow:column + grid-auto-columns:1fr ── */
    @media (min-width: 768px) {
      #wideo .vid__swash {
        top: 35%;
        right: 4%;
        width: clamp(260px, 34vw, 500px);
        opacity: .5;
      }

      #wideo .vid__grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);   /* N kafli = repeat(N,1fr); NIE auto-flow */
        gap: clamp(12px, 1.5vw, 20px);
        overflow: visible;
      }

      #wideo .vid__tile {
        width: auto;
      }

      #wideo .vid__card:hover,
      #wideo .vid__card.is-playing {
        z-index: 2;
        box-shadow: var(--shadow-lg);
        transform: scale(1.03);
      }

      #wideo .vid__mute {
        width: 40px;
        min-width: 40px;
        height: 40px;
        min-height: 40px;
      }

      #wideo .vid__dots {
        display: none;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #wideo .vid__card,
      #wideo .vid__poster,
      #wideo .vid__play,
      #wideo .vid__dot::before {
        transition: none;
      }

      #wideo .vid__card:hover,
      #wideo .vid__card.is-playing {
        transform: none;
      }
    }
  </style>

  <div class="wrap">
    <header class="vid__head">
      <p class="eyebrow vid__eyebrow">{{EYEBROW}}</p>
      <div class="vid__title-wrap">
        <h2 id="vid-h" class="h2 vid__title">{{TYTUL}}</h2>
        <svg class="vid__swash" viewBox="0 0 560 150" aria-hidden="true" focusable="false">
          <path d="M4 88C88 9 154 18 220 84s132 80 194 22 92-69 142-43" fill="none" stroke="currentColor" stroke-width="2"/>
          <path d="M5 99C92 20 154 31 218 94s128 73 193 13 95-67 145-31" fill="none" stroke="currentColor" stroke-width="1.4"/>
          <path d="M18 76C92 3 160 10 229 72s132 75 194 17 88-58 127-43" fill="none" stroke="currentColor" stroke-width="1"/>
        </svg>
      </div>
      <p class="vid__sub">{{PODTYTUL}}</p>
    </header>

    <!-- N kafli. Desktop grid = repeat(N,1fr) → tyle kolumn ile kafli. -->
    <ul class="vid__grid" role="list">
      <li class="vid__tile" role="listitem">
        <div class="vid__card" role="button" tabindex="0" aria-label="Odtwórz wideo — {{AUTOR_1}}" data-src="{{MP4_1}}" data-poster="{{POSTER_1}}" data-author="{{AUTOR_1}}">
          <img class="vid__poster" src="{{POSTER_1}}" alt="{{ALT_1}}" loading="lazy" decoding="async" width="720" height="1280">
          <span class="vid__play" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M7 4.8v14.4L19 12 7 4.8Z" fill="currentColor"/></svg>
          </span>
          <span class="vid__cap">{{CAP_1}}</span>
          <span class="vid__author">{{AUTOR_1}}</span>
          <button class="vid__mute" type="button" aria-label="Włącz dźwięk" data-muted="true">
            <svg class="vid__sound-off" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9v6h4l5 4V5L8 9H4Z"/><path d="m17 9 4 4m0-4-4 4"/></svg>
            <svg class="vid__sound-on" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 9v6h4l5 4V5L8 9H4Z"/><path d="M16.5 9.5a4 4 0 0 1 0 5M19 7a7 7 0 0 1 0 10"/></svg>
          </button>
        </div>
      </li>
      <!-- ...powtórz <li.vid__tile> dla każdego kafla (2..N)... -->
    </ul>

    <!-- kropki: po jednej na kafel (mobile); desktop je ukrywa -->
    <div class="vid__dots" aria-label="Wybierz wideo">
      <button class="vid__dot is-active" type="button" data-index="0" aria-label="Pokaż wideo 1" aria-current="true"></button>
      <!-- ...button.vid__dot data-index dla 1..N-1... -->
    </div>
  </div>

  <script>
    (function () {
      try {
        var root = document.getElementById("wideo");
        if (!root) return;

        var RM = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        var grid = root.querySelector(".vid__grid");
        var cards = root.querySelectorAll(".vid__card");
        var tiles = root.querySelectorAll(".vid__tile");
        var dots = root.querySelectorAll(".vid__dot");
        var ticking = false;

        function getMuteButton(card) {
          return card.querySelector(".vid__mute");
        }

        function updateMute(card, muted) {
          var button = getMuteButton(card);
          if (!button) return;
          button.setAttribute("data-muted", muted ? "true" : "false");
          button.setAttribute("aria-label", muted ? "Włącz dźwięk" : "Wycisz nagranie");
        }

        function muteOthers(activeCard) {
          var i;
          for (i = 0; i < cards.length; i++) {
            if (cards[i] !== activeCard && cards[i]._vid) {
              cards[i]._vid.muted = true;
            }
            if (cards[i] !== activeCard) {
              updateMute(cards[i], true);
            }
          }
        }

        function createVideo(card) {
          if (card._vid) return card._vid;

          var video = document.createElement("video");
          var source = document.createElement("source");
          var poster = card.querySelector(".vid__poster");

          video.muted = true;
          video.defaultMuted = true;
          video.loop = true;
          video.playsInline = true;
          video.preload = "none";
          video.poster = card.getAttribute("data-poster");
          video.width = 720;
          video.height = 1280;
          video.setAttribute("muted", "");
          video.setAttribute("loop", "");
          video.setAttribute("playsinline", "");
          video.setAttribute("preload", "none");
          video.setAttribute("width", "720");
          video.setAttribute("height", "1280");
          video.setAttribute("aria-hidden", "true");

          source.src = card.getAttribute("data-src");
          source.type = "video/mp4";
          video.appendChild(source);

          video.addEventListener("playing", function () {
            card.classList.add("is-playing");
          });

          video.addEventListener("pause", function () {
            card.classList.remove("is-playing");
          });

          video.addEventListener("ended", function () {
            card.classList.remove("is-playing");
          });

          card.insertBefore(video, poster);
          card._vid = video;
          card.setAttribute("data-video-created", "true");
          return video;
        }

        function playVideo(video) {
          var result;
          try {
            result = video.play();
            if (result && typeof result.catch === "function") {
              result.catch(function () {});
            }
          } catch (error) {}
        }

        function toggleCard(card) {
          var video = createVideo(card);

          if (video.paused) {
            if (RM) {
              muteOthers(card);
              video.muted = false;
              updateMute(card, false);
            }
            playVideo(video);
          } else {
            video.pause();
          }
        }

        function isMuteTarget(target, card) {
          var node = target;
          while (node && node !== card) {
            if (node.classList && node.classList.contains("vid__mute")) return true;
            node = node.parentNode;
          }
          return false;
        }

        function handleMute(card) {
          var video = createVideo(card);
          var willUnmute = video.muted;

          if (willUnmute) {
            muteOthers(card);
            video.muted = false;
            updateMute(card, false);
            playVideo(video);

            if (!card.getAttribute("data-sound-tracked")) {
              card.setAttribute("data-sound-tracked", "true");
              try {
                if (window.fbq) {
                  window.fbq("trackCustom", "video_play", {
                    author: card.getAttribute("data-author")
                  });
                }
              } catch (trackingError) {}
            }
          } else {
            video.muted = true;
            updateMute(card, true);
          }
        }

        function setActiveDot(index) {
          var i;
          for (i = 0; i < dots.length; i++) {
            if (i === index) {
              dots[i].classList.add("is-active");
              dots[i].setAttribute("aria-current", "true");
            } else {
              dots[i].classList.remove("is-active");
              dots[i].removeAttribute("aria-current");
            }
          }
        }

        function updateDots() {
          ticking = false;
          if (!tiles.length) return;

          var tileWidth = tiles[0].offsetWidth || 1;
          var index = Math.round(grid.scrollLeft / tileWidth);

          if (index < 0) index = 0;
          if (index > tiles.length - 1) index = tiles.length - 1;
          setActiveDot(index);
        }

        function requestDotUpdate() {
          if (ticking) return;
          ticking = true;

          if (window.requestAnimationFrame) {
            window.requestAnimationFrame(updateDots);
          } else {
            window.setTimeout(updateDots, 16);
          }
        }

        var i;
        for (i = 0; i < cards.length; i++) {
          (function (card) {
            var mute = getMuteButton(card);

            card.addEventListener("click", function (event) {
              if (isMuteTarget(event.target, card)) return;
              toggleCard(card);
            });

            card.addEventListener("keydown", function (event) {
              if (event.target !== card) return;
              if (event.key === "Enter" || event.key === " " || event.keyCode === 13 || event.keyCode === 32) {
                event.preventDefault();
                toggleCard(card);
              }
            });

            if (mute) {
              mute.addEventListener("click", function (event) {
                event.preventDefault();
                event.stopPropagation();
                handleMute(card);
              });

              mute.addEventListener("keydown", function (event) {
                event.stopPropagation();
              });
            }
          }(cards[i]));
        }

        if (!RM && "IntersectionObserver" in window) {
          var observer = new IntersectionObserver(function (entries) {
            var j;
            for (j = 0; j < entries.length; j++) {
              var card = entries[j].target;

              if (entries[j].isIntersecting && entries[j].intersectionRatio >= .5) {
                playVideo(createVideo(card));
              } else if (card._vid) {
                card._vid.pause();
              }
            }
          }, {
            root: null,
            threshold: .5
          });

          for (i = 0; i < cards.length; i++) {
            observer.observe(cards[i]);
          }
        }

        if (grid) {
          grid.addEventListener("scroll", requestDotUpdate);
        }

        for (i = 0; i < dots.length; i++) {
          (function (dot) {
            dot.addEventListener("click", function () {
              var index = parseInt(dot.getAttribute("data-index"), 10);
              var tile = tiles[index];
              if (!tile) return;

              var left = tile.offsetLeft - grid.offsetLeft;
              setActiveDot(index);

              try {
                grid.scrollTo({
                  left: left,
                  behavior: RM ? "auto" : "smooth"
                });
              } catch (scrollError) {
                grid.scrollLeft = left;
              }
            });
          }(dots[i]));
        }

        updateDots();
      } catch (error) {}
    }());
  </script>
</section>
