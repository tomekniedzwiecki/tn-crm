<!--
============================================================================
MODUŁ KANONICZNY: faq-accordion@1
ŹRÓDŁO:   loczek@8726382b (2026-07-17) — sekcja #faq (akordeon natywny + media)
ROLA:     FAQ jako natywny <details>/<summary> (ZERO JS), układ 2-kolumnowy
          (akordeon 1.62fr + sticky media 1fr), zwijany do 1 kolumny <=820px.
          Ikona +/− przez ::before/::after summary; a11y z pudełka.

────────────────────────────────────────────────────────────────────────────
KONTRAKT SKÓROWANIA (co WOLNO zmienić):
  • TYLKO tokeny/kolory/promienie/cienie: var(--paper*), var(--line), var(--blush),
    var(--radius-lg), var(--shadow-sm), tło .faq-media (gradient), treść pytań.
  • Liczba pytań: dowolna (dodawaj <details.faq-item>). Pierwszy MOŻE mieć `open`.
  • Obraz media: podmień src/alt (pojedynczy packshot).

CO JEST NIETYKALNE (mechanika i proporcje — NIE RUSZAĆ):
  • grid-template-columns: 1.62fr 1fr (proporcja akordeon:media) i breakpoint 820px,
  • natywny <details>/<summary> (BEZ JS — nie zamieniaj na custom accordion),
  • summary::marker/::-webkit-details-marker ukryte + ikona ::before/::after,
  • .faq-media position:sticky top:90px (media podąża przy przewijaniu).

⚠️ Jeśli budujesz JSON-LD FAQPage — treść MUSI być 1:1 z widocznymi pytaniami.

⛔ ANTY-WZORZEC: NIE przepisuj akordeonu na JS z max-height/transition —
   natywny <details> jest dostępny, lekki i bezawaryjny. JS = odstępstwo.
============================================================================
-->
<section id="faq" class="sect-pad">
  <style>
    #faq {
      background: var(--paper);
      color: var(--ink);
      overflow: clip;
    }

    #faq .faq-layout {
      display: grid;
      grid-template-columns: 1.62fr 1fr;   /* akordeon : media — NIE RUSZAĆ proporcji */
      gap: clamp(28px, 4vw, 56px);
      align-items: start;
    }

    #faq .faq-main,
    #faq .faq-media {
      min-width: 0;
    }

    #faq .faq-head {
      margin-bottom: clamp(24px, 3vw, 42px);
    }

    #faq .faq-head .eyebrow {
      margin: 0 0 12px;
    }

    #faq .faq-head .h2 {
      margin: 0;
    }

    #faq .faq-card {
      padding: 0 clamp(8px, 1.5vw, 20px);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }

    #faq .faq-item {
      border-bottom: 1px solid var(--line);
    }

    #faq .faq-item:last-child {
      border-bottom: 0;
    }

    #faq .faq-item summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 22px;
      min-height: 72px;
      padding: 18px clamp(10px, 1.3vw, 18px);
      color: var(--ink);
      font-size: clamp(17px, 1.35vw, 21px);
      font-weight: 600;
      line-height: 1.35;
      cursor: pointer;
      list-style: none;
    }

    #faq .faq-item summary::-webkit-details-marker {
      display: none;
    }

    #faq .faq-item summary::marker {
      content: "";
    }

    #faq .faq-item summary:focus-visible {
      outline: 2px solid var(--blush);
      outline-offset: -3px;
      border-radius: 12px;
    }

    #faq .faq-ic {
      position: relative;
      flex: 0 0 18px;
      width: 18px;
      height: 18px;
    }

    #faq .faq-ic::before,
    #faq .faq-ic::after {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 16px;
      height: 2px;
      border-radius: 2px;
      background: var(--blush);
      transform: translate(-50%, -50%);
      transition: opacity .2s ease, transform .2s ease;
    }

    #faq .faq-ic::after {
      transform: translate(-50%, -50%) rotate(90deg);
    }

    #faq .faq-item[open] .faq-ic::after {
      opacity: 0;
      transform: translate(-50%, -50%) rotate(0deg);
    }

    #faq .faq-a {
      padding: 0 clamp(10px, 1.3vw, 18px) 22px;
      color: var(--body);
      font-size: clamp(15px, 1.12vw, 18px);
      line-height: 1.65;
    }

    #faq .faq-media {
      position: sticky;
      top: 90px;
      display: grid;
      place-items: center;
      min-height: clamp(570px, 67vw, 760px);
      padding: clamp(24px, 3vw, 46px);
      background:
        radial-gradient(circle at 50% 30%, rgba(255, 255, 255, .72) 0%, transparent 46%),
        linear-gradient(145deg, var(--paper-3), var(--paper-2));
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    #faq .faq-media img {
      display: block;
      width: 100%;
      height: 100%;
      max-height: 680px;
      object-fit: contain;
      object-position: center;
      filter: drop-shadow(0 24px 44px rgba(80, 45, 39, .16));
    }

    @media (max-width: 820px) {
      #faq .faq-layout {
        grid-template-columns: minmax(0, 1fr);
      }

      #faq .faq-card {
        width: 100%;
      }

      #faq .faq-item summary {
        min-height: 66px;
        padding-block: 16px;
      }

      #faq .faq-media {
        position: relative;
        top: auto;
        width: min(100%, 360px);
        min-height: 0;
        aspect-ratio: 4 / 5;
        margin: 4px auto 0;
        padding: 22px;
      }

      #faq .faq-media img {
        max-width: 320px;
        max-height: 100%;
      }
    }

    @media (max-width: 480px) {
      #faq .faq-card {
        padding-inline: 6px;
        border-radius: 18px;
      }

      #faq .faq-item summary {
        gap: 14px;
        padding-inline: 10px;
      }

      #faq .faq-a {
        padding-inline: 10px;
      }
    }
  </style>

  <div class="wrap">
    <div class="faq-layout">
      <div class="faq-main">
        <header class="faq-head">
          <p class="eyebrow">{{EYEBROW}}</p>
          <h2 class="h2">{{TYTUL}}</h2>
        </header>

        <div class="faq-card">
          <details class="faq-item" open>
            <summary>{{PYTANIE_1}}<span class="faq-ic" aria-hidden="true"></span></summary>
            <div class="faq-a">{{ODPOWIEDZ_1}}</div>
          </details>
          <!-- ...powtórz <details.faq-item> dla każdego pytania (bez `open`)... -->
        </div>
      </div>

      <div class="faq-media">
        <img src="{{PACKSHOT_URL}}" loading="lazy" alt="{{ALT}}" width="760" height="960">
      </div>
    </div>
  </div>
</section>
